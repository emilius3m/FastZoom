version: "3.9"

services:
  app:
    image: python:3.12
    working_dir: /app
    volumes:
      - .:/app
#    env_file:
#      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./archaeological_catalog.db
      MINIO_CONFIG_PROFILE: local
      MINIO_LOCAL_URL: http://minio:9000
      MINIO_LOCAL_ACCESS_KEY: minioadmin
      MINIO_LOCAL_SECRET_KEY: minioadmin
      MINIO_LOCAL_BUCKET: archaeological-photos
      MINIO_LOCAL_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      - minio
    command: >
      sh -c "python -m pip install --no-cache-dir -r requirements.txt &&
      python -m uvicorn app.app:app --host 0.0.0.0 --port 8000 --reload"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
