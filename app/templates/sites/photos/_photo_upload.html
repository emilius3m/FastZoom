<!-- _photo_upload.html - Componente Upload Foto Archeologiche Riutilizzabile -->
<!-- Componente modulare per l'upload di foto con metadati archeologici -->
<!-- Parametri configurabili disponibili tramite data-* attributes -->

<div x-data="photoUploadComponent"
    class="fixed inset-0 bg-gray-600 dark:bg-gray-900 bg-opacity-50 overflow-y-auto h-full w-full z-50"
    :class="{'hidden': !isModalOpen}" x-show="isModalOpen" x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0" data-upload-url="/api/v1/sites/{{ site.id }}/photos/upload"
    data-site-id="{{ site.id }}" data-allowed-types="image/*" data-max-file-size="10GB" data-max-files="100"
    data-success-callback="refreshPhotos" data-error-callback="showUploadError" data-custom-styles="default"
    data-show-archaeological-fields="true" x-init="initializeUploadComponent($el)">

    <div class="relative top-5 mx-auto border shadow-lg rounded-md bg-white dark:bg-gray-800 max-w-7xl h-[90vh] flex flex-col"
        :class="modalSizeClasses" data-theme="currentTheme">

        <!-- Header (Fixed) -->
        <div
            class="flex-none px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <h3 class="text-xl font-semibold text-gray-900 dark:text-white flex items-center">
                <svg class="w-6 h-6 mr-2 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                    </path>
                </svg>
                <span x-text="modalTitle || 'Carica Foto Archeologiche'"></span>
            </h3>
            <button @click="closeModal()"
                class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Main Content Area (Scrollable / Split) -->
        <div class="flex-1 overflow-hidden flex flex-col md:flex-row">

            <!-- LEFT COLUMN: File Upload & List -->
            <div
                class="w-full md:w-5/12 flex flex-col border-r border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800">

                <!-- Upload Zone -->
                <div class="p-4 flex-none">
                    <div x-show="!isUploading">
                        <div @dragover.prevent="dragActive = true" @dragleave.prevent="dragActive = false"
                            @drop.prevent="handleDrop($event)"
                            class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-6 text-center transition-colors bg-white dark:bg-gray-800"
                            :class="{'border-blue-500 bg-blue-50 dark:bg-blue-900': dragActive}">
                            <svg class="mx-auto h-10 w-10 text-gray-400 mb-2" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                                </path>
                            </svg>
                            <p class="text-sm font-medium text-gray-900 dark:text-white mb-1">Trascina foto qui</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">oppure</p>
                            <label for="fileInput"
                                class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 cursor-pointer focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                Seleziona File
                            </label>
                            <input type="file" id="fileInput" multiple x-ref="fileInput" :accept="config.allowedTypes"
                                @change="handleFileSelect($event)" class="hidden">
                        </div>
                    </div>

                    <!-- Progress Bar (Visible only during upload) -->
                    <div x-show="isUploading" class="mt-4">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Upload in corso...</span>
                            <span class="text-sm text-gray-600 dark:text-gray-400" x-text="uploadProgress + '%'"></span>
                        </div>
                        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full transition-all duration-300"
                                :style="`width: ${uploadProgress}%`"></div>
                        </div>
                    </div>
                </div>

                <!-- File List (Scrollable) -->
                <div class="flex-1 overflow-y-auto px-4 pb-4">
                    <div x-show="files.length === 0"
                        class="h-full flex flex-col items-center justify-center text-gray-400 opacity-50 space-y-2">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                        <span class="text-sm">Nessuna foto selezionata</span>
                    </div>

                    <div x-show="files.length > 0">
                        <div
                            class="flex items-center justify-between mb-2 sticky top-0 bg-gray-50/95 dark:bg-gray-800 backdrop-blur py-2 z-10">
                            <h4 class="text-sm font-medium text-gray-700 dark:text-gray-300">File in coda (<span
                                    x-text="files.length"></span>)</h4>
                            <button @click="clearFiles()"
                                class="text-xs text-red-600 hover:text-red-700 font-medium">Svuota tutto</button>
                        </div>

                        <div class="space-y-2">
                            <template x-for="(file, index) in files" :key="index">
                                <div
                                    class="flex items-center p-2 bg-white dark:bg-gray-700 rounded border border-gray-200 dark:border-gray-600 shadow-sm">
                                    <img :src="file.preview"
                                        class="h-10 w-10 object-cover rounded flex-none bg-gray-100">
                                    <div class="ml-3 flex-1 min-w-0">
                                        <p class="text-sm font-medium text-gray-900 dark:text-white truncate"
                                            x-text="file.name"></p>
                                        <div
                                            class="flex items-center text-xs text-gray-500 dark:text-gray-400 space-x-2">
                                            <span x-text="formatFileSize(file.size)"></span>

                                            <!-- Status Indicators -->
                                            <span x-show="isUploading && uploadDetails[index]?.status === 'pending'"
                                                class="text-gray-400">In attesa...</span>
                                            <span x-show="isUploading && uploadDetails[index]?.status === 'uploading'"
                                                class="text-blue-500"
                                                x-text="uploadDetails[index]?.progress + '%'"></span>
                                            <span x-show="uploadDetails[index]?.status === 'completed'"
                                                class="text-green-600 font-bold">Completato</span>
                                            <span x-show="uploadDetails[index]?.status === 'error'"
                                                class="text-red-600 font-bold">Errore</span>
                                        </div>
                                    </div>
                                    <button @click="removeFile(index)" x-show="!isUploading"
                                        class="ml-2 text-gray-400 hover:text-red-500 p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">
                                        <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                                            <path fill-rule="evenodd"
                                                d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                                                clip-rule="evenodd" />
                                        </svg>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Metadata Form -->
            <div class="w-full md:w-7/12 flex flex-col h-full overflow-hidden bg-white dark:bg-gray-800">
                <div class="flex-1 overflow-y-auto p-6">

                    <!-- Instructions (Compact) -->
                    <div
                        class="mb-6 p-3 bg-blue-50 dark:bg-blue-900 border border-blue-100 dark:border-blue-800 rounded-lg flex items-start">
                        <svg class="w-5 h-5 text-blue-600 dark:text-blue-400 mr-2 flex-none mt-0.5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <div class="text-sm text-blue-800 dark:text-blue-200">
                            I metadati inseriti qui verranno applicati a <strong>tutte</strong> le foto caricate in
                            questa sessione. Compila i campi comuni (es. Area, Data) prima di caricare.
                        </div>
                    </div>

                    <div x-show="config.showArchaeologicalFields" class="space-y-6">
                        <!-- Section Title -->
                        <div class="flex items-center pb-2 border-b border-gray-100 dark:border-gray-700">
                            <svg class="w-5 h-5 mr-2 text-amber-600 dark:text-amber-400" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                                </path>
                            </svg>
                            <h4 class="font-medium text-gray-900 dark:text-white">Dati Archeologici</h4>
                        </div>

                        <!-- Form Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                            <!-- Left Sub-col -->
                            <div class="space-y-4">
                                <div>
                                    <label
                                        class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">N.
                                        Inventario</label>
                                    <input type="text" x-model="metadata.inventory_number"
                                        class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white"
                                        placeholder="es. INV-2024-001">
                                </div>
                                <div>
                                    <label
                                        class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Area
                                        di Scavo</label>
                                    <input type="text" x-model="metadata.excavation_area"
                                        class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white"
                                        placeholder="es. Saggio A">
                                </div>
                                <div>
                                    <label
                                        class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">U.S.
                                        / Contesto</label>
                                    <input type="text" x-model="metadata.stratigraphic_unit"
                                        class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white"
                                        placeholder="es. US 104">
                                </div>
                            </div>

                            <!-- Right Sub-col -->
                            <div class="space-y-4">
                                <div>
                                    <label
                                        class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Data
                                        Scatto</label>
                                    <input type="date" x-model="metadata.photo_date"
                                        class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white">
                                </div>
                                <div>
                                    <label
                                        class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Materiale</label>
                                    <select x-model="metadata.material"
                                        class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white">
                                        <option value="">-- Seleziona --</option>
                                        <option value="ceramic">Ceramica</option>
                                        <option value="bronze">Bronzo</option>
                                        <option value="iron">Ferro</option>
                                        <option value="stone">Pietra</option>
                                        <option value="marble">Marmo</option>
                                        <option value="glass">Vetro</option>
                                        <option value="bone">Osso</option>
                                        <option value="wood">Legno</option>
                                        <option value="gold">Oro</option>
                                        <option value="silver">Argento</option>
                                        <option value="terracotta">Terracotta</option>
                                        <option value="mosaic">Mosaico</option>
                                        <option value="other">Altro</option>
                                    </select>
                                </div>
                                <div>
                                    <label
                                        class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Tipo
                                        Foto</label>
                                    <select x-model="metadata.photo_type"
                                        class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white">
                                        <option value="">-- Seleziona --</option>
                                        <option value="general_view">Vista Generale</option>
                                        <option value="detail">Dettaglio</option>
                                        <option value="section">Sezione</option>
                                        <option value="before_restoration">Pre-Restauro</option>
                                        <option value="after_restoration">Post-Restauro</option>
                                        <option value="excavation_progress">Avanzamento Scavo</option>
                                        <option value="stratigraphy">Stratigrafia</option>
                                        <option value="find_context">Contesto Rinvenimento</option>
                                        <option value="laboratory">Laboratorio</option>
                                        <option value="archive">Archivio</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="pt-2">
                            <label
                                class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Descrizione</label>
                            <textarea x-model="metadata.description" rows="3"
                                class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white"
                                placeholder="Descrizione dettagliata..."></textarea>
                        </div>

                        <div>
                            <label
                                class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Tags</label>
                            <input type="text" x-model="tagsInput" @input="updateTags()"
                                class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white"
                                placeholder="Separati da virgola (es. ceramica, frammento)">
                            <div class="mt-2 flex flex-wrap gap-1">
                                <template x-for="tag in metadata.tags" :key="tag">
                                    <span
                                        class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200">
                                        <span x-text="tag"></span>
                                    </span>
                                </template>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Footer (Fixed) -->
        <div
            class="flex-none bg-gray-50 dark:bg-gray-800 px-6 py-4 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div class="flex items-center">
                <input type="checkbox" id="useTus" x-model="useTus"
                    class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="useTus" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">
                    High-Speed Upload (TUS)
                </label>
            </div>

            <div class="flex space-x-3">
                <button @click="closeModal()" x-show="!isUploading"
                    class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition-colors">
                    Chiudi
                </button>
                <button @click="startUpload()" x-show="!isUploading" :disabled="files.length === 0"
                    :class="files.length === 0 ? 'opacity-50 cursor-not-allowed bg-gray-400' : 'bg-blue-600 hover:bg-blue-700 shadow-sm'"
                    class="px-5 py-2 border border-transparent rounded-lg text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all transform active:scale-95 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                    <span x-text="files.length > 1 ? `Carica ${files.length} Foto` : 'Carica Foto'"></span>
                </button>

                <!-- Cancel button during upload -->
                <button @click="isUploading = false; closeModal()" x-show="isUploading"
                    class="px-4 py-2 border border-transparent rounded-lg text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors">
                    Annulla Upload
                </button>
            </div>
        </div>

    </div>

</div>

<!-- SCRIPT per il componente upload -->
<script defer>
    function photoUploadComponent() {
        return {
            // State management
            isModalOpen: false,
            useTus: true,
            files: [],
            isUploading: false,
            uploadProgress: 0,
            uploadDetails: [],
            dragActive: false,
            tagsInput: '',
            metadata: {
                inventory_number: '',
                excavation_area: '',
                stratigraphic_unit: '',
                material: '',
                photo_type: '',
                photo_date: '',
                description: '',
                tags: []
            },
            config: {
                uploadUrl: '',
                siteId: '',
                allowedTypes: 'image/*',
                maxFileSize: '50MB',
                maxFiles: 100,
                successCallback: 'refreshPhotos',
                errorCallback: 'showUploadError',
                customStyles: 'default',
                showArchaeologicalFields: true
            },
            modalSizeClasses: 'max-w-4xl',
            modalTitle: 'Carica Foto Archeologiche',
            uploadAreaTitle: 'Trascina i file qui o clicca per selezionarli',

            // Initialize component
            initializeUploadComponent(element) {
                // Read configuration from data-* attributes
                this.config.uploadUrl = element.dataset.uploadUrl || '/api/v1/sites/' + this.getSiteId() + '/photos/upload';
                this.config.siteId = element.dataset.siteId || this.getSiteId();
                this.config.allowedTypes = element.dataset.allowedTypes || 'image/*';
                this.config.maxFileSize = element.dataset.maxFileSize || '50MB';
                this.config.maxFiles = parseInt(element.dataset.maxFiles) || 100;
                this.config.successCallback = element.dataset.successCallback || 'refreshPhotos';
                this.config.errorCallback = element.dataset.errorCallback || 'showUploadError';
                this.config.showArchaeologicalFields = element.dataset.showArchaeologicalFields !== 'false';

                console.log('Photo upload component initialized with config:', this.config);
            },

            // Get current site ID from URL or global variables
            getSiteId() {
                const pathSegments = window.location.pathname.split('/');
                const sitesIndex = pathSegments.indexOf('view');
                if (sitesIndex !== -1 && pathSegments[sitesIndex + 1]) {
                    return pathSegments[sitesIndex + 1];
                }
                // Fallback: try to get from global variable
                if (window.currentSiteId) {
                    return window.currentSiteId;
                }
                return null;
            },

            // Modal management
            openModal() {
                this.isModalOpen = true;
                this.resetForm();
                document.body.style.overflow = 'hidden';
            },

            closeModal() {
                this.isModalOpen = false;
                document.body.style.overflow = '';
                this.resetForm();
            },

            resetForm() {
                this.files = [];
                this.isUploading = false;
                this.uploadProgress = 0;
                this.uploadDetails = [];
                this.dragActive = false;
                this.tagsInput = '';
                this.metadata = {
                    inventory_number: '',
                    excavation_area: '',
                    stratigraphic_unit: '',
                    material: '',
                    photo_type: '',
                    photo_date: '',
                    description: '',
                    tags: []
                };
                if (this.$refs.fileInput) {
                    this.$refs.fileInput.value = '';
                }
            },

            // File handling
            handleFileSelect(event) {
                const selectedFiles = Array.from(event.target.files);
                this.addFiles(selectedFiles);
            },

            handleDrop(event) {
                this.dragActive = false;
                const droppedFiles = Array.from(event.dataTransfer.files);
                this.addFiles(droppedFiles);
            },

            addFiles(newFiles) {
                const maxFileSizeBytes = this.parseFileSize(this.config.maxFileSize);

                newFiles.forEach(file => {
                    // Validate file type
                    if (!this.validateFileType(file)) {
                        this.showToast(`File ${file.name}: tipo non supportato`, 'error');
                        return;
                    }

                    // Validate file size
                    if (file.size > maxFileSizeBytes) {
                        this.showToast(`File ${file.name}: dimensione troppo grande`, 'error');
                        return;
                    }

                    // Check if file already exists
                    if (this.files.some(f => f.name === file.name && f.size === file.size)) {
                        this.showToast(`File ${file.name}: già selezionato`, 'warning');
                        return;
                    }

                    // Create preview for images
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const fileObj = {
                                file: file,
                                name: file.name,
                                size: file.size,
                                type: file.type,
                                preview: e.target.result,
                                error: null
                            };
                            this.files.push(fileObj);
                        };
                        reader.readAsDataURL(file);
                    } else {
                        const fileObj = {
                            file: file,
                            name: file.name,
                            size: file.size,
                            type: file.type,
                            preview: '/static/img/file-icon.png', // Default icon for non-images
                            error: null
                        };
                        this.files.push(fileObj);
                    }
                });

                // Validate total number of files
                if (this.files.length > this.config.maxFiles) {
                    this.showToast(`Massimo ${this.config.maxFiles} files consentiti`, 'error');
                    this.files = this.files.slice(0, this.config.maxFiles);
                }
            },

            removeFile(index) {
                this.files.splice(index, 1);
            },

            clearFiles() {
                this.files = [];
            },

            validateFileType(file) {
                if (this.config.allowedTypes === '*') return true;
                if (this.config.allowedTypes === 'image/*') return file.type.startsWith('image/');

                const allowedTypes = this.config.allowedTypes.split(',').map(type => type.trim());
                return allowedTypes.some(type => {
                    if (type.endsWith('/*')) {
                        return file.type.startsWith(type.slice(0, -1));
                    }
                    return file.type === type;
                });
            },

            parseFileSize(sizeStr) {
                const units = { B: 1, KB: 1024, MB: 1024 * 1024, GB: 1024 * 1024 * 1024 };
                const match = sizeStr.match(/^(\d+(?:\.\d+)?)\s*(B|KB|MB|GB)$/i);
                if (!match) return 0;
                return parseFloat(match[1]) * (units[match[2].toUpperCase()] || 1);
            },

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },

            // Tag management
            updateTags() {
                this.metadata.tags = this.tagsInput
                    .split(',')
                    .map(tag => tag.trim())
                    .filter(tag => tag.length > 0);
            },

            // Upload functionality

            startUpload() {
                if (this.useTus) {
                    this.uploadWithTus();
                } else {
                    this.uploadFilesInBatches(); // Prefer batch upload for robustness
                }
            },

            async uploadWithTus() {
                if (this.files.length === 0) {
                    this.showToast('Nessun file da caricare', 'error');
                    return;
                }

                if (typeof TusUploader === 'undefined') {
                    console.warn('TusUploader not found, falling back to standard upload');
                    this.showToast('Libreria TUS non caricata. Uso upload standard.', 'warning');
                    this.uploadFilesInBatches();
                    return;
                }

                this.isUploading = true;
                this.uploadProgress = 0;

                // Initialize progress
                this.uploadDetails = this.files.map((file, index) => ({
                    index,
                    fileName: file.name,
                    progress: 0,
                    status: 'pending'
                }));

                // Prepare common metadata
                const commonMetadata = {
                    site_id: this.config.siteId,
                    inventory_number: this.metadata.inventory_number,
                    excavation_area: this.metadata.excavation_area,
                    stratigraphic_unit: this.metadata.stratigraphic_unit,
                    material: this.metadata.material,
                    photo_type: this.metadata.photo_type,
                    photo_date: this.metadata.photo_date,
                    description: this.metadata.description,
                    // Keep both keys for compatibility across upload flows
                    // - keywords: consumed by backend photo record creation
                    // - tags: retained for legacy/debug payload visibility
                    keywords: this.metadata.tags,
                    tags: this.metadata.tags
                };

                console.log('🚀 Starting TUS Upload for', this.files.length, 'files');

                const uploader = new TusUploader({
                    endpoint: '/api/v1/tus/uploads',
                    chunkSize: 5 * 1024 * 1024 // 5MB chunks
                });

                let successful = 0;
                let failed = 0;
                const errors = [];
                const successfulUploads = [];

                // Process files sequentially
                for (let i = 0; i < this.files.length; i++) {
                    const fileObj = this.files[i];
                    const detail = this.uploadDetails[i];

                    if (!this.isUploading) break; // Check for cancellation

                    detail.status = 'uploading';

                    try {
                        console.log(`📤 Uploading ${fileObj.name} with TUS...`);

                        await uploader.upload(fileObj.file, {
                            metadata: {
                                ...commonMetadata,
                                filename: fileObj.name,
                                filetype: fileObj.type,
                                lastModified: fileObj.file.lastModified
                            },
                            onProgress: (bytesUploaded, bytesTotal) => {
                                const percentage = (bytesUploaded / bytesTotal) * 100;
                                detail.progress = Math.round(percentage);

                                // Calculate global progress
                                const currentTotalProgress = (i * 100) + percentage;
                                this.uploadProgress = Math.round((currentTotalProgress / (this.files.length * 100)) * 100);
                            },
                            onSuccess: (uploadId, uploadUrl, result) => {
                                console.log(`✅ TUS Success for ${fileObj.name}:`, result);
                                detail.status = 'completed';
                                detail.progress = 100;
                                successful++;

                                const normalizedResult = (result && typeof result === 'object')
                                    ? {
                                        ...result,
                                        photo_id: result.photo_id || result.id || null,
                                        filename: result.filename || fileObj.name,
                                        file_path: result.file_path || result.file_url || result.full_url || '',
                                        thumbnail_url: result.thumbnail_url || '',
                                        file_url: result.file_url || result.full_url || result.url || ''
                                    }
                                    : {
                                        filename: fileObj.name,
                                        photo_id: null,
                                        file_path: '',
                                        thumbnail_url: '',
                                        file_url: ''
                                    };

                                successfulUploads.push(normalizedResult);
                            },
                            onError: (error) => {
                                console.error(`❌ TUS Error for ${fileObj.name}:`, error);
                                detail.status = 'error';
                                failed++;
                                errors.push({ filename: fileObj.name, error: error.message });
                            }
                        });

                    } catch (e) {
                        console.error(`❌ TUS Exception for ${fileObj.name}:`, e);
                        detail.status = 'error';
                        failed++;
                        errors.push({ filename: fileObj.name, error: e.message });
                    }
                }

                this.isUploading = false;
                this.uploadProgress = 100;

                if (successful > 0) {
                    this.showToast(`✅ ${successful} foto caricate con successo!`, 'success');

                    // Trigger global refresh
                    if (window[this.config.successCallback]) {
                        // Pass complete result compatible with callback expectations
                        const tusResult = {
                            message: `${successful} file caricati`,
                            total_uploaded: successful,
                            successful: successfulUploads,
                            failed: errors,
                        };

                        if (typeof window[this.config.successCallback] === 'function') {
                            window[this.config.successCallback](tusResult);
                        }
                    }

                    setTimeout(() => this.closeModal(), 1500);
                }

                if (failed > 0) {
                    this.showToast(`⚠️ ${failed} errori durante l'upload.`, 'warning');
                }
            },

            async uploadFiles() {
                if (this.files.length === 0) {
                    this.showToast('Nessun file da caricare', 'error');
                    return;
                }

                this.isUploading = true;
                this.uploadProgress = 0;
                this.uploadDetails = this.files.map((file, index) => ({
                    index,
                    fileName: file.name,
                    progress: 0,
                    status: 'pending'
                }));

                try {
                    const formData = new FormData();

                    // ✅ FIX 1: Append files con nome corretto per array
                    // FastAPI si aspetta 'photos' come UploadFile list
                    this.files.forEach((fileObj, index) => {
                        // Aggiungi ogni file con lo stesso nome - FastAPI li gestirà come lista
                        formData.append('photos', fileObj.file, fileObj.file.name);

                        // Log per debugging
                        console.log(`📎 Appending file ${index + 1}/${this.files.length}:`, {
                            name: fileObj.file.name,
                            size: fileObj.file.size,
                            type: fileObj.file.type
                        });
                    });

                    // ✅ FIX 2: Metadata come campi separati invece di JSON string
                    // Questo rende più facile il parsing lato server
                    formData.append('inventory_number', this.metadata.inventory_number || '');
                    formData.append('excavation_area', this.metadata.excavation_area || '');
                    formData.append('stratigraphic_unit', this.metadata.stratigraphic_unit || '');
                    formData.append('material', this.metadata.material || '');
                    formData.append('photo_type', this.metadata.photo_type || '');
                    formData.append('photo_date', this.metadata.photo_date || '');
                    formData.append('description', this.metadata.description || '');

                    // Tags come array JSON
                    if (this.metadata.tags && this.metadata.tags.length > 0) {
                        formData.append('tags', JSON.stringify(this.metadata.tags));
                    }

                    // ✅ CRITICAL FIX: Remove site_id from FormData
                    // Site ID should come from URL path parameter, not form field
                    // formData.append('site_id', this.config.siteId); // REMOVED - causes backend conflicts

                    // ✅ FIX 3: Log FormData per debugging
                    console.log('📤 Sending FormData with entries:');
                    for (let [key, value] of formData.entries()) {
                        if (value instanceof File) {
                            console.log(`  ${key}: [File] ${value.name} (${this.formatFileSize(value.size)})`);
                        } else {
                            console.log(`  ${key}: ${value}`);
                        }
                    }

                    // ✅ FIX 4: Fetch con timeout e progress tracking
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 300000); // 5 min timeout

                    console.log(`🚀 Uploading ${this.files.length} files to ${this.config.uploadUrl}...`);

                    const response = await fetch(this.config.uploadUrl, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('access_token')}`,
                            // ⚠️ NON impostare Content-Type per FormData!
                            // Il browser lo fa automaticamente con boundary
                        },
                        body: formData,
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    // ✅ FIX 5: Gestione dettagliata degli errori HTTP
                    if (!response.ok) {
                        const errorText = await response.text();
                        let errorDetail;

                        try {
                            const errorJson = JSON.parse(errorText);
                            errorDetail = errorJson.detail || errorJson.message || errorText;
                        } catch {
                            errorDetail = errorText;
                        }

                        console.error('❌ Upload failed:', {
                            status: response.status,
                            statusText: response.statusText,
                            detail: errorDetail
                        });

                        throw new Error(`Upload failed (${response.status}): ${errorDetail}`);
                    }

                    const result = await response.json();
                    console.log('✅ Upload successful:', result);

                    // Update progress to complete
                    this.uploadProgress = 100;
                    this.uploadDetails.forEach(detail => {
                        detail.status = 'completed';
                        detail.progress = 100;
                    });

                    // ✅ CRITICAL FIX 2: Enhanced response validation and handling
                    console.log('🔍 Validating upload response structure:', result);

                    // Handle both new format and backward compatibility
                    const successful = result.successful || result.uploaded_photos || [];
                    const failed = result.failed || result.failed_photos || [];
                    const total = successful.length + failed.length;

                    if (successful && successful.length > 0) {
                        console.log('✅ Successful uploads:', successful);
                        this.showToast(
                            `✅ ${successful.length} foto caricate con successo!`,
                            'success'
                        );
                    }

                    if (failed && failed.length > 0) {
                        console.warn('⚠️ Failed uploads:', failed);
                        this.showToast(
                            `⚠️ ${failed.length} foto non caricate. Controlla la console.`,
                            'warning'
                        );
                    }

                    // Create normalized result for callback
                    const normalizedResult = {
                        successful: successful,
                        failed: failed,
                        total_uploaded: successful.length,
                        total_failed: failed.length,
                        message: result.message || `${successful.length}/${total} foto caricate`
                    };

                    console.log('📋 Normalized result for callback:', normalizedResult);
                    this.handleUploadSuccess(normalizedResult);

                    // Close modal after delay
                    setTimeout(() => {
                        this.closeModal();
                    }, 2000);

                } catch (error) {
                    console.error('❌ Upload error:', error);

                    // ✅ CRITICAL FIX 4: Enhanced error handling with detailed categorization
                    let errorMessage = 'Errore upload sconosciuto';

                    if (error.name === 'AbortError') {
                        errorMessage = '⏱️ Upload timeout - file troppo grandi o connessione lenta';
                    } else if (error.message.includes('Failed to fetch')) {
                        errorMessage = '🔌 Errore di connessione - verifica la rete';
                    } else if (error.message.includes('422')) {
                        errorMessage = '📋 Errore validazione - controlla i dati inseriti';
                    } else if (error.message.includes('403')) {
                        errorMessage = '🔒 Permessi insufficienti per caricare foto';
                    } else if (error.message.includes('401')) {
                        errorMessage = '🔑 Autenticazione richiesta';
                    } else if (error.message.includes('413')) {
                        errorMessage = '📁 File troppo grande';
                    } else if (error.message.includes('503')) {
                        errorMessage = '🔧 Servizio temporaneamente non disponibile';
                    } else {
                        errorMessage = `❌ Errore upload: ${error.message}`;
                    }

                    this.showToast(errorMessage, 'error');

                    // Mark all as failed
                    this.uploadDetails.forEach(detail => {
                        detail.status = 'error';
                    });

                    this.handleUploadError(error);

                } finally {
                    this.isUploading = false;
                }
            },

            /**
             * Upload files in batches to prevent timeout and provide better UX
             */
            async uploadFilesInBatches() {
                if (this.files.length === 0) {
                    this.showToast('Nessun file da caricare', 'error');
                    return;
                }

                this.isUploading = true;
                this.uploadProgress = 0;
                this.uploadDetails = this.files.map((file, index) => ({
                    index,
                    fileName: file.name,
                    progress: 0,
                    status: 'pending'
                }));

                const BATCH_SIZE = 5; // Upload 5 files alla volta
                const batches = [];

                // Dividi files in batch
                for (let i = 0; i < this.files.length; i += BATCH_SIZE) {
                    batches.push(this.files.slice(i, i + BATCH_SIZE));
                }

                console.log(`📦 Uploading ${this.files.length} files in ${batches.length} batches`);

                const allResults = {
                    successful: [],
                    failed: []
                };

                try {
                    // Upload ogni batch sequenzialmente
                    for (let batchIndex = 0; batchIndex < batches.length; batchIndex++) {
                        const batch = batches[batchIndex];
                        console.log(`📤 Uploading batch ${batchIndex + 1}/${batches.length} (${batch.length} files)`);

                        const formData = new FormData();

                        // Append files del batch corrente
                        batch.forEach((fileObj) => {
                            formData.append('photos', fileObj.file, fileObj.file.name);
                        });

                        // Metadata (stessi per tutti)
                        formData.append('inventory_number', this.metadata.inventory_number || '');
                        formData.append('excavation_area', this.metadata.excavation_area || '');
                        formData.append('stratigraphic_unit', this.metadata.stratigraphic_unit || '');
                        formData.append('material', this.metadata.material || '');
                        formData.append('photo_type', this.metadata.photo_type || '');
                        formData.append('photo_date', this.metadata.photo_date || '');
                        formData.append('description', this.metadata.description || '');

                        if (this.metadata.tags && this.metadata.tags.length > 0) {
                            formData.append('tags', JSON.stringify(this.metadata.tags));
                        }

                        // ✅ CRITICAL FIX: Remove site_id from FormData in batch upload too
                        // formData.append('site_id', this.config.siteId); // REMOVED - causes backend conflicts

                        // Upload batch
                        try {
                            const response = await fetch(this.config.uploadUrl, {
                                method: 'POST',
                                headers: {
                                    'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                                },
                                body: formData
                            });

                            if (!response.ok) {
                                throw new Error(`Batch ${batchIndex + 1} failed: ${response.statusText}`);
                            }

                            const result = await response.json();

                            // Accumula risultati
                            if (result.successful) {
                                allResults.successful.push(...result.successful);
                            }
                            if (result.failed) {
                                allResults.failed.push(...result.failed);
                            }

                            // Update progress
                            const completedFiles = (batchIndex + 1) * BATCH_SIZE;
                            this.uploadProgress = Math.min(100, (completedFiles / this.files.length) * 100);

                            // Update details per files nel batch
                            batch.forEach((fileObj) => {
                                const detail = this.uploadDetails.find(d => d.fileName === fileObj.name);
                                if (detail) {
                                    detail.status = 'completed';
                                    detail.progress = 100;
                                }
                            });

                            console.log(`✅ Batch ${batchIndex + 1} completed`);

                        } catch (batchError) {
                            console.error(`❌ Batch ${batchIndex + 1} error:`, batchError);

                            // Mark batch files as failed
                            batch.forEach((fileObj) => {
                                const detail = this.uploadDetails.find(d => d.fileName === fileObj.name);
                                if (detail) {
                                    detail.status = 'error';
                                }
                                allResults.failed.push({
                                    filename: fileObj.name,
                                    error: batchError.message
                                });
                            });
                        }

                        // Small delay between batches
                        if (batchIndex < batches.length - 1) {
                            await new Promise(resolve => setTimeout(resolve, 500));
                        }
                    }

                    // Final summary
                    this.uploadProgress = 100;

                    if (allResults.successful.length > 0) {
                        this.showToast(
                            `✅ ${allResults.successful.length}/${this.files.length} foto caricate!`,
                            'success'
                        );
                    }

                    if (allResults.failed.length > 0) {
                        this.showToast(
                            `⚠️ ${allResults.failed.length} foto non caricate`,
                            'warning'
                        );
                        console.error('Failed files:', allResults.failed);
                    }

                    this.handleUploadSuccess(allResults);

                    setTimeout(() => {
                        this.closeModal();
                    }, 2000);

                } catch (error) {
                    console.error('❌ Upload error:', error);
                    this.showToast(`❌ Errore upload: ${error.message}`, 'error');
                    this.handleUploadError(error);

                } finally {
                    this.isUploading = false;
                }
            },

            // ✅ CRITICAL FIX 3: Enhanced success handler with robust response processing
            handleUploadSuccess(result) {
                console.log('🎉 Upload success handler called with:', result);

                let message = 'Upload completato!';
                const successful = result.successful || result.uploaded_photos || [];
                const failed = result.failed || result.failed_photos || [];

                if (successful.length > 0 || failed.length > 0) {
                    // Standardized result format
                    const total = successful.length + failed.length;
                    message = `Upload completato: ${successful.length}/${total} file caricati con successo`;

                    if (failed.length > 0) {
                        console.warn('Files that failed to upload:', failed);
                        message += ` (${failed.length} falliti)`;
                    }

                    // Call the success callback with successful uploads
                    if (window[this.config.successCallback] && typeof window[this.config.successCallback] === 'function') {
                        try {
                            window[this.config.successCallback](successful);
                        } catch (callbackError) {
                            console.error('❌ Success callback error:', callbackError);
                            // Don't fail the entire upload for callback error
                        }
                    }
                } else {
                    // Backward compatibility for old response formats
                    const uploadedCount = result.total_uploaded || result.uploaded_file_ids?.length || this.files.length || 0;
                    message = `Upload completato con successo! ${uploadedCount} file caricati`;

                    // Call the success callback function if it exists
                    if (window[this.config.successCallback] && typeof window[this.config.successCallback] === 'function') {
                        try {
                            window[this.config.successCallback](result.uploaded_file_ids || successful);
                        } catch (callbackError) {
                            console.error('❌ Success callback error:', callbackError);
                        }
                    }
                }

                this.showToast(message, 'success');
            },

            handleUploadError(error) {
                this.showToast(`Errore durante l'upload: ${error.message}`, 'error');

                // Call the error callback function if it exists
                if (window[this.config.errorCallback] && typeof window[this.config.errorCallback] === 'function') {
                    window[this.config.errorCallback](error);
                }
            },

            // Toast notifications (simple implementation)
            showToast(message, type = 'info') {
                // Simple toast implementation - you can replace with your preferred toast system
                const toast = document.createElement('div');
                toast.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 transition-all duration-300 transform translate-x-full`;

                const bgColors = {
                    success: 'bg-green-500',
                    error: 'bg-red-500',
                    warning: 'bg-yellow-500',
                    info: 'bg-blue-500'
                };

                toast.classList.add(bgColors[type] || bgColors.info, 'text-white');
                toast.innerHTML = `
                <div class="flex items-center">
                    <span>${message}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="ml-4 text-white hover:text-gray-200">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            `;

                document.body.appendChild(toast);

                // Animate in
                setTimeout(() => {
                    toast.classList.remove('translate-x-full');
                }, 10);

                // Auto remove after 5 seconds
                setTimeout(() => {
                    toast.classList.add('translate-x-full');
                    setTimeout(() => {
                        if (toast.parentElement) {
                            toast.remove();
                        }
                    }, 300);
                }, 5000);
            }
        };
    }

    // Register the component with Alpine.js
    document.addEventListener('alpine:init', () => {
        Alpine.data('photoUploadComponent', photoUploadComponent);
    });
</script>
