<!-- _deepzoom_viewer.html - Componente Viewer DeepZoom Avanzato -->
<!-- Componente modulare per la visualizzazione di foto ad alta risoluzione con OpenSeadragon -->

<!-- Photo Modal con OpenSeadragon -->
<div x-show="showPhotoModal"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-gray-600 bg-opacity-75 overflow-hidden h-full w-full z-50"
    x-cloak
    x-data="{}"
    @keydown.escape="closePhotoModal()"
    x-init="$watch('showPhotoModal', value => {
        if (value) {
            document.body.style.overflow = 'hidden';
            document.documentElement.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = '';
            document.documentElement.style.overflow = '';
        }
    })">

    <!-- Main Modal Container -->
    <div class="fixed inset-0 flex flex-col bg-black overflow-hidden" role="dialog" aria-modal="true" aria-labelledby="photo-modal-title">

        <!-- Top Controls Bar -->
        <div class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-b from-black/90 via-black/60 to-transparent p-4">
            <div class="flex justify-between items-center">
                <!-- Left: Close & Photo Info -->
                <div class="flex items-center space-x-4">
                    <button @click="closePhotoModal()"
                            class="text-white hover:text-gray-300 transition-colors p-2 rounded-lg hover:bg-white/10"
                            aria-label="Chiudi modal">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>

                    <div class="text-white" x-show="currentPhoto">
                        <h3 id="photo-modal-title" class="text-lg font-semibold truncate max-w-xs"
                            x-text="currentPhoto?.filename || 'Caricamento...'"></h3>
                        <p class="text-sm text-gray-300"
                            x-text="`${currentPhotoIndex + 1} di ${photos.length}`"
                            aria-live="polite"></p>
                    </div>
                </div>

                <!-- Right: Action Buttons -->
                <div class="flex items-center space-x-2">

                    <!-- Info Button (Desktop only) -->
                    <button @click="showSidebar = !showSidebar"
                            x-show="currentPhoto"
                            class="hidden lg:block text-white hover:text-gray-300 transition-colors p-2 rounded-lg hover:bg-white/10"
                            :class="showSidebar ? 'bg-white/20' : ''"
                            aria-label="Mostra/nascondi informazioni foto">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </button>

                    <!-- Download Button -->
                    <button @click="downloadPhoto()"
                            x-show="currentPhoto"
                            class="text-white hover:text-gray-300 transition-colors p-2 rounded-lg hover:bg-white/10"
                            aria-label="Scarica foto">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </button>

                    <!-- Share Button -->
                    <button @click="sharePhoto()"
                            x-show="currentPhoto"
                            class="text-white hover:text-gray-300 transition-colors p-2 rounded-lg hover:bg-white/10"
                            aria-label="Condividi foto">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.367 2.684 3 3 0 00-5.367-2.684z"></path>
                        </svg>
                    </button>

                    <!-- Edit Button (admin/curator only) -->
                    <button @click="openEditModal()"
                            x-show="currentPhoto && (userRole === 'admin' || userRole === 'curator')"
                            class="text-white hover:text-gray-300 transition-colors p-2 rounded-lg hover:bg-white/10"
                            aria-label="Modifica foto">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex h-full pt-20 pb-24">
            <!-- Photo Display Area -->
            <div class="flex-1 flex items-center justify-center relative">

                <!-- OpenSeadragon Viewer Container -->
                <div id="openseadragon-container" class="w-full h-full bg-gray-900 relative">
                    <!-- Flowbite-style Controls Container -->
                    <div id="osd-fab-container" class="osd-fab-container" style="display: none;" data-initialized="false">
                        <!-- Zoom In Button -->
                        <button id="osd-zoom-in" class="osd-fab osd-fab-primary"
                                aria-label="Zoom in"
                                tabindex="0"
                                type="button">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                            </svg>
                            <span class="osd-fab-tooltip">Zoom In (+)</span>
                        </button>
                        
                        <!-- Zoom Out Button -->
                        <button id="osd-zoom-out" class="osd-fab osd-fab-primary"
                                aria-label="Zoom out"
                                tabindex="0"
                                type="button">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 13H5v-2h14v2z"/>
                            </svg>
                            <span class="osd-fab-tooltip">Zoom Out (-)</span>
                        </button>
                        
                        <!-- Reset View Button -->
                        <button id="osd-reset-view" class="osd-fab osd-fab-secondary"
                                aria-label="Reset view"
                                tabindex="0"
                                type="button">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h2c0 2.21 1.79 4 4 4s4-1.79 4-4-1.79-4-4-4z"/>
                            </svg>
                            <span class="osd-fab-tooltip">Reset View (0)</span>
                        </button>
                        
                        <!-- Rotate Left Button -->
                        <button id="osd-rotate-left" class="osd-fab osd-fab-secondary"
                                aria-label="Rotate left"
                                tabindex="0"
                                type="button">
                            <svg viewBox="0 0 24 24">
                                <path d="M7.11 8.53L5.7 7.11C4.8 8.27 4.24 9.61 4.07 11h2.02c.14-.87.49-1.72 1.02-2.47zM6.09 13H4.07c.17 1.39.72 2.73 1.62 3.89l1.41-1.42c-.52-.75-.87-1.59-1.01-2.47zm1.01 5.32c1.16.9 2.51 1.44 3.9 1.61V17.9c-.87-.15-1.71-.49-2.46-1.03L7.1 18.32zM13 4.07V1L8.45 5.55 13 10V6.09c2.84.48 5 2.94 5 5.91s-2.16 5.43-5 5.91v2.02c3.95-.49 7-3.85 7-7.93s-3.05-7.44-7-7.93z"/>
                            </svg>
                            <span class="osd-fab-tooltip">Rotate Left (Q)</span>
                        </button>
                        
                        <!-- Rotate Right Button -->
                        <button id="osd-rotate-right" class="osd-fab osd-fab-secondary"
                                aria-label="Rotate right"
                                tabindex="0"
                                type="button">
                            <svg viewBox="0 0 24 24">
                                <path d="M15.55 5.55L11 1v3.07C7.06 4.56 4 7.92 4 12s3.05 7.44 7 7.93v-2.02c-2.84-.48-5-2.94-5-5.91s2.16-5.43 5-5.91V10l4.55-4.45zM19.93 11c-.17-1.39-.72-2.73-1.62-3.89l-1.42 1.42c.54.75.88 1.6 1.02 2.47h2.02zM13 17.9v2.02c1.39-.17 2.74-.71 3.9-1.61l-1.44-1.44c-.75.54-1.59.89-2.46 1.03zm3.89-2.42l1.42 1.41c.9-1.16 1.45-2.5 1.62-3.89h-2.02c-.14.87-.48 1.72-1.02 2.48z"/>
                            </svg>
                            <span class="osd-fab-tooltip">Rotate Right (E)</span>
                        </button>
                        
                        <!-- Fullscreen Button -->
                        <button id="osd-fullscreen" class="osd-fab osd-fab-accent"
                                aria-label="Toggle fullscreen"
                                tabindex="0"
                                type="button">
                            <svg viewBox="0 0 24 24">
                                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                            </svg>
                            <span class="osd-fab-tooltip">Fullscreen (F)</span>
                        </button>
                    </div>
                    
                    <!-- Loading State -->
                    <div x-show="osdLoading"
                         class="absolute inset-0 flex items-center justify-center bg-gray-900 text-white z-30">
                        <div class="text-center">
                            <svg class="animate-spin h-8 w-8 text-white mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <p class="text-sm">Inizializzazione visualizzatore Deep Zoom...</p>
                        </div>
                    </div>

                    <!-- Error State -->
                    <div x-show="osdError && !osdLoading"
                         class="absolute inset-0 flex items-center justify-center bg-gray-900 text-white z-30">
                        <div class="text-center max-w-md mx-auto px-4">
                            <svg class="h-12 w-12 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <h3 class="text-lg font-medium mb-2">Errore Visualizzatore</h3>
                            <p class="text-sm text-gray-300 mb-4" x-text="osdErrorMessage"></p>
                            <button @click="switchToOpenSeadragon()"
                                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                                Riprova
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Hover Zone for Sidebar (Desktop only) -->
                <div class="hidden lg:block absolute top-0 right-0 w-16 h-full z-30"
                     @mouseenter="showSidebar = true"
                     title="Hover per mostrare informazioni foto"></div>
            </div>

            <!-- Sidebar (Desktop) -->
            <div class="hidden lg:block fixed top-20 bottom-24 right-0 w-80 bg-black bg-opacity-90 backdrop-blur-sm border-l border-gray-700 overflow-y-auto z-50"
                 x-show="currentPhoto && showSidebar"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="transform translate-x-full opacity-0"
                 x-transition:enter-end="transform translate-x-0 opacity-100"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="transform translate-x-0 opacity-100"
                 x-transition:leave-end="transform translate-x-full opacity-0"
                 @mouseleave="showSidebar = false">

                <!-- Close Button -->
                <div class="sticky top-0 bg-black bg-opacity-75 p-2 flex justify-end border-b border-gray-700">
                    <button @click="showSidebar = false"
                            class="text-gray-400 hover:text-white transition-colors p-1 rounded-lg hover:bg-gray-700">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="p-6 space-y-6 text-white">
                    <!-- Photo Information -->
                    <div class="bg-gray-800 bg-opacity-75 rounded-lg p-4">
                        <h4 class="text-lg font-semibold mb-4 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            Informazioni Foto
                        </h4>

                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-400">Nome file:</span>
                                <span class="font-medium truncate ml-2" x-text="currentPhoto?.original_filename"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">Dimensioni:</span>
                                <span x-text="`${currentPhoto?.width || 'N/A'} × ${currentPhoto?.height || 'N/A'} px`"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">Dimensione file:</span>
                                <span x-text="formatFileSize(currentPhoto?.file_size)"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">Data upload:</span>
                                <span x-text="formatDate(currentPhoto?.upload_date)"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Archaeological Data -->
                    <div x-show="currentPhoto?.inventory_number || currentPhoto?.excavation_area || currentPhoto?.material"
                         class="bg-gray-800 bg-opacity-75 rounded-lg p-4">
                        <h4 class="text-lg font-semibold mb-4 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path>
                            </svg>
                            Dati Archeologici
                        </h4>

                        <div class="space-y-2 text-sm">
                            <div x-show="currentPhoto?.inventory_number" class="flex justify-between">
                                <span class="text-gray-400">N. Inventario:</span>
                                <span x-text="currentPhoto?.inventory_number || 'N/A'"></span>
                            </div>
                            <div x-show="currentPhoto?.excavation_area" class="flex justify-between">
                                <span class="text-gray-400">Area di scavo:</span>
                                <span x-text="currentPhoto?.excavation_area || 'N/A'"></span>
                            </div>
                            <div x-show="currentPhoto?.material" class="flex justify-between">
                                <span class="text-gray-400">Materiale:</span>
                                <span x-text="currentPhoto?.material || 'N/A'"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Description -->
                    <div x-show="currentPhoto?.description" class="bg-gray-800 bg-opacity-75 rounded-lg p-4">
                        <h4 class="text-lg font-semibold mb-4 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            Descrizione
                        </h4>
                        <p class="text-gray-300 text-sm leading-relaxed" x-text="currentPhoto?.description || 'Nessuna descrizione'"></p>
                    </div>

                    <!-- Tags -->
                    <div x-show="currentPhoto?.tags && currentPhoto.tags.length > 0" class="bg-gray-800 bg-opacity-75 rounded-lg p-4">
                        <h4 class="text-lg font-semibold mb-4 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                            </svg>
                            Tag
                        </h4>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="tag in currentPhoto?.tags || []" :key="tag">
                                <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-blue-900 text-blue-200" x-text="tag"></span>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 z-50 bg-gradient-to-t from-black/90 via-black/60 to-transparent p-4">
            <div class="flex justify-center items-center space-x-4">
                <!-- Previous Button -->
                <button @click="previousPhoto()"
                        :disabled="currentPhotoIndex <= 0"
                        :class="currentPhotoIndex <= 0 ? 'text-gray-600 cursor-not-allowed opacity-50' : 'text-white hover:text-gray-300 hover:bg-white/10'"
                        class="p-2 rounded-lg transition-colors"
                        aria-label="Foto precedente">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>

                <!-- Thumbnails Navigation -->
                <div class="flex space-x-2 max-w-lg overflow-x-auto px-2">
                    <template x-for="(photo, index) in photos.slice(Math.max(0, currentPhotoIndex - 3), currentPhotoIndex + 4)" :key="photo.id">
                        <div @click="setCurrentPhoto(photos.findIndex(p => p && p.id === photo.id))"
                             :class="photos.findIndex(p => p && p.id === photo.id) === currentPhotoIndex ? 'ring-2 ring-blue-500 scale-110' : 'opacity-70 hover:opacity-100 hover:scale-105'"
                             class="flex-shrink-0 w-14 h-14 bg-gray-800 rounded-lg cursor-pointer transition-all duration-200 overflow-hidden shadow-lg hover:shadow-xl"
                             :aria-label="`Vai a ${photo.filename}`">
                            <img :src="photo.thumbnail_url || photo.file_url"
                                 :alt="photo.filename"
                                 class="w-full h-full object-cover"
                                 loading="lazy">
                        </div>
                    </template>
                </div>

                <!-- Next Button -->
                <button @click="nextPhoto()"
                        :disabled="currentPhotoIndex >= photos.length - 1"
                        :class="currentPhotoIndex >= photos.length - 1 ? 'text-gray-600 cursor-not-allowed opacity-50' : 'text-white hover:text-gray-300 hover:bg-white/10'"
                        class="p-2 rounded-lg transition-colors"
                        aria-label="Foto successiva">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>

            <!-- Photo Counter -->
            <div class="text-center mt-3">
                <span class="text-white text-sm bg-black bg-opacity-50 px-3 py-1 rounded-full">
                    <span x-text="currentPhotoIndex + 1"></span> di <span x-text="photos.length"></span>
                </span>
            </div>
        </div>

        <!-- Mobile Info Panel -->
        <div class="lg:hidden fixed bottom-0 left-0 right-0 z-40"
             x-show="showMobileInfo"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="transform translate-y-full"
             x-transition:enter-end="transform translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="transform translate-y-0"
             x-transition:leave-end="transform translate-y-full"
             style="height: 60vh;">

            <div class="bg-black bg-opacity-95 text-white p-4 h-full overflow-y-auto">
                <div class="flex items-center justify-between mb-4">
                    <h4 class="text-lg font-semibold">Informazioni</h4>
                    <button @click="showMobileInfo = false"
                            class="text-gray-400 hover:text-white p-1 rounded-lg hover:bg-gray-700 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div x-show="currentPhoto" class="space-y-4">
                    <!-- Basic Info -->
                    <div class="bg-gray-800 bg-opacity-75 rounded-lg p-4">
                        <h5 class="font-medium text-gray-300 mb-3">Dettagli Base</h5>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-400">Nome file:</span>
                                <span class="truncate ml-2" x-text="currentPhoto?.original_filename || 'N/A'"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">Dimensioni:</span>
                                <span x-text="`${currentPhoto?.width || 'N/A'} × ${currentPhoto?.height || 'N/A'} px`"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile Info Toggle Button -->
        <div class="lg:hidden fixed bottom-28 right-4 z-50">
            <button @click="showMobileInfo = !showMobileInfo"
                    :class="showMobileInfo ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'"
                    class="text-white p-3 rounded-full shadow-lg transition-colors">
                <svg x-show="!showMobileInfo" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <svg x-show="showMobileInfo" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
