<!-- _delete_modal.html - Componente Modale Conferma Eliminazione Foto -->
<!-- Componente modulare per la conferma di eliminazione di foto archeologiche -->

<!-- Delete Confirmation Modal -->
<div x-show="showDeleteModal"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 bg-gray-600 dark:bg-gray-900 bg-opacity-50 overflow-y-auto h-full w-full z-50"
     x-cloak>

    <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700">
        <div class="mt-3 text-center">
            <!-- Icon -->
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 dark:bg-red-900 mb-4">
                <svg class="h-6 w-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
            </div>

            <!-- Title -->
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mt-4 mb-2">
                Conferma Eliminazione
            </h3>

            <!-- Warning Message -->
            <div class="mb-4 p-3 bg-amber-50 dark:bg-amber-900 border border-amber-200 dark:border-amber-700 rounded-lg">
                <p class="text-sm text-amber-800 dark:text-amber-200 flex items-center">
                    <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                    </svg>
                    <span>Questa azione non può essere annullata</span>
                </p>
            </div>

            <!-- Photo Details (if available) -->
            <template x-if="photoToDelete">
                <div class="mb-4 p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                    <div class="flex items-center space-x-3">
                        <!-- Thumbnail -->
                        <div class="flex-shrink-0">
                            <img :src="photoToDelete.thumbnail_url || photoToDelete.file_url || '/static/img/default-photo.png'"
                                 :alt="photoToDelete.filename || 'Photo'"
                                 class="h-12 w-12 object-cover rounded"
                                 loading="lazy"
                                 @error="this.src='/static/img/default-photo.png'">
                        </div>
                        
                        <!-- Photo Info -->
                        <div class="flex-1 min-w-0 text-left">
                            <p class="text-sm font-medium text-gray-900 dark:text-white truncate" x-text="photoToDelete.original_filename"></p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">
                                <span x-text="formatFileSize(photoToDelete.file_size)"></span>
                                <span class="mx-1">•</span>
                                <span x-text="formatDate(photoToDelete.upload_date, true)"></span>
                            </p>
                            <!-- US Badge -->
                            <span x-show="photoToDelete.source_type === 'us_file'"
                                  class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-purple-100 text-purple-800">
                                <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
                                    <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/>
                                </svg>
                                US File
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Additional Warnings -->
                <div class="mb-4">
                    <p class="text-sm text-red-600 dark:text-red-400">
                        <strong>Attenzione:</strong> 
                        <template x-if="photoToDelete.source_type === 'us_file'">
                            Questa foto è stata caricata da una Unità Stratigrafica e verrà eliminata solo da questa pagina. Per eliminarla completamente, vai alla pagina US corrispondente.
                        </template>
                        <template x-else>
                            La foto e tutti i suoi file verranno eliminati permanentemente dal sistema, incluse:
                        </template>
                    </p>
                    
                    <!-- Deletion Details for regular photos -->
                    <ul x-show="photoToDelete.source_type !== 'us_file'" class="mt-2 text-xs text-gray-600 dark:text-gray-400 space-y-1 ml-4 list-disc">
                        <li>File originale</li>
                        <li>Miniatura (thumbnail)</li>
                        <li>File Deep Zoom tiles (se presenti)</li>
                        <li>Metadati associati</li>
                        <li>Riferimenti in database</li>
                    </ul>
                </div>
            </template>

            <!-- Bulk Delete Warning -->
            <template x-if="isBulkDelete && selectedPhotos.length > 1">
                <div class="mb-4 p-3 bg-red-50 dark:bg-red-900 border border-red-200 dark:border-red-700 rounded-lg">
                    <p class="text-sm text-red-800 dark:text-red-200 font-medium">
                        Eliminazione di massa: <span x-text="selectedPhotos.length"></span> foto
                    </p>
                    <p class="text-xs text-red-600 dark:text-red-400 mt-1">
                        Tutti i file e metadati delle foto selezionate verranno eliminati permanentemente.
                    </p>
                </div>
            </template>

            <!-- Confirmation Text -->
            <p class="text-sm text-gray-600 dark:text-gray-400">
                Sei sicuro di voler procedere con l'eliminazione?
            </p>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-center space-x-3 mt-6">
            <!-- Cancel Button -->
            <button @click="showDeleteModal = false; photoToDelete = null; isBulkDelete = false"
                    class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors">
                <svg class="w-4 h-4 mr-2 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
                Annulla
            </button>

            <!-- Delete Button -->
            <button @click="executeDelete()"
                    :disabled="isDeleting"
                    :class="isDeleting ? 
                        'bg-gray-400 dark:bg-gray-600 cursor-not-allowed' : 
                        'bg-red-600 dark:bg-red-700 hover:bg-red-700 dark:hover:bg-red-800'"
                    class="px-4 py-2 rounded-md text-sm font-medium text-white transition-colors flex items-center">
                <!-- Loading Spinner -->
                <svg x-show="isDeleting" class="animate-spin h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                
                <!-- Button Text -->
                <span x-show="!isDeleting">Elimina</span>
                <span x-show="isDeleting">Eliminazione...</span>
            </button>
        </div>

        <!-- Additional Information -->
        <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
            <div class="text-xs text-gray-500 dark:text-gray-400 text-center">
                <p>
                    <template x-if="photoToDelete && photoToDelete.has_deep_zoom">
                        ⚠️ Questa foto ha Deep Zoom tiles generati che verranno anch'essi eliminati.
                    </template>
                    <template x-if="isBulkDelete && selectedPhotos.length > 1">
                        💡 Suggerimento: considera di esportare un backup prima di eliminare massa foto importanti.
                    </template>
                </p>
                <p class="mt-1">
                    L'operazione potrebbe richiedere alcuni secondi per completare.
                </p>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript Helper Functions -->
<script>
// Funzioni helper per la modale di eliminazione
window.deleteModalHelper = {
    // Apre la modale per eliminazione singola
    showSingleDeleteModal(photo) {
        if (!photo) return;
        
        // Chiudi eventuali altre modal aperte
        document.querySelectorAll('[x-show*="Modal"]').forEach(modal => {
            if (modal._x_dataStack && modal._x_dataStack[0]) {
                modal._x_dataStack[0].showDeleteModal = false;
            }
        });
        
        // Imposta i dati e apre la modale
        Alpine.store('deleteModal', {
            showDeleteModal: true,
            photoToDelete: photo,
            isBulkDelete: false,
            isDeleting: false,
            selectedPhotos: []
        });
        
        // Forza aggiornamento Alpine.js
        document.dispatchEvent(new CustomEvent('delete-modal:show', { detail: { photo } }));
    },
    
    // Apre la modale per eliminazione di massa
    showBulkDeleteModal(photos) {
        if (!photos || photos.length === 0) return;
        
        // Chiudi eventuali altre modal aperte
        document.querySelectorAll('[x-show*="Modal"]').forEach(modal => {
            if (modal._x_dataStack && modal._x_dataStack[0]) {
                modal._x_dataStack[0].showDeleteModal = false;
            }
        });
        
        // Imposta i dati e apre la modale
        Alpine.store('deleteModal', {
            showDeleteModal: true,
            photoToDelete: null,
            isBulkDelete: true,
            isDeleting: false,
            selectedPhotos: photos
        });
        
        // Forza aggiornamento Alpine.js
        document.dispatchEvent(new CustomEvent('delete-modal:show-bulk', { detail: { photos } }));
    },
    
    // Chiudi la modale
    closeModal() {
        Alpine.store('deleteModal', {
            showDeleteModal: false,
            photoToDelete: null,
            isBulkDelete: false,
            isDeleting: false,
            selectedPhotos: []
        });
        
        document.dispatchEvent(new CustomEvent('delete-modal:close'));
    },
    
    // Formatta dimensione file
    formatFileSize(bytes) {
        if (!bytes) return 'N/A';
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        return Math.round(bytes / Math.pow(1024, i) * 100) / 100 + ' ' + sizes[i];
    },
    
    // Formatta data
    formatDate(dateString, short = false) {
        if (!dateString) return 'N/A';
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return 'N/A';
        return short
            ? date.toLocaleDateString('it-IT')
            : date.toLocaleString('it-IT');
    }
};

// Event listeners globali per la modale di eliminazione
document.addEventListener('DOMContentLoaded', function() {
    // Chiudi modale con ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const deleteModalStore = Alpine.store('deleteModal');
            if (deleteModalStore && deleteModalStore.showDeleteModal) {
                window.deleteModalHelper.closeModal();
            }
        }
    });
    
    // Gestione custom events
    document.addEventListener('delete-modal:show', function(e) {
        console.log('Delete modal opened for photo:', e.detail.photo);
    });
    
    document.addEventListener('delete-modal:show-bulk', function(e) {
        console.log('Bulk delete modal opened for photos:', e.detail.photos);
    });
    
    document.addEventListener('delete-modal:close', function() {
        console.log('Delete modal closed');
    });
    
    document.addEventListener('delete-modal:execute', function(e) {
        console.log('Delete operation executed:', e.detail);
    });
});

// Utility per debug e testing
window.deleteModalDebug = {
    // Apre modale di test con dati fake
    showTestModal() {
        const testPhoto = {
            id: 'test-123',
            original_filename: 'test_photo.jpg',
            file_size: 2048576, // 2MB
            upload_date: new Date().toISOString(),
            thumbnail_url: '/static/img/test-thumb.jpg',
            file_url: '/static/img/test-photo.jpg',
            source_type: 'photo',
            has_deep_zoom: true
        };
        
        window.deleteModalHelper.showSingleDeleteModal(testPhoto);
    },
    
    // Test eliminazione massa
    showTestBulkModal() {
        const testPhotos = Array.from({ length: 5 }, (_, i) => ({
            id: `test-${i}`,
            original_filename: `test_photo_${i}.jpg`,
            file_size: 1024 * 1024 * (i + 1),
            upload_date: new Date().toISOString(),
            source_type: 'photo'
        }));
        
        window.deleteModalHelper.showBulkDeleteModal(testPhotos);
    },
    
    // Stampa stato corrente della modale
    logState() {
        const store = Alpine.store('deleteModal');
        console.log('Current delete modal state:', store);
    }
};
</script>

<!-- Stili specifici per la modale di eliminazione -->
<style>
.delete-modal-backdrop {
    backdrop-filter: blur(4px);
}

.delete-modal-container {
    animation: modalSlideIn 0.3s ease-out;
}

@keyframes modalSlideIn {
    from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.delete-photo-thumbnail {
    transition: transform 0.2s ease;
}

.delete-photo-thumbnail:hover {
    transform: scale(1.05);
}

/* Focus states per accessibilità */
.delete-modal-container button:focus-visible {
    outline: 2px solid #dc2626;
    outline-offset: 2px;
}

/* Dark mode specific styles */
@media (prefers-color-scheme: dark) {
    .delete-modal-container {
        background-color: #1f2937;
    }
}

/* Animazioni per stati di caricamento */
.delete-button-loading {
    position: relative;
}

.delete-button-loading::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 12px;
    height: 12px;
    margin: -6px 0 0 -6px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Responsive per mobile */
@media (max-width: 640px) {
    .delete-modal-container {
        width: 90vw;
        max-width: 320px;
        margin: 0 auto;
    }
}
</style>
