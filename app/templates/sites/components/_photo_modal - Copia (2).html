<!-- templates/sites/components/_photo_modal.html - MODAL VISUALIZZATORE FOTO ARCHEOLOGICHE -->
<div x-show="showPhotoModal"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 bg-black overflow-y-auto h-full w-full z-50"
     x-cloak>

    <!-- Header Controls -->
    <div class="fixed top-0 left-0 right-0 z-10 bg-gradient-to-b from-black/80 to-transparent p-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button @click="closePhotoModal()" 
                        class="text-white hover:text-gray-300 transition-colors">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
                <div class="text-white" x-show="currentPhoto">
                    <h3 class="text-lg font-semibold" x-text="currentPhoto?.filename || 'Caricamento...'"></h3>
                    <p class="text-sm text-gray-300" x-text="`${currentPhotoIndex + 1} di ${photos.length}`"></p>
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <!-- Download Button -->
                <button @click="downloadPhoto()" 
                        x-show="currentPhoto"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                    <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Scarica
                </button>

                <!-- View Toggle -->
                <button @click="toggleViewMode()" 
                        class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition-colors">
                    <span x-text="viewMode === 'openseadragon' ? 'Vista Standard' : 'Vista Avanzata'"></span>
                </button>

                <!-- Edit Button (solo per admin/curator) -->
                <button @click="openEditModal()" 
                        x-show="currentPhoto && (userRole === 'admin' || userRole === 'curator')"
                        class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors">
                    <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                    </svg>
                    Modifica
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex h-full">
        <!-- Photo Display Area -->
        <div class="flex-1 flex items-center justify-center p-4 pt-20 relative">
            <!-- Standard Image View -->
            <div x-show="viewMode === 'standard'" class="max-w-full max-h-full relative bg-black">
                <img x-show="currentPhoto"
                     :src="`/sites/{{ site.id }}/photos/${currentPhoto.id}/full`"
                     :alt="currentPhoto?.filename || ''"
                     class="max-w-full max-h-full object-contain cursor-zoom-in transition-transform duration-200"
                     :style="`transform: scale(${zoomLevel}); transform-origin: ${zoomOrigin.x}px ${zoomOrigin.y}px;`"
                     @click="zoomIn()"
                     @wheel="handleZoom($event)"
                     @mousedown="startDrag($event)"
                     @mousemove="drag($event)"
                     @mouseup="stopDrag()"
                     @mouseleave="stopDrag()"
                     x-on:load="imageLoaded = true; initZoom()"
                     x-on:error="imageError = true">
                
                <!-- Zoom Controls Overlay -->
                <div class="absolute top-4 right-4 space-y-2 z-10">
                    <button @click="zoomIn()" class="bg-white p-2 rounded-full shadow-lg hover:bg-gray-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                        </svg>
                    </button>
                    <button @click="zoomOut()" class="bg-white p-2 rounded-full shadow-lg hover:bg-gray-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12a8 8 0 11-16 0 8 8 0 0116 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 8h.01M15 12h.01M15 16h.01M8 12h.01M11 12h.01M14 12h.01"></path>
                        </svg>
                    </button>
                    <button @click="resetZoom()" class="bg-white p-2 rounded-full shadow-lg hover:bg-gray-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Loading State -->
                <div x-show="!imageLoaded && !imageError" class="flex items-center justify-center absolute inset-0 bg-black">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-white"></div>
                </div>

                <!-- Error State -->
                <div x-show="imageError" class="text-white text-center absolute inset-0 flex flex-col items-center justify-center bg-black">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-lg">Errore nel caricamento dell'immagine</p>
                    <button @click="retryLoad()" class="mt-4 bg-blue-600 px-4 py-2 rounded hover:bg-blue-700">Riprova</button>
                </div>
            </div>

            <!-- OpenSeadragon Advanced View -->
            <div x-show="viewMode === 'openseadragon'" class="w-full h-full">
                {% include 'sites/components/_openseadragon_viewer.html' %}
            </div>
        </div>

        <!-- Sidebar Info (solo desktop) -->
        <div class="hidden lg:block w-80 bg-gray-900 bg-opacity-80 p-6 overflow-y-auto">
            <template x-if="currentPhoto">
                <div class="space-y-6">
                    <!-- Photo Information -->
                    <div>
                        <h4 class="text-lg font-semibold text-white mb-3">Informazioni Foto</h4>
                        <div class="space-y-2 text-sm">
                            <div>
                                <span class="text-gray-400">Nome file:</span>
                                <span class="text-white block" x-text="currentPhoto.filename"></span>
                            </div>
                            <div>
                                <span class="text-gray-400">Dimensioni:</span>
                                <span class="text-white block" x-text="`${currentPhoto.width || 'N/A'} × ${currentPhoto.height || 'N/A'} px`"></span>
                            </div>
                            <div>
                                <span class="text-gray-400">Dimensione file:</span>
                                <span class="text-white block" x-text="formatFileSize(currentPhoto.file_size)"></span>
                            </div>
                            <div>
                                <span class="text-gray-400">Data upload:</span>
                                <span class="text-white block" x-text="formatDate(currentPhoto.upload_date)"></span>
                            </div>
                            <div x-show="currentPhoto.photo_type">
                                <span class="text-gray-400">Tipo foto:</span>
                                <span class="text-white block" x-text="currentPhoto.photo_type"></span>
                            </div>
                            <div x-show="currentPhoto.photographer">
                                <span class="text-gray-400">Fotografo:</span>
                                <span class="text-white block" x-text="currentPhoto.photographer"></span>
                            </div>
                            <div x-show="currentPhoto.inventory_number">
                                <span class="text-gray-400">Inventario:</span>
                                <span class="text-white block" x-text="currentPhoto.inventory_number"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Tags -->
                    <div x-show="currentPhoto.tags && currentPhoto.tags.length > 0">
                        <h4 class="text-lg font-semibold text-white mb-3">Tag</h4>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="tag in currentPhoto.tags" :key="tag">
                                <span class="bg-blue-600 text-white px-2 py-1 rounded-full text-xs" x-text="tag"></span>
                            </template>
                        </div>
                    </div>

                    <!-- Description -->
                    <div x-show="currentPhoto.description">
                        <h4 class="text-lg font-semibold text-white mb-3">Descrizione</h4>
                        <p class="text-gray-300 text-sm" x-text="currentPhoto.description"></p>
                    </div>

                    <!-- Archaeological Metadata -->
                    <div x-show="currentPhoto.material || currentPhoto.chronology_period || currentPhoto.excavation_area">
                        <h4 class="text-lg font-semibold text-white mb-3">Metadati Archeologici</h4>
                        <div class="space-y-2 text-sm">
                            <div x-show="currentPhoto.material">
                                <span class="text-gray-400">Materiale:</span>
                                <span class="text-white block" x-text="currentPhoto.material"></span>
                            </div>
                            <div x-show="currentPhoto.chronology_period">
                                <span class="text-gray-400">Periodo cronologico:</span>
                                <span class="text-white block" x-text="currentPhoto.chronology_period"></span>
                            </div>
                            <div x-show="currentPhoto.excavation_area">
                                <span class="text-gray-400">Area scavo:</span>
                                <span class="text-white block" x-text="currentPhoto.excavation_area"></span>
                            </div>
                        </div>
                    </div>

                    <!-- EXIF Metadata -->
                    <div x-show="currentPhoto.metadata">
                        <h4 class="text-lg font-semibold text-white mb-3">Metadati EXIF</h4>
                        <div class="space-y-1 text-xs">
                            <template x-for="[key, value] in Object.entries(currentPhoto.metadata || {})" :key="key">
                                <div class="flex justify-between">
                                    <span class="text-gray-400" x-text="key"></span>
                                    <span class="text-white" x-text="value"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Share Button -->
                    <div>
                        <button @click="sharePhoto()" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                            <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.367 2.684 3 3 0 00-5.367-2.684z"></path>
                            </svg>
                            Condividi
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Navigation Controls -->
    <div class="fixed bottom-0 left-0 right-0 z-10 bg-gradient-to-t from-black/80 to-transparent p-4">
        <div class="flex justify-center items-center space-x-4">
            <!-- Previous Button -->
            <button @click="previousPhoto()" 
                    :disabled="currentPhotoIndex <= 0"
                    :class="currentPhotoIndex <= 0 ? 'text-gray-600 cursor-not-allowed' : 'text-white hover:text-gray-300'"
                    class="transition-colors">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>

            <!-- Thumbnails Navigation -->
            <div class="flex space-x-2 max-w-md overflow-x-auto">
                <template x-for="(photo, index) in photos.slice(Math.max(0, currentPhotoIndex - 2), currentPhotoIndex + 3)" :key="photo.id">
                    <div @click="setCurrentPhoto(photos.indexOf(photo))" 
                         :class="photos.indexOf(photo) === currentPhotoIndex ? 'ring-2 ring-blue-500' : 'opacity-70 hover:opacity-100'"
                         class="flex-shrink-0 w-16 h-16 bg-gray-800 rounded cursor-pointer transition-opacity overflow-hidden">
                        <img :src="photo.thumbnail_url || photo.file_url" 
                             :alt="photo.filename"
                             class="w-full h-full object-cover">
                    </div>
                </template>
            </div>

            <!-- Next Button -->
            <button @click="nextPhoto()" 
                    :disabled="currentPhotoIndex >= photos.length - 1"
                    :class="currentPhotoIndex >= photos.length - 1 ? 'text-gray-600 cursor-not-allowed' : 'text-white hover:text-gray-300'"
                    class="transition-colors">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Mobile Info Panel (sliding up) -->
    <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-gray-900 bg-opacity-95 transform transition-transform duration-300"
         :class="showMobileInfo ? 'translate-y-0' : 'translate-y-full'"
         style="height: 50vh;">
        
        <!-- Handle -->
        <div class="flex justify-center p-2">
            <button @click="showMobileInfo = !showMobileInfo" 
                    class="w-12 h-1 bg-gray-400 rounded-full"></button>
        </div>

        <!-- Content -->
        <div class="p-4 overflow-y-auto h-full">
            <template x-if="currentPhoto">
                <div class="space-y-4 text-white">
                    <h4 class="text-lg font-semibold">Informazioni</h4>
                    <div class="text-sm space-y-2">
                        <div>
                            <span class="text-gray-400">Nome:</span>
                            <span x-text="currentPhoto.filename"></span>
                        </div>
                        <div x-show="currentPhoto.description">
                            <span class="text-gray-400">Descrizione:</span>
                            <p class="mt-1" x-text="currentPhoto.description"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Touch Mobile Info Toggle -->
    <div class="lg:hidden fixed bottom-20 right-4">
        <button @click="showMobileInfo = !showMobileInfo" 
                class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-full shadow-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </button>
    </div>
</div>

<script>
// Photo Modal Functions - parte del photosManager globale
window.photoModalMethods = {
    // Zoom and Pan for Standard View
    zoomLevel: 1,
    zoomOrigin: { x: 0.5, y: 0.5 },
    isDragging: false,
    dragStart: { x: 0, y: 0 },
    dragOffset: { x: 0, y: 0 },

    initZoom() {
        this.zoomLevel = 1;
        this.zoomOrigin = { x: 0.5, y: 0.5 };
        this.dragOffset = { x: 0, y: 0 };
    },

    zoomIn() {
        this.zoomLevel = Math.min(this.zoomLevel + 0.2, 3);
    },

    zoomOut() {
        this.zoomLevel = Math.max(this.zoomLevel - 0.2, 0.5);
    },

    resetZoom() {
        this.initZoom();
    },

    handleZoom(event) {
        event.preventDefault();
        const delta = event.deltaY > 0 ? -0.1 : 0.1;
        this.zoomLevel = Math.max(0.5, Math.min(this.zoomLevel + delta, 3));
        
        // Update origin to zoom towards mouse
        const rect = event.currentTarget.getBoundingClientRect();
        this.zoomOrigin.x = (event.clientX - rect.left) / rect.width;
        this.zoomOrigin.y = (event.clientY - rect.top) / rect.height;
    },

    startDrag(event) {
        if (this.zoomLevel <= 1) return;
        this.isDragging = true;
        this.dragStart.x = event.clientX - this.dragOffset.x;
        this.dragStart.y = event.clientY - this.dragOffset.y;
        event.currentTarget.style.cursor = 'grabbing';
    },

    drag(event) {
        if (!this.isDragging) return;
        this.dragOffset.x = event.clientX - this.dragStart.x;
        this.dragOffset.y = event.clientY - this.dragStart.y;
    },

    stopDrag() {
        this.isDragging = false;
        event.currentTarget.style.cursor = 'grab';
    },

    retryLoad() {
        this.imageLoaded = false;
        this.imageError = false;
        // Force reload by updating src with timestamp
        const img = event.target;
        img.src = img.src + '?t=' + new Date().getTime();
    },

    sharePhoto() {
        if (navigator.share) {
            navigator.share({
                title: this.currentPhoto.filename,
                url: window.location.href
            });
        } else {
            navigator.clipboard.writeText(window.location.href).then(() => {
                this.showAlertMessage('URL copiato negli appunti');
            });
        }
    },

    closePhotoModal() {
        this.showPhotoModal = false;
        this.currentPhoto = null;
        this.currentPhotoIndex = 0;
        this.imageLoaded = false;
        this.imageError = false;
        this.viewMode = 'standard';
        this.showMobileInfo = false;
        this.initZoom();
    },

    setCurrentPhoto(index) {
        if (index >= 0 && index < this.photos.length) {
            this.currentPhotoIndex = index;
            this.currentPhoto = this.photos[index];
            this.imageLoaded = false;
            this.imageError = false;
            this.initZoom();
            
            // Update global reference for OpenSeadragon viewer
            if (window.photosManagerInstance) {
                window.photosManagerInstance.currentPhoto = this.currentPhoto;
                window.photosManagerInstance.currentPhotoIndex = this.currentPhotoIndex;
            }
            
            // Notify OpenSeadragon viewer of photo change
            this.$dispatch('photo-changed', { photo: this.currentPhoto, index: this.currentPhotoIndex });
            
            // Aggiorna URL per deep linking
            const url = new URL(window.location);
            url.searchParams.set('photo', this.currentPhoto.id);
            window.history.replaceState(null, '', url.toString());
        }
    },

    previousPhoto() {
        if (this.currentPhotoIndex > 0) {
            this.setCurrentPhoto(this.currentPhotoIndex - 1);
        }
    },

    nextPhoto() {
        if (this.currentPhotoIndex < this.photos.length - 1) {
            this.setCurrentPhoto(this.currentPhotoIndex + 1);
        }
    },

    toggleViewMode() {
        this.viewMode = this.viewMode === 'standard' ? 'openseadragon' : 'standard';
        
        // If switching to OpenSeadragon, trigger initialization
        if (this.viewMode === 'openseadragon') {
            this.$dispatch('init-openseadragon', { photo: this.currentPhoto, index: this.currentPhotoIndex });
        } else {
            this.initZoom();
        }
    },

    downloadPhoto() {
        if (!this.currentPhoto) return;
        
        const link = document.createElement('a');
        link.href = this.currentPhoto.file_url;
        link.download = this.currentPhoto.filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    },

    openEditModal() {
        if (this.currentPhoto && (this.userRole === 'admin' || this.userRole === 'curator')) {
            this.editingPhoto = { ...this.currentPhoto };
            this.showEditModal = true;
        }
    },

    // Keyboard navigation
    handleKeydown(event) {
        if (!this.showPhotoModal) return;
        
        switch(event.key) {
            case 'Escape':
                this.closePhotoModal();
                break;
            case 'ArrowLeft':
                event.preventDefault();
                this.previousPhoto();
                break;
            case 'ArrowRight':
                event.preventDefault();
                this.nextPhoto();
                break;
            case 'i':
            case 'I':
                this.showMobileInfo = !this.showMobileInfo;
                break;
            case 'd':
            case 'D':
                this.downloadPhoto();
                break;
            case 'v':
            case 'V':
                this.toggleViewMode();
                break;
            case '+':
            case '=':
                event.preventDefault();
                this.zoomIn();
                break;
            case '-':
                event.preventDefault();
                this.zoomOut();
                break;
            case '0':
                event.preventDefault();
                this.resetZoom();
                break;
            case 's':
            case 'S':
                this.sharePhoto();
                break;
        }
    }
};

// Event listeners per keyboard navigation
document.addEventListener('keydown', function(event) {
    // Trova l'istanza Alpine.js attiva
    const photosManager = window.Alpine?.getBinding?.(document.querySelector('[x-data*="photosManager"]'));
    if (photosManager && typeof photosManager.handleKeydown === 'function') {
        photosManager.handleKeydown(event);
    }
});
</script>
