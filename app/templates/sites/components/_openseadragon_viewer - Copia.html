<!-- templates/sites/components/_openseadragon_viewer.html - OPENSEADRAGON IMAGE VIEWER -->
<div id="openseadragon-viewer"
     class="w-full h-full bg-gray-900 relative"
     x-data="openSeadragonViewer()"
     x-init="initViewer()">

    <!-- Loading State -->
    <div x-show="isLoading"
         class="absolute inset-0 flex items-center justify-center bg-gray-900 text-white">
        <div class="text-center">
            <svg class="animate-spin h-8 w-8 text-white mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p>Caricamento immagine...</p>
        </div>
    </div>

    <!-- Error State -->
    <div x-show="hasError"
         class="absolute inset-0 flex items-center justify-center bg-gray-900 text-white">
        <div class="text-center">
            <svg class="h-16 w-16 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
            </svg>
            <p class="text-lg font-medium">Errore nel caricamento dell'immagine</p>
            <p class="text-sm text-gray-400 mt-2">L'immagine potrebbe non essere disponibile</p>
        </div>
    </div>

    <!-- OpenSeadragon Container -->
    <div id="openseadragon-container"
         class="w-full h-full"
         x-show="!isLoading && !hasError"
         x-transition:enter="transition-opacity duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100">
    </div>

    <!-- Controls Overlay -->
    <div x-show="!isLoading && !hasError && viewer"
         class="absolute top-4 left-4 right-4 flex justify-between items-start pointer-events-none">

        <!-- Left Controls -->
        <div class="flex space-x-2 pointer-events-auto">
            <!-- Zoom In -->
            <button @click="zoomIn()"
                    class="p-2 bg-black bg-opacity-50 text-white rounded-full hover:bg-opacity-75 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path>
                </svg>
            </button>

            <!-- Zoom Out -->
            <button @click="zoomOut()"
                    class="p-2 bg-black bg-opacity-50 text-white rounded-full hover:bg-opacity-75 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM7 7v3m0 0v3m0-3h3m-3 0H4"></path>
                </svg>
            </button>

            <!-- Reset Zoom -->
            <button @click="resetZoom()"
                    class="p-2 bg-black bg-opacity-50 text-white rounded-full hover:bg-opacity-75 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </div>

        <!-- Right Controls -->
        <div class="flex space-x-2 pointer-events-auto">
            <!-- Full Screen -->
            <button @click="toggleFullscreen()"
                    class="p-2 bg-black bg-opacity-50 text-white rounded-full hover:bg-opacity-75 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                </svg>
            </button>

            <!-- Close -->
            <button @click="closeViewer()"
                    class="p-2 bg-black bg-opacity-50 text-white rounded-full hover:bg-opacity-75 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Image Info Overlay -->
    <div x-show="!isLoading && !hasError && viewer && showInfo && currentPhoto"
         class="absolute bottom-4 left-4 right-4 bg-black bg-opacity-70 text-white p-4 rounded-lg pointer-events-none"
         x-transition:enter="transition-opacity duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100">

        <div class="flex justify-between items-start">
            <div class="flex-1">
                <h3 class="font-semibold text-lg mb-1"
                    x-text="currentPhoto ? (currentPhoto.title || currentPhoto.filename || 'Immagine senza titolo') : 'Immagine non disponibile'"></h3>
                <div class="flex items-center space-x-4 text-sm">
                    <span x-show="currentPhoto && currentPhoto.inventory_number"
                          x-text="'N. Inv: ' + currentPhoto.inventory_number"></span>
                    <span x-show="currentPhoto && currentPhoto.material"
                          x-text="currentPhoto.material"></span>
                    <span x-show="currentPhoto && currentPhoto.resolution"
                          x-text="currentPhoto.resolution"></span>
                </div>
            </div>

            <!-- Navigation Info -->
            <div class="text-right text-sm">
                <div x-text="(currentIndex + 1) + ' / ' + totalPhotos"></div>
                <div x-show="currentPhoto && currentPhoto.photo_date"
                     x-text="formatDate(currentPhoto.photo_date)"
                     class="text-xs text-gray-300"></div>
            </div>
        </div>
    </div>

    <!-- Keyboard Shortcuts Info -->
    <div x-show="!isLoading && !hasError && viewer && showShortcuts"
         class="absolute bottom-4 right-4 bg-black bg-opacity-50 text-white text-xs p-2 rounded pointer-events-none"
         x-transition:enter="transition-opacity duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100">

        <div class="grid grid-cols-2 gap-2">
            <div>← →</div><div>Naviga</div>
            <div>+ -</div><div>Zoom</div>
            <div>0</div><div>Reset</div>
            <div>F</div><div>Fullscreen</div>
            <div>Esc</div><div>Chiudi</div>
            <div>I</div><div>Info</div>
        </div>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('openSeadragonViewer', () => ({
        // State
        viewer: null,
        isLoading: true,
        hasError: false,
        showInfo: true,
        showShortcuts: false,
        currentPhoto: null,
        currentIndex: 0,
        totalPhotos: 0,

        // Configuration
        tileSources: null,

        init() {
            // Wait for the component to be visible and then initialize
            this.$nextTick(() => {
                this.setupKeyboardShortcuts();
                // Get initial data from parent with retry logic
                this.initializeViewer();
            });
        },

        initializeViewer() {
            // Try to get parent data multiple times in case of timing issues
            let attempts = 0;
            const maxAttempts = 10;

            const tryInit = () => {
                attempts++;
                if (this.getParentData() && this.currentPhoto) {
                    this.initializeViewer();
                } else if (attempts < maxAttempts) {
                    setTimeout(tryInit, 100 * attempts); // Exponential backoff
                } else {
                    console.warn('Could not initialize OpenSeadragon viewer - no photo data available');
                    this.isLoading = false;
                    this.hasError = true;
                }
            };

            tryInit();
        },

        setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (!this.viewer) return;

                switch(e.key) {
                    case 'ArrowLeft':
                        e.preventDefault();
                        this.previousPhoto();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        this.nextPhoto();
                        break;
                    case '+':
                    case '=':
                        e.preventDefault();
                        this.zoomIn();
                        break;
                    case '-':
                        e.preventDefault();
                        this.zoomOut();
                        break;
                    case '0':
                        e.preventDefault();
                        this.resetZoom();
                        break;
                    case 'f':
                    case 'F':
                        e.preventDefault();
                        this.toggleFullscreen();
                        break;
                    case 'i':
                    case 'I':
                        e.preventDefault();
                        this.toggleInfo();
                        break;
                    case '?':
                        e.preventDefault();
                        this.toggleShortcuts();
                        break;
                    case 'Escape':
                        e.preventDefault();
                        this.closeViewer();
                        break;
                }
            });
        },

        async initViewer() {
            if (!this.currentPhoto) return;

            this.isLoading = true;
            this.hasError = false;

            try {
                // Check if deep zoom is available for this photo
                const deepZoomInfo = await this.getDeepZoomInfo();

                let tileSource;
                if (deepZoomInfo && deepZoomInfo.available) {
                    // Use deep zoom tiles with individual tile URLs
                    tileSource = {
                        type: 'zoomifytileservice',
                        width: deepZoomInfo.width,
                        height: deepZoomInfo.height,
                        tilesUrl: `/api/sites/${this.currentPhoto.site_id}/photos/${this.currentPhoto.id}/deepzoom/tiles/`
                    };
                    console.log('Using deep zoom tiles:', tileSource);
                } else {
                    // Fallback to basic image
                    const imageUrl = `/photos/${this.currentPhoto.id}/full`;
                    tileSource = {
                        type: 'image',
                        url: imageUrl,
                        buildPyramid: false
                    };
                    console.log('Using basic image:', imageUrl);
                }

                // Initialize OpenSeadragon viewer with deep zoom optimized settings
                this.viewer = OpenSeadragon({
                    id: 'openseadragon-container',
                    prefixUrl: 'https://openseadragon.github.io/openseadragon/images/',
                    tileSources: tileSource,
                    showNavigationControl: false, // Custom controls
                    showNavigator: true,
                    navigatorPosition: 'BOTTOM_RIGHT',
                    navigatorSizeRatio: 0.15,
                    minZoomLevel: deepZoomInfo && deepZoomInfo.available ? 0.1 : 0.5,
                    maxZoomLevel: deepZoomInfo && deepZoomInfo.available ? 50 : 10,
                    defaultZoomLevel: 1,
                    zoomInButton: 'zoom-in',
                    zoomOutButton: 'zoom-out',
                    homeButton: 'home',
                    fullPageButton: 'full-page',
                    nextButton: 'next',
                    previousButton: 'previous',
                    sequenceMode: false,
                    preserveViewport: true,
                    visibilityRatio: 1,
                    constrainDuringPan: true,
                    animationTime: 0.3,
                    blendTime: 0.1,
                    alwaysBlend: false,
                    autoHideControls: true,
                    immediateRender: false,
                    placement: 'center',
                    debugMode: false,
                    // Deep zoom specific settings
                    tileRetryMax: 3,
                    tileRetryDelay: 1000,
                    loadTilesWithAjax: true,
                    ajaxWithCredentials: false,
                    crossOriginPolicy: 'Anonymous'
                });

                // Setup event handlers
                this.viewer.addHandler('open', () => {
                    this.isLoading = false;
                    console.log('OpenSeadragon viewer opened successfully');
                });

                this.viewer.addHandler('open-failed', (error) => {
                    console.error('OpenSeadragon failed to open image:', error);
                    this.isLoading = false;
                    this.hasError = true;
                });

                this.viewer.addHandler('zoom', (event) => {
                    // Update zoom level display if needed
                    console.log('Zoom level:', event.zoom);
                });

            } catch (error) {
                console.error('Error initializing OpenSeadragon viewer:', error);
                this.isLoading = false;
                this.hasError = true;
            }
        },

        destroyViewer() {
            if (this.viewer) {
                this.viewer.destroy();
                this.viewer = null;
            }
        },

        // Navigation methods
        get hasPrevious() {
            return this.currentIndex > 0;
        },

        get hasNext() {
            return this.currentIndex < this.totalPhotos - 1;
        },

        previousPhoto() {
            if (this.hasPrevious) {
                this.currentIndex--;
                this.loadPhoto(this.currentIndex);
            }
        },

        nextPhoto() {
            if (this.hasNext) {
                this.currentIndex++;
                this.loadPhoto(this.currentIndex);
            }
        },

        loadPhoto(index) {
            // Get data from parent component
            if (this.getParentData()) {
                this.destroyViewer();
                this.initViewer();
            }
        },

        // Method to get data from parent component
        getParentData() {
            try {
                // Try to get data from the parent photosManager component
                if (window.Alpine && window.Alpine.store('photosManager')) {
                    const store = window.Alpine.store('photosManager');
                    if (store.selectedPhoto) {
                        this.currentPhoto = store.selectedPhoto;
                        this.currentIndex = store.filteredPhotos ?
                            store.filteredPhotos.findIndex(p => p.id === store.selectedPhoto.id) : 0;
                        this.totalPhotos = store.filteredPhotos ? store.filteredPhotos.length : 0;
                        return true;
                    }
                }

                // Fallback: try to get from parent element data attributes
                const modal = document.querySelector('[x-data*="showPhotoModal"]');
                if (modal && modal._x_dataStack) {
                    const parentData = modal._x_dataStack[modal._x_dataStack.length - 1];
                    if (parentData && parentData.selectedPhoto) {
                        this.currentPhoto = parentData.selectedPhoto;
                        this.currentIndex = parentData.filteredPhotos ?
                            parentData.filteredPhotos.findIndex(p => p.id === parentData.selectedPhoto.id) : 0;
                        this.totalPhotos = parentData.filteredPhotos ? parentData.filteredPhotos.length : 0;
                        return true;
                    }
                }

                return false;
            } catch (error) {
                console.warn('Error getting parent data:', error);
                return false;
            }
        },

        // Get deep zoom information for current photo
        async getDeepZoomInfo() {
            if (!this.currentPhoto) return null;

            try {
                const response = await fetch(`/api/sites/${this.currentPhoto.site_id}/photos/${this.currentPhoto.id}/deepzoom/info`);
                if (response.ok) {
                    const data = await response.json();
                    return {
                        available: true,
                        width: data.width,
                        height: data.height,
                        levels: data.levels,
                        tileSize: data.tile_size || 256
                    };
                } else {
                    console.log('Deep zoom not available for this photo');
                    return { available: false };
                }
            } catch (error) {
                console.warn('Error checking deep zoom availability:', error);
                return { available: false };
            }
        },

        // Zoom controls
        zoomIn() {
            if (this.viewer) {
                this.viewer.viewport.zoomBy(2);
            }
        },

        zoomOut() {
            if (this.viewer) {
                this.viewer.viewport.zoomBy(0.5);
            }
        },

        resetZoom() {
            if (this.viewer) {
                this.viewer.viewport.goHome();
            }
        },

        // UI controls
        toggleFullscreen() {
            if (this.viewer) {
                this.viewer.setFullScreen(!this.viewer.isFullPage());
            }
        },

        toggleInfo() {
            this.showInfo = !this.showInfo;
        },

        toggleShortcuts() {
            this.showShortcuts = !this.showShortcuts;
        },

        closeViewer() {
            this.destroyViewer();
            // Try to close the parent modal
            try {
                const modal = document.querySelector('[x-data*="showPhotoModal"]');
                if (modal && modal._x_dataStack) {
                    const parentData = modal._x_dataStack[modal._x_dataStack.length - 1];
                    if (parentData && parentData.showPhotoModal !== undefined) {
                        parentData.showPhotoModal = false;
                    }
                }
            } catch (error) {
                console.warn('Error closing viewer:', error);
            }
        },

        // Helper functions with null checks
        hasArchaeologicalData() {
            const photo = this.currentPhoto;
            return photo && (
                photo.inventory_number ||
                photo.excavation_area ||
                photo.stratigraphic_unit ||
                photo.find_date
            );
        },

        hasObjectData() {
            const photo = this.currentPhoto;
            return photo && (
                photo.material ||
                photo.object_type ||
                photo.chronology_period ||
                photo.conservation_status ||
                photo.dimensions_display
            );
        },

        getPhotoTypeDisplay(type) {
            if (!type) return '';
            const types = {
                'vista_generale': 'Vista Generale',
                'dettaglio': 'Dettaglio',
                'sezione': 'Sezione',
                'contesto_rinvenimento': 'Contesto Rinvenimento',
                'pre_restauro': 'Pre-Restauro',
                'post_restauro': 'Post-Restauro',
                'laboratorio': 'Laboratorio',
                'stratigrafia': 'Stratigrafia'
            };
            return types[type] || type;
        },

        getKeywords() {
            if (!this.currentPhoto || !this.currentPhoto.keywords) return [];
            try {
                const keywords = JSON.parse(this.currentPhoto.keywords);
                return Array.isArray(keywords) ? keywords : [];
            } catch {
                return this.currentPhoto.keywords.split(',').map(k => k.trim()).filter(k => k);
            }
        },

        // Utility methods
        formatDate(dateString) {
            if (!dateString) return '';
            return new Date(dateString).toLocaleDateString('it-IT', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
    }));
});
</script>
