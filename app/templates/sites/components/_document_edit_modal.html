<!-- templates/sites/components/_document_edit_modal.html - MODIFICA DOCUMENTI -->
<div x-show="showEditModal"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 bg-black bg-opacity-50 overflow-y-auto h-full w-full z-50"
     @click.self="showEditModal = false">

    <div
        class="relative top-20 mx-auto p-5 border w-full max-w-2xl shadow-lg rounded-md bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4 pb-3 border-b border-gray-200 dark:border-gray-700">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                    </path>
                </svg>
                Modifica documento
            </h3>
            <button @click="showEditModal = false"
                class="text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Current File Info -->
        <div x-show="editDocument"
            class="mb-4 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-lg border border-blue-200 dark:border-blue-800">
            <div class="flex items-center">
                <svg class="w-10 h-10 text-blue-600 dark:text-blue-400 mr-3" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                    </path>
                </svg>
                <div class="flex-1">
                    <p class="font-medium text-gray-900 dark:text-white"
                        x-text="editDocument ? editDocument.filename : ''"></p>
                    <p class="text-sm text-gray-600 dark:text-gray-300">
                        Caricato il <span
                            x-text="editDocument ? new Date(editDocument.uploaded_at).toLocaleDateString('it-IT') : ''"></span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Edit Form -->
        <form @submit.prevent="saveDocumentEdits()">
            <!-- Only render form when editDocument is properly initialized -->
            <template x-if="editDocument">
                <div class="space-y-4 mb-6">
                    <!-- Title -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                            Titolo documento <span class="text-red-600">*</span>
                        </label>
                        <input type="text" x-model="editDocument.title" required
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                            placeholder="Es: Relazione di scavo 2024">
                    </div>

                    <!-- Description -->
                    <div>
                        <label
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Descrizione</label>
                        <textarea x-model="editDocument.description" rows="4"
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                            placeholder="Breve descrizione del contenuto..."></textarea>
                    </div>

                    <!-- Category and Type -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                                Categoria <span class="text-red-600">*</span>
                            </label>
                            <select x-model="editDocument.category" required
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                                <option value="">Seleziona...</option>
                                <option value="relazioni">Relazioni di scavo</option>
                                <option value="documentazione">Documentazione fotografica</option>
                                <option value="planimetrie">Planimetrie e rilievi</option>
                                <option value="pubblicazioni">Pubblicazioni</option>
                                <option value="amministrativi">Documenti amministrativi</option>
                                <option value="altro">Altro</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tipo
                                documento</label>
                            <select x-model="editDocument.doc_type"
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                                <option value="">Seleziona...</option>
                                <option value="pdf">PDF</option>
                                <option value="word">Word</option>
                                <option value="excel">Excel</option>
                                <option value="image">Immagine</option>
                                <option value="cad">CAD/DWG</option>
                                <option value="gis">GIS</option>
                                <option value="archive">Archivio</option>
                            </select>
                        </div>
                    </div>

                    <!-- Tags -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tag</label>
                        <input type="text" x-model="editDocument.tags"
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                            placeholder="scavo, ceramica, us, etc. (separa con virgola)">
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Inserisci parole chiave separate da
                            virgola</p>
                    </div>

                    <!-- Date and Author -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Data documento</label>
                            <input type="date" x-model="editDocument.doc_date"
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Autore</label>
                            <input type="text" x-model="editDocument.author"
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                                placeholder="Nome autore">
                        </div>
                    </div>

                    <!-- Visibility -->
                    <div>
                        <label class="flex items-center">
                            <input type="checkbox" x-model="editDocument.is_public"
                                class="w-4 h-4 text-blue-600 border-gray-300 dark:border-gray-600 rounded focus:ring-blue-500 focus:ring-blue-500 dark:focus:ring-blue-400 bg-white dark:bg-gray-700">
                            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Documento pubblico (visibile a
                                tutti i membri del team)</span>
                        </label>
                    </div>

                    <!-- Replace File Option -->
                    <div class="pt-4 border-t border-gray-200 dark:border-gray-700">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Sostituisci
                            file</label>
                        <div class="flex items-center space-x-3">
                            <input type="file" id="replace-file" @change="handleReplaceFile($event)"
                                accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.tif,.tiff,.zip" class="hidden">
                            <label for="replace-file"
                                class="px-4 py-2 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 cursor-pointer flex items-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                                </svg>
                                Scegli nuovo file
                            </label>
                            <span x-show="replaceFile" class="text-sm text-gray-600 dark:text-gray-400"
                                x-text="replaceFile ? replaceFile.name : ''"></span>
                        </div>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Opzionale: carica un nuovo file per
                            sostituire quello esistente</p>
                    </div>

                    <!-- Version Notes (if replacing) -->
                    <div x-show="replaceFile">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Note
                            versione</label>
                        <textarea x-model="editDocument.version_notes" rows="2"
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                            placeholder="Descrivi le modifiche apportate in questa versione..."></textarea>
                    </div>
                </div>
            </template>



            <!-- Show loading state if editDocument is null -->
            <div x-show="!editDocument" class="py-8 text-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-gray-600 dark:text-gray-300">Caricamento documento...</p>
            </div>

            <!-- Actions -->
            <div class="flex justify-between pt-4 border-t border-gray-200 dark:border-gray-700">
                <button type="button" @click="editDocument && deleteDocument(editDocument.id)"
                    class="px-4 py-2 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/40 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                        </path>
                    </svg>
                    Elimina documento
                </button>

                <div class="flex space-x-3">
                    <button type="button" @click="showEditModal = false; replaceFile = null"
                        class="px-4 py-2 text-gray-700 dark:text-gray-200 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600">
                        Annulla
                    </button>
                    <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                        Salva modifiche
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
