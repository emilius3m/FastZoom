<!-- templates/sites/components/_form_builder_script.html - FORM BUILDER ALPINE.JS COMPONENTS -->
<!--
    Script Alpine.js per il Form Builder.
    Include i componenti 'formBuilder' e 'dynamicFormRenderer'.
    
    Uso: {% include 'sites/components/_form_builder_script.html' %}
    
    NOTA: Richiede che il template che include questo file fornisca:
    - site.id (variabile Jinja2)
    - form_schemas (variabile Jinja2, opzionale, default: [])
-->

<script>
    document.addEventListener('alpine:init', () => {
        // Form Builder Component
        Alpine.data('formBuilder', () => ({
            // Palette di componenti disponibili
            availableComponents: [
                { type: 'text', label: 'Testo', icon: '📝' },
                { type: 'textarea', label: 'Area Testo', icon: '📄' },
                { type: 'select', label: 'Menu a Tendina', icon: '📋' },
                { type: 'multiselect', label: 'Selezione Multipla', icon: '☑️' },
                { type: 'number', label: 'Numero', icon: '🔢' },
                { type: 'date', label: 'Data', icon: '📅' },
                { type: 'file', label: 'File Upload', icon: '📎' },
                { type: 'radio', label: 'Radio Button', icon: '◉' },
                { type: 'checkbox', label: 'Checkbox', icon: '✅' },
                { type: 'group', label: 'Gruppo Campi', icon: '📦' }
            ],

            // Form schemas esistenti (caricati dal server)
            existingSchemas: {{ form_schemas | tojson if form_schemas else '[]'
    }},

        // Form in costruzione
        formSchema: {
        id: '',
        name: '',
        category: 'artifact',
        fields: []
    },

        // Stato editing
        isEditing: false,
        currentSchemaId: null,

        selectedField: null,
        draggedComponent: null,
        showPreviewModal: false,
        showFillModal: false,
        fillingSchema: null,

        // Nuovo form
        createNewForm() {
        this.formSchema = {
            id: '',
            name: '',
            category: 'artifact',
            fields: []
        };
        this.isEditing = false;
        this.currentSchemaId = null;
        this.selectedField = null;

        // Feedback utente
        this.showNotification('Nuovo form pronto. Inserisci un nome e trascina i componenti.', 'info');

        // Focus sul campo nome
        this.$nextTick(() => {
            const nameInput = document.querySelector('input[placeholder="Nome del Modulo..."]');
            if (nameInput) nameInput.focus();
        });
    },

        // Carica schemas esistente per modifica
        loadExistingSchema(schema) {
        this.formSchema = {
            id: schema.id,
            name: schema.name,
            category: schema.category,
            fields: [...schema.schema.fields] // Clone the fields array
        };
        this.isEditing = true;
        this.currentSchemaId = schema.id;
        this.selectedField = null;
    },

        // Elimina schemas
        async deleteSchema(schemaId) {
            if(!confirm('Sei sicuro di voler eliminare questo form?')) return;

    try {
        const response = await fetch(`/api/v1/sites/{{ site.id }}/form-schemas/${schemaId}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            // Rimuovi dalla lista locale
            this.existingSchemas = this.existingSchemas.filter(s => s.id !== schemaId);

            // Se stava modificando questo schemas, reset
            if (this.currentSchemaId === schemaId) {
                this.createNewForm();
            }

            alert('Form eliminato con successo!');
        } else {
            alert('Errore nell\'eliminazione del form');
        }
    } catch (error) {
        console.error('Error deleting schema:', error);
        alert('Errore nell\'eliminazione del form');
    }
        },

    // Drag & Drop Handlers
    startDrag(component, event) {
        this.draggedComponent = component;
        event.dataTransfer.effectAllowed = 'copy';
    },

    allowDrop(event) {
        event.preventDefault();
    },

    dropComponent(event) {
        event.preventDefault();
        if (this.draggedComponent) {
            const newField = this.createFieldFromComponent(this.draggedComponent);
            this.formSchema.fields.push(newField);
            this.draggedComponent = null;
        }
    },

    createFieldFromComponent(component) {
        const fieldId = 'field_' + Date.now();
        const baseField = {
            id: fieldId,
            type: component.type,
            label: component.label,
            required: false
        };

        // Configurazioni specifiche per tipo
        switch (component.type) {
            case 'select':
            case 'multiselect':
            case 'radio':
                baseField.options = [
                    { value: 'option1', label: 'Opzione 1' }
                ];
                break;
            case 'number':
                baseField.min = 0;
                baseField.step = 1;
                break;
            case 'file':
                baseField.accept = '*/*';
                baseField.multiple = false;
                break;
            case 'group':
                baseField.fields = [];
                break;
        }

        return baseField;
    },

    // Field Management
    selectField(field) {
        this.selectedField = field;
    },

    removeField(index) {
        this.formSchema.fields.splice(index, 1);
        this.selectedField = null;
    },

    moveFieldUp(index) {
        if (index > 0) {
            const field = this.formSchema.fields.splice(index, 1)[0];
            this.formSchema.fields.splice(index - 1, 0, field);
        }
    },

    moveFieldDown(index) {
        if (index < this.formSchema.fields.length - 1) {
            const field = this.formSchema.fields.splice(index, 1)[0];
            this.formSchema.fields.splice(index + 1, 0, field);
        }
    },

    // Add option to select/multiselect/radio
    addOption(field) {
        if (!field.options) field.options = [];
        field.options.push({
            value: 'new_option',
            label: 'Nuova Opzione'
        });
    },

    removeOption(field, index) {
        field.options.splice(index, 1);
    },

        // Save Form Schema
        async saveFormSchema() {
        try {
            if (!this.formSchema.name) {
                alert('Inserisci un nome per il form');
                return;
            }

            if (this.formSchema.fields.length === 0) {
                alert('Aggiungi almeno un campo al form');
                return;
            }

            const response = await fetch(`/api/v1/sites/{{ site.id }}/form-schemas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.formSchema)
            });

            if (response.ok) {
                const result = await response.json();

                if (this.isEditing) {
                    // Update existing schemas in the list
                    const index = this.existingSchemas.findIndex(s => s.id === this.currentSchemaId);
                    if (index !== -1) {
                        this.existingSchemas[index] = {
                            id: result.schema_id,
                            name: this.formSchema.name,
                            description: this.formSchema.description || '',
                            category: this.formSchema.category,
                            schema: this.formSchema
                        };
                    }
                    alert('Form aggiornato con successo!');
                } else {
                    // Add new schemas to the list
                    this.existingSchemas.unshift({
                        id: result.schema_id,
                        name: this.formSchema.name,
                        description: this.formSchema.description || '',
                        category: this.formSchema.category,
                        schema: this.formSchema
                    });
                    alert('Form salvato con successo!');

                    // Switch to editing mode
                    this.isEditing = true;
                    this.currentSchemaId = result.schema_id;
                    this.formSchema.id = result.schema_id;
                }
            } else {
                const error = await response.json();
                alert('Errore nel salvataggio: ' + (error.detail || 'Errore sconosciuto'));
            }
        } catch (error) {
            console.error('Error saving schema:', error);
            alert('Errore nel salvataggio dello schema');
        }
    },

    // Preview Form
    previewForm() {
        if (this.formSchema.fields.length === 0) {
            alert('Aggiungi almeno un campo per visualizzare l\'anteprima');
            return;
        }
        this.showPreviewModal = true;
    },

    // Field Preview Renderer
    renderFieldPreview(field) {
        switch (field.type) {
            case 'text':
                return `<input type="text" class="w-full border-gray-300 rounded text-sm" placeholder="${field.label}" disabled>`;

            case 'textarea':
                return `<textarea class="w-full border-gray-300 rounded text-sm" rows="3" placeholder="${field.label}" disabled></textarea>`;

            case 'select':
                const options = field.options?.map(opt => `<option>${opt.label}</option>`).join('') || '<option>Opzione esempio</option>';
                return `<select class="w-full border-gray-300 rounded text-sm" disabled>${options}</select>`;

            case 'multiselect':
                const multiOptions = field.options?.map(opt =>
                    `<label class="flex items-center text-xs"><input type="checkbox" class="mr-1" disabled> ${opt.label}</label>`
                ).join('<br>') || '<label class="flex items-center text-xs"><input type="checkbox" class="mr-1" disabled> Opzione esempio</label>';
                return `<div class="space-y-1">${multiOptions}</div>`;

            case 'radio':
                const radioOptions = field.options?.map((opt, idx) =>
                    `<label class="flex items-center text-xs"><input type="radio" name="${field.id}_preview" class="mr-1" disabled> ${opt.label}</label>`
                ).join('<br>') || '<label class="flex items-center text-xs"><input type="radio" class="mr-1" disabled> Opzione esempio</label>';
                return `<div class="space-y-1">${radioOptions}</div>`;

            case 'number':
                return `<input type="number" class="w-full border-gray-300 rounded text-sm" placeholder="0" disabled>`;

            case 'date':
                return `<input type="date" class="w-full border-gray-300 rounded text-sm" disabled>`;

            case 'file':
                return `<div class="border-2 border-dashed border-gray-300 rounded p-4 text-center text-sm text-gray-500">
                                📎 ${field.multiple ? 'Seleziona files' : 'Seleziona file'}
                            </div>`;

            case 'checkbox':
                return `<label class="flex items-center text-sm"><input type="checkbox" class="mr-2" disabled> ${field.label}</label>`;

            default:
                return `<div class="text-gray-400 text-sm">Preview ${field.type}</div>`;
        }
    },

    // Notification system
    showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-x-full`;

        const colors = {
            success: 'bg-green-500 text-white',
            error: 'bg-red-500 text-white',
            warning: 'bg-yellow-500 text-white',
            info: 'bg-blue-500 text-white'
        };

        notification.className += ' ' + (colors[type] || colors.info);
        notification.innerHTML = `
                <div class="flex items-center">
                    <span class="mr-2">${type === 'success' ? '✓' : type === 'error' ? '✗' : type === 'warning' ? '⚠' : 'ℹ'}</span>
                    <span>${message}</span>
                </div>
            `;

        document.body.appendChild(notification);

        setTimeout(() => {
            notification.classList.remove('translate-x-full');
            notification.classList.add('translate-x-0');
        }, 100);

        setTimeout(() => {
            notification.classList.add('translate-x-full');
            setTimeout(() => {
                document.body.removeChild(notification);
            }, 300);
        }, 3000);
    }
    }));

    // Dynamic Form Renderer Component
    Alpine.data('dynamicFormRenderer', (schema) => ({
        schema: schema,
        formData: {},
        isSubmitting: false,

        init() {
            this.initializeFormData();
            this.$watch('schema', () => this.initializeFormData());

            // Listen for close preview event
            this.$el.addEventListener('close-preview', () => {
                this.$parent.showPreviewModal = false;
            });
        },

        initializeFormData() {
            this.formData = {};
            if (this.schema && this.schema.fields) {
                this.schema.fields.forEach(field => {
                    this.formData[field.id] = this.getDefaultValue(field);
                });
            }
        },

        getDefaultValue(field) {
            switch (field.type) {
                case 'multiselect':
                    return [];
                case 'number':
                    return field.min || 0;
                case 'checkbox':
                    return false;
                case 'file':
                    return field.multiple ? [] : null;
                default:
                    return '';
            }
        },

        async submitForm() {
            try {
                this.isSubmitting = true;
                console.log('Form Data:', this.formData);
                alert('Dati del form inviati! Controlla la console per i dettagli.');
                this.$dispatch('close-preview');
            } catch (error) {
                console.error('Form submission error:', error);
                alert('Errore nell\'invio del form');
            } finally {
                this.isSubmitting = false;
            }
        },

        renderFormField(field) {
            const required = field.required ? 'required' : '';
            const requiredStar = field.required ? '<span class="text-red-500">*</span>' : '';

            switch (field.type) {
                case 'text':
                    return `
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            ${field.label} ${requiredStar}
                        </label>
                        <input type="text"
                               x-model="formData['${field.id}']"
                               class="w-full border-gray-300 rounded-md"
                               ${required}>
                    `;

                case 'textarea':
                    return `
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            ${field.label} ${requiredStar}
                        </label>
                        <textarea x-model="formData['${field.id}']"
                                  class="w-full border-gray-300 rounded-md"
                                  rows="3"
                                  ${required}></textarea>
                    `;

                case 'select':
                    const selectOptions = field.options?.map(opt =>
                        `<option value="${opt.value}">${opt.label}</option>`
                    ).join('') || '';
                    return `
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            ${field.label} ${requiredStar}
                        </label>
                        <select x-model="formData['${field.id}']"
                                class="w-full border-gray-300 rounded-md"
                                ${required}>
                            <option value="">Seleziona...</option>
                            ${selectOptions}
                        </select>
                    `;

                case 'number':
                    return `
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            ${field.label} ${requiredStar}
                        </label>
                        <input type="number"
                               x-model="formData['${field.id}']"
                               class="w-full border-gray-300 rounded-md"
                               min="${field.min || ''}"
                               step="${field.step || 1}"
                               ${required}>
                    `;

                case 'date':
                    return `
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            ${field.label} ${requiredStar}
                        </label>
                        <input type="date"
                               x-model="formData['${field.id}']"
                               class="w-full border-gray-300 rounded-md"
                               ${required}>
                    `;

                case 'checkbox':
                    return `
                        <div class="flex items-center">
                            <input type="checkbox"
                                   x-model="formData['${field.id}']"
                                   class="mr-2"
                                   ${required}>
                            <label class="text-sm text-gray-700">
                                ${field.label} ${requiredStar}
                            </label>
                        </div>
                    `;

                default:
                    return `<div class="text-gray-400">Campo tipo ${field.type} non supportato</div>`;
            }
        }
    }));
});
</script>
