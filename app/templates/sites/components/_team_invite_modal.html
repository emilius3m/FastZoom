<!-- templates/sites/components/_team_invite_modal.html - MODAL INVITO UTENTI -->
<div x-show="showInviteModal" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 bg-gray-600 bg-opacity-75 overflow-y-auto h-full w-full z-50"
     @click.self="showInviteModal = false">
    
    <div class="relative top-20 mx-auto p-5 border w-11/12 md:w-2/3 lg:w-1/2 shadow-lg rounded-md bg-white"
         x-data="inviteManager">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h3 class="text-xl font-semibold text-gray-900">Invita Nuovo Membro</h3>
                <p class="mt-1 text-sm text-gray-600">Aggiungi un archeologo o collaboratore al team del sito</p>
            </div>
            <button @click="$parent.showInviteModal = false" 
                    class="text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Invite Form -->
        <form @submit.prevent="sendInvitation" class="space-y-6">
            
            <!-- User Selection -->
            <div>
                <label for="invite_method" class="block text-sm font-medium text-gray-700 mb-3">
                    Come vuoi invitare l'utente?
                </label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="relative flex items-start p-4 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50"
                           :class="{'ring-2 ring-blue-500 border-blue-500 bg-blue-50': inviteMethod === 'existing'}">
                        <input type="radio" 
                               name="invite_method" 
                               value="existing"
                               x-model="inviteMethod"
                               class="sr-only">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <div class="ml-3">
                                <span class="block text-sm font-medium text-gray-900">Utente Esistente</span>
                                <span class="block text-xs text-gray-500">Seleziona da utenti già registrati</span>
                            </div>
                        </div>
                    </label>
                    
                    <label class="relative flex items-start p-4 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50"
                           :class="{'ring-2 ring-blue-500 border-blue-500 bg-blue-50': inviteMethod === 'email'}">
                        <input type="radio" 
                               name="invite_method" 
                               value="email"
                               x-model="inviteMethod"
                               class="sr-only">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 7.89a2 2 0 002.828 0L21.06 8.94A2 2 0 0020.348 5H3.652a2 2 0 00-1.414 3.414z"></path>
                                </svg>
                            </div>
                            <div class="ml-3">
                                <span class="block text-sm font-medium text-gray-900">Invito Email</span>
                                <span class="block text-xs text-gray-500">Invia invito a nuovo utente</span>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Existing User Selection -->
            <div x-show="inviteMethod === 'existing'">
                <label for="existing_user" class="block text-sm font-medium text-gray-700 mb-2">
                    Seleziona Utente Esistente
                </label>
                <select id="existing_user"
                        x-model="selectedUserId"
                        class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    <option value="">Scegli utente...</option>
                    <template x-for="user in availableUsers" :key="user.id">
                        <option :value="user.id" x-text="user.name + ' (' + user.email + ')'"></option>
                    </template>
                </select>
                <p class="mt-1 text-xs text-gray-500">Solo utenti non già membri di questo sito</p>
            </div>

            <!-- Email Invitation -->
            <div x-show="inviteMethod === 'email'" x-transition:enter="transition ease-out duration-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="invite_email" class="block text-sm font-medium text-gray-700 mb-2">
                            Email *
                        </label>
                        <input type="email" 
                               id="invite_email"
                               x-model="inviteData.email"
                               class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                               placeholder="archeologo@university.it"
                               required>
                    </div>
                    
                    <div>
                        <label for="invite_name" class="block text-sm font-medium text-gray-700 mb-2">
                            Nome Completo
                        </label>
                        <input type="text" 
                               id="invite_name"
                               x-model="inviteData.full_name"
                               class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                               placeholder="Dr. Mario Rossi">
                    </div>
                </div>
            </div>

            <!-- Archaeological Role and Specialization -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="archaeological_role" class="block text-sm font-medium text-gray-700 mb-2">
                        Ruolo Archeologico
                    </label>
                    <select id="archaeological_role"
                            x-model="inviteData.archaeological_role"
                            class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Seleziona ruolo...</option>
                        <option value="Direttore di Scavo">Direttore di Scavo</option>
                        <option value="Archeologo Senior">Archeologo Senior</option>
                        <option value="Archeologo">Archeologo</option>
                        <option value="Archeologo Junior">Archeologo Junior</option>
                        <option value="Specialista">Specialista</option>
                        <option value="Documentalista">Documentalista</option>
                        <option value="Fotografo">Fotografo</option>
                        <option value="Disegnatore">Disegnatore</option>
                        <option value="Studente">Studente</option>
                        <option value="Volontario">Volontario</option>
                        <option value="Collaboratore Esterno">Collaboratore Esterno</option>
                    </select>
                </div>
                
                <div>
                    <label for="specialization" class="block text-sm font-medium text-gray-700 mb-2">
                        Specializzazione
                    </label>
                    <input type="text" 
                           id="specialization"
                           x-model="inviteData.specialization"
                           class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                           placeholder="es. Ceramica romana, Numismatica">
                </div>
            </div>

            <!-- Institution -->
            <div>
                <label for="institution" class="block text-sm font-medium text-gray-700 mb-2">
                    Istituzione/Università
                </label>
                <input type="text" 
                       id="institution"
                       x-model="inviteData.institution"
                       class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                       placeholder="es. Università di Roma, Soprintendenza Archeologica">
            </div>

            <!-- Permission Level -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-3">
                    Livello di Permessi *
                </label>
                <div class="space-y-3">
                    <label class="relative flex items-start p-4 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50"
                           :class="{'ring-2 ring-blue-500 border-blue-500 bg-blue-50': inviteData.permission_level === 'read'}">
                        <input type="radio" 
                               name="permission_level" 
                               value="read"
                               x-model="inviteData.permission_level"
                               class="mt-0.5">
                        <div class="ml-3">
                            <div class="flex items-center">
                                <span class="text-sm font-medium text-gray-900">Lettore (Read)</span>
                                <span class="ml-2 inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                                    Collaboratore
                                </span>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">
                                Può visualizzare foto e documenti, scaricare contenuti, esportare dati
                            </p>
                        </div>
                    </label>

                    <label class="relative flex items-start p-4 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50"
                           :class="{'ring-2 ring-blue-500 border-blue-500 bg-blue-50': inviteData.permission_level === 'write'}">
                        <input type="radio" 
                               name="permission_level" 
                               value="write"
                               x-model="inviteData.permission_level"
                               class="mt-0.5">
                        <div class="ml-3">
                            <div class="flex items-center">
                                <span class="text-sm font-medium text-gray-900">Scrittore (Write)</span>
                                <span class="ml-2 inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                    Archeologo
                                </span>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">
                                Può caricare foto, aggiungere documentazione, modificare metadati + tutti i permessi di lettura
                            </p>
                        </div>
                    </label>

                    <label class="relative flex items-start p-4 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50"
                           :class="{'ring-2 ring-red-500 border-red-500 bg-red-50': inviteData.permission_level === 'admin'}">
                        <input type="radio" 
                               name="permission_level" 
                               value="admin"
                               x-model="inviteData.permission_level"
                               class="mt-0.5">
                        <div class="ml-3">
                            <div class="flex items-center">
                                <span class="text-sm font-medium text-gray-900">Amministratore (Admin)</span>
                                <span class="ml-2 inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800">
                                    Direttore Scavo
                                </span>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">
                                Controllo completo: gestione team, modifica sito, validazione dati + tutti i permessi
                            </p>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Access Duration -->
            <div>
                <label for="access_duration" class="block text-sm font-medium text-gray-700 mb-2">
                    Durata Accesso
                </label>
                <select id="access_duration"
                        x-model="inviteData.access_duration"
                        @change="updateExpiryDate"
                        class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    <option value="permanent">Permanente</option>
                    <option value="1_month">1 Mese</option>
                    <option value="3_months">3 Mesi</option>
                    <option value="6_months">6 Mesi</option>
                    <option value="1_year">1 Anno</option>
                    <option value="custom">Data Personalizzata</option>
                </select>
                
                <div x-show="inviteData.access_duration === 'custom'" 
                     x-transition:enter="transition ease-out duration-200"
                     class="mt-2">
                    <input type="date" 
                           x-model="inviteData.expires_at"
                           class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>

            <!-- Welcome Message -->
            <div>
                <label for="welcome_message" class="block text-sm font-medium text-gray-700 mb-2">
                    Messaggio di Benvenuto (Opzionale)
                </label>
                <textarea id="welcome_message"
                          x-model="inviteData.welcome_message"
                          rows="3"
                          class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                          placeholder="Benvenuto nel team del sito archeologico..."></textarea>
                <p class="mt-1 text-xs text-gray-500">Il messaggio sarà incluso nell'email di invito</p>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-between pt-6 border-t">
                <button type="button" 
                        @click="$parent.showInviteModal = false"
                        class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                    Annulla
                </button>
                
                <button type="submit"
                        :disabled="!canSendInvite || isSending"
                        :class="(!canSendInvite || isSending) ? 'opacity-50 cursor-not-allowed' : 'hover:bg-blue-700'"
                        class="px-6 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-md">
                    <span x-show="!isSending">Invia Invito</span>
                    <span x-show="isSending" class="flex items-center">
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Invitando...
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('inviteManager', () => ({
        inviteMethod: 'existing',
        selectedUserId: '',
        availableUsers: [], // Populated from API
        isSending: false,
        
        inviteData: {
            email: '',
            full_name: '',
            archaeological_role: '',
            specialization: '',
            institution: '',
            permission_level: 'read',
            access_duration: 'permanent',
            expires_at: '',
            welcome_message: ''
        },
        
        get canSendInvite() {
            if (this.inviteMethod === 'existing') {
                return this.selectedUserId && this.inviteData.permission_level;
            } else {
                return this.inviteData.email && this.inviteData.permission_level;
            }
        },
        
        init() {
            this.loadAvailableUsers();
        },
        
        async loadAvailableUsers() {
            try {
                const response = await fetch('/api/users/available-for-site/{{ site.id }}');
                if (response.ok) {
                    this.availableUsers = await response.json();
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
        },
        
        updateExpiryDate() {
            const now = new Date();
            switch(this.inviteData.access_duration) {
                case '1_month':
                    now.setMonth(now.getMonth() + 1);
                    this.inviteData.expires_at = now.toISOString().split('T')[0];
                    break;
                case '3_months':
                    now.setMonth(now.getMonth() + 3);
                    this.inviteData.expires_at = now.toISOString().split('T')[0];
                    break;
                case '6_months':
                    now.setMonth(now.getMonth() + 6);
                    this.inviteData.expires_at = now.toISOString().split('T')[0];
                    break;
                case '1_year':
                    now.setFullYear(now.getFullYear() + 1);
                    this.inviteData.expires_at = now.toISOString().split('T')[0];
                    break;
                case 'permanent':
                case 'custom':
                    // No automatic date setting
                    break;
            }
        },
        
        async sendInvitation() {
            this.isSending = true;
            
            try {
                const payload = {
                    invite_method: this.inviteMethod,
                    user_id: this.inviteMethod === 'existing' ? this.selectedUserId : null,
                    ...this.inviteData
                };
                
                const response = await fetch(`/sites/{{ site.id }}/team/invite`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    this.$parent.showInviteModal = false;
                    // Refresh team list
                    location.reload();
                } else {
                    const error = await response.json();
                    alert('Errore: ' + (error.detail || 'Invio fallito'));
                }
            } catch (error) {
                console.error('Invite error:', error);
                alert('Errore nell\'invio dell\'invito');
            } finally {
                this.isSending = false;
            }
        }
    }));
});
</script>
