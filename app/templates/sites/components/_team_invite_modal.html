<!-- templates/sites/components/_team_invite_modal.html - MODAL INVITO UTENTI -->
<div x-show="showInviteModal" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-gray-600 dark:bg-gray-900 bg-opacity-75 dark:bg-opacity-90 overflow-y-auto h-full w-full z-50"
    @click.self="showInviteModal = false">

    <div
        class="relative top-20 mx-auto p-5 border w-11/12 md:w-2/3 lg:w-1/2 shadow-lg rounded-md bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h3 class="text-xl font-semibold text-gray-900 dark:text-white">Invita Nuovo Membro</h3>
                <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">Aggiungi un archeologo o collaboratore al team
                    del sito</p>
            </div>
            <button @click="showInviteModal = false" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Invite Form -->
        <form @submit.prevent="sendInvitation()" class="space-y-6">

            <!-- User Selection -->
            <div>
                <label for="invite_method" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">
                    Come vuoi invitare l'utente?
                </label>
                <div class="grid grid-cols-2 gap-4">
                    <label
                        class="relative flex items-start p-4 border border-gray-300 dark:border-gray-600 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700"
                        :class="{'ring-2 ring-blue-500 border-blue-500 bg-blue-50 dark:bg-blue-900/30': inviteMethod === 'existing'}">
                        <input type="radio" name="invite_method" value="existing" x-model="inviteMethod"
                            class="sr-only">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <div class="ml-3">
                                <span class="block text-sm font-medium text-gray-900 dark:text-white">Utente
                                    Esistente</span>
                                <span class="block text-xs text-gray-500 dark:text-gray-400">Seleziona da utenti già
                                    registrati</span>
                            </div>
                        </div>
                    </label>

                    <label
                        class="relative flex items-start p-4 border border-gray-300 dark:border-gray-600 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700"
                        :class="{'ring-2 ring-blue-500 border-blue-500 bg-blue-50 dark:bg-blue-900/30': inviteMethod === 'email'}">
                        <input type="radio" name="invite_method" value="email" x-model="inviteMethod" class="sr-only">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 8l7.89 7.89a2 2 0 002.828 0L21.06 8.94A2 2 0 0020.348 5H3.652a2 2 0 00-1.414 3.414z">
                                    </path>
                                </svg>
                            </div>
                            <div class="ml-3">
                                <span class="block text-sm font-medium text-gray-900 dark:text-white">Invito
                                    Email</span>
                                <span class="block text-xs text-gray-500 dark:text-gray-400">Invia invito a nuovo
                                    utente</span>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Existing User Selection -->
            <div x-show="inviteMethod === 'existing'">
                <label for="existing_user" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Seleziona Utente Esistente
                </label>
                <select id="existing_user" x-model="selectedUserId"
                    class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white">
                    <option value="">Scegli utente...</option>
                    <template x-for="user in availableUsers" :key="user.id">
                        <option :value="user.id" x-text="user.name + ' (' + user.email + ')'"></option>
                    </template>
                </select>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Solo utenti non già membri di questo sito</p>
            </div>

            <!-- Email Invitation -->
            <div x-show="inviteMethod === 'email'" x-transition:enter="transition ease-out duration-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="invite_email"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                            Email *
                        </label>
                        <input type="email" id="invite_email" x-model="inviteData.email"
                            class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white"
                            placeholder="archeologo@university.it" required>
                    </div>

                    <div>
                        <label for="invite_name"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                            Nome Completo
                        </label>
                        <input type="text" id="invite_name" x-model="inviteData.full_name"
                            class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white"
                            placeholder="Dr. Mario Rossi">
                    </div>
                </div>
            </div>

            <!-- Archaeological Role and Specialization -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="archaeological_role"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Ruolo Archeologico
                    </label>
                    <select id="archaeological_role" x-model="inviteData.archaeological_role"
                        class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white">
                        <option value="">Seleziona ruolo...</option>
                        <option value="Direttore di Scavo">Direttore di Scavo</option>
                        <option value="Archeologo Senior">Archeologo Senior</option>
                        <option value="Archeologo">Archeologo</option>
                        <option value="Archeologo Junior">Archeologo Junior</option>
                        <option value="Specialista">Specialista</option>
                        <option value="Documentalista">Documentalista</option>
                        <option value="Fotografo">Fotografo</option>
                        <option value="Disegnatore">Disegnatore</option>
                        <option value="Studente">Studente</option>
                        <option value="Volontario">Volontario</option>
                        <option value="Collaboratore Esterno">Collaboratore Esterno</option>
                    </select>
                </div>

                <div>
                    <label for="specialization" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Specializzazione
                    </label>
                    <input type="text" id="specialization" x-model="inviteData.specialization"
                        class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white"
                        placeholder="es. Ceramica romana, Numismatica">
                </div>
            </div>

            <!-- Institution -->
            <div>
                <label for="institution" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Istituzione/Università
                </label>
                <input type="text" id="institution" x-model="inviteData.institution"
                    class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white"
                    placeholder="es. Università di Roma, Soprintendenza Archeologica">
            </div>

            <!-- Permission Level -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">
                    Livello di Permessi *
                </label>
                <div class="space-y-3">
                    <label
                        class="relative flex items-start p-4 border border-gray-300 dark:border-gray-600 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700"
                        :class="{'ring-2 ring-blue-500 border-blue-500 bg-blue-50 dark:bg-blue-900/30': inviteData.permission_level === 'read'}">
                        <input type="radio" name="permission_level" value="read" x-model="inviteData.permission_level"
                            class="mt-0.5">
                        <div class="ml-3">
                            <div class="flex items-center">
                                <span class="text-sm font-medium text-gray-900 dark:text-white">Lettore (Read)</span>
                                <span
                                    class="ml-2 inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200">
                                    Collaboratore
                                </span>
                            </div>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                                Può visualizzare foto e documenti, scaricare contenuti, esportare dati
                            </p>
                        </div>
                    </label>

                    <label
                        class="relative flex items-start p-4 border border-gray-300 dark:border-gray-600 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700"
                        :class="{'ring-2 ring-blue-500 border-blue-500 bg-blue-50 dark:bg-blue-900/30': inviteData.permission_level === 'write'}">
                        <input type="radio" name="permission_level" value="write" x-model="inviteData.permission_level"
                            class="mt-0.5">
                        <div class="ml-3">
                            <div class="flex items-center">
                                <span class="text-sm font-medium text-gray-900 dark:text-white">Scrittore (Write)</span>
                                <span
                                    class="ml-2 inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-200">
                                    Archeologo
                                </span>
                            </div>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                                Può caricare foto, aggiungere documentazione, modificare metadati + tutti i permessi di
                                lettura
                            </p>
                        </div>
                    </label>

                    <label
                        class="relative flex items-start p-4 border border-gray-300 dark:border-gray-600 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700"
                        :class="{'ring-2 ring-red-500 border-red-500 bg-red-50 dark:bg-red-900/30': inviteData.permission_level === 'admin'}">
                        <input type="radio" name="permission_level" value="admin" x-model="inviteData.permission_level"
                            class="mt-0.5">
                        <div class="ml-3">
                            <div class="flex items-center">
                                <span class="text-sm font-medium text-gray-900 dark:text-white">Amministratore
                                    (Admin)</span>
                                <span
                                    class="ml-2 inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-200">
                                    Direttore Scavo
                                </span>
                            </div>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                                Controllo completo: gestione team, modifica sito, validazione dati + tutti i permessi
                            </p>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Access Duration -->
            <div>
                <label for="access_duration" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Durata Accesso
                </label>
                <select id="access_duration" x-model="inviteData.access_duration" @change="updateInviteExpiryDate()"
                    class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white">
                    <option value="permanent">Permanente</option>
                    <option value="1_month">1 Mese</option>
                    <option value="3_months">3 Mesi</option>
                    <option value="6_months">6 Mesi</option>
                    <option value="1_year">1 Anno</option>
                    <option value="custom">Data Personalizzata</option>
                </select>

                <div x-show="inviteData.access_duration === 'custom'"
                    x-transition:enter="transition ease-out duration-200" class="mt-2">
                    <input type="date" x-model="inviteData.expires_at"
                        class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white">
                </div>
            </div>

            <!-- Welcome Message -->
            <div>
                <label for="welcome_message" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Messaggio di Benvenuto (Opzionale)
                </label>
                <textarea id="welcome_message" x-model="inviteData.welcome_message" rows="3"
                    class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white"
                    placeholder="Benvenuto nel team del sito archeologico..."></textarea>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Il messaggio sarà incluso nell'email di invito
                </p>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-between pt-6 border-t border-gray-200 dark:border-gray-600">
                <button type="button" @click="showInviteModal = false"
                    class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md hover:bg-gray-50 dark:hover:bg-gray-600">
                    Annulla
                </button>

                <button type="submit" :disabled="!canSendInvite || isSendingInvite"
                    :class="(!canSendInvite || isSendingInvite) ? 'opacity-50 cursor-not-allowed' : 'hover:bg-blue-700'"
                    class="px-6 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-md">
                    <span x-show="!isSendingInvite">Invia Invito</span>
                    <span x-show="isSendingInvite" class="flex items-center">
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Invitando...
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
