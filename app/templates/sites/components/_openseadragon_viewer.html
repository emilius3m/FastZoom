<!-- templates/sites/components/_openseadragon_viewer.html - OPENSEADRAGON IMAGE VIEWER -->
<!-- Include toast notification system -->
{% include 'components/_toast_notifications.html' %}

<div id="openseadragon-viewer"
     class="w-full h-full bg-gray-900 relative"
     x-data="openSeadragonViewer()"
     x-init="initViewer()"
     @current-photo-changed.window="handlePhotoChanged($event.detail)">

    <!-- Loading State -->
    <div x-show="isLoading"
         class="absolute inset-0 flex items-center justify-center bg-gray-900 text-white z-30">
        <div class="text-center">
            <svg class="animate-spin h-8 w-8 text-white mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-sm" x-text="loadingMessage">Caricamento visualizzatore...</p>
        </div>
    </div>

    <!-- Error State -->
    <div x-show="hasError && !isLoading"
         class="absolute inset-0 flex items-center justify-center bg-gray-900 text-white z-30">
        <div class="text-center max-w-md mx-auto px-4">
            <svg class="h-12 w-12 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h3 class="text-lg font-medium mb-2">Errore Visualizzatore</h3>
            <p class="text-sm text-gray-300 mb-4" x-text="errorMessage"></p>
            <div class="flex space-x-3 justify-center">
                <button @click="retryLoad()" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                    Riprova
                </button>
                <button @click="useSimpleImage()" 
                        x-show="canUseSimpleImage"
                        class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors">
                    Usa immagine semplice
                </button>
            </div>
        </div>
    </div>

    <!-- Fallback Simple Image State -->
    <div x-show="usingSimpleImage && !isLoading"
         class="absolute inset-0 flex items-center justify-center bg-gray-900 z-20">
        <div class="relative w-full h-full flex items-center justify-center">
            <img x-show="currentPhotoData && currentPhotoData.file_url"
                 :src="currentPhotoData ? currentPhotoData.file_url : ''"
                 :alt="currentPhotoData ? currentPhotoData.title || currentPhotoData.filename : ''"
                 class="max-w-full max-h-full object-contain"
                 @load="onSimpleImageLoad()"
                 @error="onSimpleImageError()">
            
            <!-- Simple Image Controls -->
            <div x-show="currentPhotoData" 
                 class="absolute top-4 right-4 flex flex-col space-y-2 z-10">
                <button @click="toggleFullscreen()" 
                        class="bg-black bg-opacity-50 rounded-lg p-2 w-8 h-8 text-white hover:text-gray-300 transition-colors">
                    <svg x-show="!isFullscreen" class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                    </svg>
                    <svg x-show="isFullscreen" class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9V4.5M9 9H4.5M9 9L3.5 3.5M15 9v-4.5M15 9h4.5M15 9l5.5-5.5M9 15v4.5M9 15H4.5M9 15l-5.5 5.5M15 15v4.5M15 15h4.5m0 0l-5.5 5.5"></path>
                    </svg>
                </button>
                <button @click="backToDeepZoom()" 
                        x-show="canTryDeepZoom"
                        class="bg-black bg-opacity-50 rounded-lg p-2 w-8 h-8 text-white hover:text-gray-300 transition-colors"
                        title="Tenta di usare Deep Zoom">
                    <svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Simple Image Error -->
            <div x-show="simpleImageError" 
                 class="absolute inset-0 flex items-center justify-center bg-gray-900 text-white">
                <div class="text-center">
                    <svg class="h-12 w-12 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="text-lg font-medium mb-2">Impossibile caricare l'immagine</h3>
                    <p class="text-sm text-gray-300" x-text="simpleImageErrorMessage"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- OpenSeadragon Container -->
    <div id="openseadragon-container" 
         class="w-full h-full"
         x-show="!isLoading && !hasError && !usingSimpleImage"></div>

    <!-- Viewer Controls Overlay -->
    <div x-show="!isLoading && !hasError && !usingSimpleImage" 
         class="absolute top-4 right-4 flex flex-col space-y-2 z-10">
        
        <!-- Zoom Controls -->
        <div class="bg-black bg-opacity-50 rounded-lg p-2">
            <button @click="zoomIn()" 
                    class="block w-8 h-8 text-white hover:text-gray-300 transition-colors mb-1">
                <svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"></path>
                </svg>
            </button>
            
            <button @click="zoomOut()" 
                    class="block w-8 h-8 text-white hover:text-gray-300 transition-colors mb-1">
                <svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path>
                </svg>
            </button>
            
            <button @click="resetZoom()" 
                    class="block w-8 h-8 text-white hover:text-gray-300 transition-colors">
                <svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </div>

        <!-- View Controls -->
        <div class="bg-black bg-opacity-50 rounded-lg p-2">
            <button @click="toggleFullscreen()" 
                    class="block w-8 h-8 text-white hover:text-gray-300 transition-colors mb-1">
                <svg x-show="!isFullscreen" class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                </svg>
                <svg x-show="isFullscreen" class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9V4.5M9 9H4.5M9 9L3.5 3.5M15 9v-4.5M15 9h4.5M15 9l5.5-5.5M9 15v4.5M9 15H4.5M9 15l-5.5 5.5M15 15v4.5M15 15h4.5m0 0l-5.5 5.5"></path>
                </svg>
            </button>

            <button @click="toggleRotation()" 
                    class="block w-8 h-8 text-white hover:text-gray-300 transition-colors">
                <svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </div>

        <!-- Info Panel Toggle -->
        <button @click="toggleInfo()" 
                class="bg-black bg-opacity-50 rounded-lg p-2 w-8 h-8 text-white hover:text-gray-300 transition-colors">
            <svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </button>
    </div>

    <!-- Info Panel -->
    <div x-show="showInfo && !isLoading && !hasError && !usingSimpleImage" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 transform translate-x-full"
         x-transition:enter-end="opacity-100 transform translate-x-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 transform translate-x-0"
         x-transition:leave-end="opacity-0 transform translate-x-full"
         class="absolute top-0 right-0 w-80 h-full bg-black bg-opacity-90 text-white p-6 overflow-y-auto z-20">
        
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-lg font-semibold">Informazioni Immagine</h3>
            <button @click="showInfo = false" 
                    class="text-gray-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <template x-if="currentImageInfo">
            <div class="space-y-4">
                <!-- Basic Info -->
                <div>
                    <h4 class="font-medium text-gray-300 mb-2">Dettagli Base</h4>
                    <div class="text-sm space-y-1">
                        <div>
                            <span class="text-gray-400">Dimensioni:</span>
                            <span x-text="`${currentImageInfo.width || 'N/A'} × ${currentImageInfo.height || 'N/A'} px`"></span>
                        </div>
                        <div>
                            <span class="text-gray-400">Zoom corrente:</span>
                            <span x-text="currentZoom ? `${Math.round(currentZoom * 100)}%` : 'N/A'"></span>
                        </div>
                        <div>
                            <span class="text-gray-400">Rotazione:</span>
                            <span x-text="currentRotation ? `${currentRotation}°` : '0°'"></span>
                        </div>
                    </div>
                </div>

                <!-- Viewport Info -->
                <div x-show="viewportInfo">
                    <h4 class="font-medium text-gray-300 mb-2">Viewport</h4>
                    <div class="text-sm space-y-1">
                        <div>
                            <span class="text-gray-400">Posizione X:</span>
                            <span x-text="viewportInfo ? Math.round(viewportInfo.x * 100) / 100 : 'N/A'"></span>
                        </div>
                        <div>
                            <span class="text-gray-400">Posizione Y:</span>
                            <span x-text="viewportInfo ? Math.round(viewportInfo.y * 100) / 100 : 'N/A'"></span>
                        </div>
                    </div>
                </div>

                <!-- Controls Help -->
                <div>
                    <h4 class="font-medium text-gray-300 mb-2">Controlli</h4>
                    <div class="text-sm space-y-1 text-gray-400">
                        <div>• Mouse: Trascina per spostare</div>
                        <div>• Rotella: Zoom in/out</div>
                        <div>• Doppio click: Zoom rapido</div>
                        <div>• Ctrl + rotella: Rotazione</div>
                        <div>• Tasto destro: Menu contestuale</div>
                    </div>
                </div>

                <!-- Performance Info -->
                <div x-show="performanceInfo">
                    <h4 class="font-medium text-gray-300 mb-2">Performance</h4>
                    <div class="text-sm space-y-1">
                        <div>
                            <span class="text-gray-400">FPS:</span>
                            <span x-text="performanceInfo ? performanceInfo.fps : 'N/A'"></span>
                        </div>
                        <div>
                            <span class="text-gray-400">Tile caricate:</span>
                            <span x-text="performanceInfo ? performanceInfo.tilesLoaded : 'N/A'"></span>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Loading Indicator for Tiles -->
    <div x-show="tilesLoading && !isLoading && !usingSimpleImage" 
         class="absolute bottom-4 left-4 bg-black bg-opacity-50 text-white px-3 py-1 rounded-lg text-sm">
        <div class="flex items-center">
            <svg class="animate-spin h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Caricamento tiles...</span>
        </div>
    </div>

    <!-- Navigation Helper -->
    <div x-show="showNavigationHelper && !isLoading && !hasError && !usingSimpleImage" 
         class="absolute bottom-4 right-4 bg-black bg-opacity-75 text-white p-3 rounded-lg text-xs max-w-xs">
        <div class="space-y-1">
            <div><strong>Controlli rapidi:</strong></div>
            <div>• Trascina: Sposta immagine</div>
            <div>• Rotella: Zoom</div>
            <div>• Doppio click: Zoom fit</div>
            <div>• Ctrl+Rotella: Ruota</div>
        </div>
        <button @click="showNavigationHelper = false" 
                class="absolute top-1 right-1 text-gray-400 hover:text-white">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
</div>

<script>
function openSeadragonViewer() {
    return {
        // Core State
        viewer: null,
        isLoading: true,
        hasError: false,
        errorMessage: '',
        isInitialized: false,
        currentPhotoData: null,

        // UI State
        showInfo: false,
        showNavigationHelper: true,
        isFullscreen: false,
        tilesLoading: false,
        loadingMessage: 'Caricamento visualizzatore...',

        // Fallback State
        usingSimpleImage: false,
        canUseSimpleImage: false,
        canTryDeepZoom: false,
        simpleImageError: false,
        simpleImageErrorMessage: '',
        
        // Enhanced Retry State
        retryCount: 0,
        maxRetries: 5,
        tileLoadFailures: 0,
        maxTileFailures: 5,
        retryOperationId: null,
        isRetrying: false,
        lastErrorTime: null,
        
        // Error Analysis State
        errorHistory: [],
        currentErrorType: null,
        recoveryAttempts: 0,

        // Image Info
        currentImageInfo: null,
        currentZoom: null,
        currentRotation: 0,
        viewportInfo: null,
        performanceInfo: null,

        // Configuration
        config: {
            prefixUrl: "https://cdn.jsdelivr.net/npm/openseadragon@4.1.0/build/openseadragon/images/",
            animationTime: 0.5,
            blendTime: 0.1,
            constrainDuringPan: true,
            maxZoomPixelRatio: 2,
            minZoomLevel: 0.1,
            maxZoomLevel: 10,
            zoomPerClick: 2.0,
            zoomPerScroll: 1.2,
            clickTimeThreshold: 300,
            clickDistThreshold: 5,
            smoothTileEdgesMinZoom: 1.1,
            crossOriginPolicy: 'Anonymous'
        },

        async initViewer() {
            console.log('OpenSeadragon viewer initViewer called');
            
            try {
                this.isLoading = true;
                this.hasError = false;
                this.loadingMessage = 'Caricamento visualizzatore...';
                this.clearErrorState();

                // Wait for OpenSeadragon to be available
                if (typeof OpenSeadragon === 'undefined') {
                    console.log('Loading OpenSeadragon library...');
                    this.loadingMessage = 'Caricamento libreria OpenSeadragon...';
                    await this.loadOpenSeadragon();
                }

                // Get current photo from parent
                const photosManager = this.findPhotosManager();
                let currentPhoto = photosManager?.currentPhoto || this.currentPhotoData;
                
                console.log('Current photo data:', currentPhoto);
                
                if (!currentPhoto) {
                    console.error('No photo data available for OpenSeadragon viewer');
                    this.handleError('NO_PHOTO', 'Nessuna foto disponibile', {
                        recoverable: false,
                        userAction: 'Seleziona un\'altra foto'
                    });
                    return;
                }

                this.currentPhotoData = currentPhoto;
                this.canUseSimpleImage = !!(currentPhoto.file_url || currentPhoto.full_url);

                // Check if deep zoom tiles are available before attempting to load them
                this.loadingMessage = 'Verifica disponibilità tiles...';
                const tilesAvailable = await this.checkTilesAvailability(currentPhoto);
                
                if (tilesAvailable) {
                    // Try to initialize with deep zoom tiles
                    this.loadingMessage = 'Inizializzazione visualizzatore Deep Zoom...';
                    try {
                        await this.createViewer(currentPhoto);
                        this.setupEventHandlers();
                        this.isInitialized = true;
                        this.usingSimpleImage = false;
                        this.canTryDeepZoom = false;
                        this.clearErrorState();
                        console.log('OpenSeadragon viewer initialized successfully');
                        
                        // Notifica successo
                        if (window.toastSystem) {
                            window.toastSystem.showSuccess('Visualizzatore Deep Zoom inizializzato con successo');
                        }
                    } catch (error) {
                        console.error('Failed to initialize OpenSeadragon viewer:', error);
                        await this.handleDeepZoomFailure(error, currentPhoto);
                    }
                } else {
                    // Tiles not available, use simple image
                    console.log('Deep zoom tiles not available, using simple image');
                    await this.useSimpleImage();
                }

            } catch (error) {
                console.error('Errore nell\'inizializzazione del viewer:', error);
                this.handleError('INITIALIZATION', error.message || 'Errore sconosciuto nell\'inizializzazione', {
                    recoverable: true,
                    userAction: 'Riprova o usa immagine semplice'
                });
            }
        },

        async checkTilesAvailability(photo) {
            try {
                // Check if photo has deep zoom info
                if (!photo.id) {
                    console.warn('Photo ID missing, cannot check tiles availability');
                    return false;
                }

                // Try to get deep zoom info from API
                const siteId = this.getSiteId();
                if (!siteId) {
                    console.warn('Site ID missing, cannot check tiles availability');
                    return false;
                }

                const response = await fetch(`/api/site/${siteId}/photos/${photo.id}/deepzoom/info`);
                
                if (!response.ok) {
                    console.log(`Deep zoom info endpoint returned ${response.status}`);
                    return false;
                }

                const data = await response.json();
                console.log('Deep zoom info response:', data);
                
                // Check if tiles are available
                return data.available === true && data.levels > 0 && data.total_tiles > 0;
            } catch (error) {
                console.warn('Error checking tiles availability:', error);
                return false;
            }
        },

        async handleDeepZoomFailure(error, photo) {
            console.error('Deep zoom initialization failed:', error);
            
            // Analizza e registra l'errore
            const errorType = this.classifyError(error);
            this.recordError(errorType, error, {
                operation: 'deep_zoom_init',
                photoId: photo?.id,
                retryCount: this.retryCount
            });
            
            // Increment retry count
            this.retryCount++;
            this.lastErrorTime = Date.now();
            
            if (this.retryCount <= this.maxRetries) {
                console.log(`Retrying deep zoom initialization (${this.retryCount}/${this.maxRetries})`);
                this.loadingMessage = `Tentativo ${this.retryCount}/${this.maxRetries}...`;
                this.isRetrying = true;
                
                // Notifica retry
                if (window.toastSystem) {
                    window.toastSystem.showWarning(`Tentativo ${this.retryCount}/${this.maxRetries} di inizializzazione Deep Zoom...`, {
                        timeout: 3000
                    });
                }
                
                // Usa sistema di retry con backoff esponenziale
                if (window.retryWithBackoff) {
                    this.retryOperationId = window.retryWithBackoff.generateOperationId();
                    
                    try {
                        await window.retryWithBackoff.executeWithRetry(
                            async () => {
                                await this.createViewer(photo);
                                this.setupEventHandlers();
                                this.isInitialized = true;
                                this.usingSimpleImage = false;
                                this.canTryDeepZoom = false;
                                this.retryCount = 0; // Reset retry count on success
                                this.isRetrying = false;
                                this.clearErrorState();
                                console.log('OpenSeadragon viewer initialized successfully on retry');
                                
                                // Notifica successo
                                if (window.toastSystem) {
                                    window.toastSystem.showSuccess('Visualizzatore Deep Zoom inizializzato con successo');
                                }
                            },
                            {
                                maxRetries: this.maxRetries - this.retryCount + 1,
                                baseDelay: 1000,
                                backoffFactor: 2,
                                maxDelay: 10000,
                                operationId: this.retryOperationId,
                                onRetry: (retryError, attempt, delay) => {
                                    console.log(`Retry ${attempt} failed, retrying in ${delay}ms:`, retryError);
                                    this.loadingMessage = `Tentativo ${this.retryCount + attempt}/${this.maxRetries}...`;
                                },
                                onSuccess: () => {
                                    console.log('Deep zoom retry succeeded');
                                    this.retryOperationId = null;
                                },
                                onFinalError: (finalError) => {
                                    console.error('All deep zoom retries failed:', finalError);
                                    this.handleError('DEEP_ZOOM_RETRY_FAILED', finalError.message, {
                                        recoverable: true,
                                        userAction: 'Usa immagine semplice',
                                        finalRetryCount: this.retryCount
                                    });
                                    this.retryOperationId = null;
                                }
                            }
                        );
                    } catch (retryError) {
                        console.error('Retry system failed:', retryError);
                        await this.useSimpleImage();
                    }
                } else {
                    // Fallback senza sistema di retry
                    await new Promise(resolve => setTimeout(resolve, 1000 * this.retryCount));
                    
                    try {
                        await this.createViewer(photo);
                        this.setupEventHandlers();
                        this.isInitialized = true;
                        this.usingSimpleImage = false;
                        this.canTryDeepZoom = false;
                        this.retryCount = 0; // Reset retry count on success
                        this.isRetrying = false;
                        this.clearErrorState();
                        console.log('OpenSeadragon viewer initialized successfully on retry');
                    } catch (retryError) {
                        console.error(`Retry ${this.retryCount} failed:`, retryError);
                        await this.handleDeepZoomFailure(retryError, photo);
                    }
                }
            } else {
                // Max retries reached, fallback to simple image
                console.log('Max retries reached, falling back to simple image');
                this.handleError('MAX_RETRIES_REACHED', 'Massimo numero di tentativi raggiunto', {
                    recoverable: true,
                    userAction: 'Usa immagine semplice',
                    finalRetryCount: this.retryCount
                });
                await this.useSimpleImage();
            }
        },

        async useSimpleImage() {
            console.log('Switching to simple image mode');
            this.usingSimpleImage = true;
            this.hasError = false;
            this.errorMessage = '';
            this.isLoading = false;
            this.canTryDeepZoom = true; // Allow trying deep zoom again
            this.simpleImageError = false;
            this.simpleImageErrorMessage = '';
            this.isRetrying = false;
            
            // Notifica cambio modalità
            if (window.toastSystem) {
                window.toastSystem.showInfo('Passaggio a modalità immagine semplice', {
                    timeout: 3000
                });
            }

        async loadOpenSeadragon() {
            return new Promise((resolve, reject) => {
                if (window.OpenSeadragon) {
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/openseadragon@4.1.0/build/openseadragon/openseadragon.min.js';
                script.onload = () => resolve();
                script.onerror = () => reject(new Error('Impossibile caricare OpenSeadragon'));
                document.head.appendChild(script);
            });
        },

        getSiteId() {
            // Try to get site ID from various sources
            try {
                // Method 1: Try to get from URL
                const pathParts = window.location.pathname.split('/');
                const siteIndex = pathParts.indexOf('site');
                if (siteIndex !== -1 && pathParts.length > siteIndex + 1) {
                    return pathParts[siteIndex + 1];
                }

                // Method 2: Try to get from photo data
                if (this.currentPhotoData && this.currentPhotoData.site_id) {
                    return this.currentPhotoData.site_id;
                }

                // Method 3: Try to get from meta tags
                const siteMeta = document.querySelector('meta[name="site-id"]');
                if (siteMeta) {
                    return siteMeta.getAttribute('content');
                }

                return null;
            } catch (error) {
                console.warn('Error getting site ID:', error);
                return null;
            }
        },

        getCurrentPhoto() {
            // Try multiple methods to get the current photo
            try {
                // Method 1: Try to access parent Alpine data directly
                let element = this.$el;
                while (element && element.parentElement) {
                    element = element.parentElement;
                    if (element.hasAttribute && element.hasAttribute('x-data')) {
                        const xDataValue = element.getAttribute('x-data');
                        if (xDataValue && xDataValue.includes('photosManager')) {
                            const alpineData = Alpine.$data(element);
                            if (alpineData && alpineData.currentPhoto) {
                                return alpineData.currentPhoto;
                            }
                        }
                    }
                }

                // Method 2: Try global access through window
                if (window.photosManagerInstance && window.photosManagerInstance.currentPhoto) {
                    return window.photosManagerInstance.currentPhoto;
                }

                // Method 3: Find by CSS selector
                const photosContainer = document.querySelector('[x-data*="photosManager"]');
                if (photosContainer) {
                    const manager = Alpine.$data(photosContainer);
                    if (manager && manager.currentPhoto) {
                        return manager.currentPhoto;
                    }
                }

                return null;
            } catch (error) {
                console.warn('Error accessing current photo:', error);
                return null;
            }
        },

        findPhotosManager() {
            try {
                // Navigate up the DOM tree to find the photos manager component
                let element = this.$el;
                while (element && element.parentElement) {
                    element = element.parentElement;
                    if (element.hasAttribute && element.hasAttribute('x-data')) {
                        const xDataValue = element.getAttribute('x-data');
                        if (xDataValue && xDataValue.includes('photosManager')) {
                            return Alpine.$data(element);
                        }
                    }
                }
                return null;
            } catch (error) {
                console.warn('Error finding photos manager:', error);
                return null;
            }
        },

        async createViewer(photo) {
            const container = document.getElementById('openseadragon-container');
            if (!container) {
                throw new Error('Container OpenSeadragon non trovato');
            }

            // Determine tile source
            const tileSource = this.getTileSource(photo);

            this.viewer = OpenSeadragon(Object.assign({
                element: container,
                tileSources: [tileSource],
                sequenceMode: false,
                showNavigationControl: false, // We'll use custom controls
                showZoomControl: false,
                showHomeControl: false,
                showFullPageControl: false,
                showRotationControl: false,
                gestureSettingsMouse: {
                    scrollToZoom: true,
                    clickToZoom: true,
                    dblClickToZoom: true,
                    pinchToZoom: true,
                    flickEnabled: true,
                    flickMinSpeed: 120,
                    flickMomentum: 0.25
                },
                gestureSettingsTouch: {
                    scrollToZoom: false,
                    clickToZoom: false,
                    dblClickToZoom: true,
                    pinchToZoom: true,
                    flickEnabled: true,
                    flickMinSpeed: 120,
                    flickMomentum: 0.25
                }
            }, this.config));

            // Wait for viewer to be ready
            await new Promise((resolve, reject) => {
                this.viewer.addHandler('open', () => {
                    this.currentImageInfo = {
                        width: this.viewer.world.getItemAt(0).getContentSize().x,
                        height: this.viewer.world.getItemAt(0).getContentSize().y
                    };
                    resolve();
                });
                
                this.viewer.addHandler('open-failed', (error) => {
                    reject(new Error(`Failed to open image: ${error.message || 'Unknown error'}`));
                });
            });
        },

        getTileSource(photo) {
            // Check if we have DZI or other tiled formats
            if (photo.dzi_url) {
                return photo.dzi_url;
            }

            // Check for IIIF support
            if (photo.iiif_info) {
                return photo.iiif_info;
            }

            // Fallback to simple image
            return {
                type: 'image',
                url: photo.file_url,
                buildPyramid: true,
                crossOriginPolicy: 'Anonymous'
            };
        },

        setupEventHandlers() {
            if (!this.viewer) return;

            // Zoom change
            this.viewer.addHandler('zoom', (event) => {
                this.currentZoom = event.zoom;
                this.updateViewportInfo();
            });

            // Pan change  
            this.viewer.addHandler('pan', (event) => {
                this.updateViewportInfo();
            });

            // Rotation change
            this.viewer.addHandler('rotate', (event) => {
                this.currentRotation = event.degrees || 0;
            });

            // Tiles loading with failure tracking
            this.viewer.addHandler('tile-load-failed', (event) => {
                console.warn('Tile load failed:', event);
                this.tileLoadFailures++;
                
                // If too many tiles fail, fallback to simple image
                if (this.tileLoadFailures >= this.maxTileFailures) {
                    console.error(`Too many tile failures (${this.tileLoadFailures}), falling back to simple image`);
                    this.useSimpleImage();
                }
            });

            this.viewer.addHandler('tile-loaded', () => {
                this.updatePerformanceInfo();
                // Reset failure count on successful tile load
                if (this.tileLoadFailures > 0) {
                    this.tileLoadFailures = Math.max(0, this.tileLoadFailures - 1);
                }
            });

            // Fullscreen changes
            this.viewer.addHandler('full-screen', (event) => {
                this.isFullscreen = event.fullScreen;
            });

            // Custom keyboard shortcuts
            this.viewer.addHandler('canvas-key', (event) => {
                this.handleKeyPress(event.originalEvent);
            });

            // Context menu for advanced operations
            this.viewer.addHandler('canvas-contextmenu', (event) => {
                event.preventDefaultAction = true;
                this.showContextMenu(event.position);
            });
        },

        updateViewportInfo() {
            if (!this.viewer) return;

            const viewport = this.viewer.viewport;
            this.viewportInfo = {
                x: viewport.getCenter().x,
                y: viewport.getCenter().y,
                zoom: viewport.getZoom(),
                rotation: viewport.getRotation()
            };
        },

        updatePerformanceInfo() {
            if (!this.viewer) return;

            // Simple performance metrics
            const world = this.viewer.world;
            const tiledImage = world.getItemAt(0);
            
            if (tiledImage) {
                this.performanceInfo = {
                    fps: Math.round(this.viewer.fps || 0),
                    tilesLoaded: tiledImage._loadedTiles ? Object.keys(tiledImage._loadedTiles).length : 0
                };
            }
        },

        // Control Methods
        zoomIn() {
            if (!this.viewer && !this.usingSimpleImage) return;
            
            if (this.viewer) {
                this.viewer.viewport.zoomBy(this.config.zoomPerClick);
            }
        },

        zoomOut() {
            if (!this.viewer && !this.usingSimpleImage) return;
            
            if (this.viewer) {
                this.viewer.viewport.zoomBy(1 / this.config.zoomPerClick);
            }
        },

        resetZoom() {
            if (!this.viewer && !this.usingSimpleImage) return;
            
            if (this.viewer) {
                this.viewer.viewport.goHome();
            }
        },

        toggleFullscreen() {
            if (this.usingSimpleImage) {
                // Simple image fullscreen
                const img = document.querySelector('#openseadragon-viewer img');
                if (img) {
                    if (!this.isFullscreen) {
                        if (img.requestFullscreen) {
                            img.requestFullscreen();
                        } else if (img.webkitRequestFullscreen) {
                            img.webkitRequestFullscreen();
                        } else if (img.msRequestFullscreen) {
                            img.msRequestFullscreen();
                        }
                    } else {
                        if (document.exitFullscreen) {
                            document.exitFullscreen();
                        } else if (document.webkitExitFullscreen) {
                            document.webkitExitFullscreen();
                        } else if (document.msExitFullscreen) {
                            document.msExitFullscreen();
                        }
                    }
                }
            } else if (this.viewer) {
                // OpenSeadragon fullscreen
                if (this.viewer.isFullPage()) {
                    this.viewer.setFullPage(false);
                } else {
                    this.viewer.setFullPage(true);
                }
            }
        },

        toggleRotation() {
            if (!this.viewer && !this.usingSimpleImage) return;
            
            if (this.viewer) {
                const newRotation = (this.currentRotation + 90) % 360;
                this.viewer.viewport.setRotation(newRotation);
            }
        },

        toggleInfo() {
            this.showInfo = !this.showInfo;
            if (this.showInfo) {
                this.updateViewportInfo();
                this.updatePerformanceInfo();
            }
        },

            this.$nextTick(() => {

            if (!this.viewer && !this.usingSimpleImage) return;

            switch(event.key) {
                case '+':
                case '=':
                    this.zoomIn();
                    break;
                case '-':
                    this.zoomOut();
                    break;
                case '0':

                case 'i':

        handlePhotoChanged(detail) {
            console.log('Photo changed event received:', detail);
            if (detail && detail.photo) {
                this.currentPhotoData = detail.photo;
                this.canUseSimpleImage = !!(detail.photo.file_url || detail.photo.full_url);
                
                if (this.isInitialized) {

                    this.initViewer();

        async updateViewer(photo) {
            if (!photo) return;

            // Reset states
            this.clearErrorState();
            this.retryCount = 0;
            this.tileLoadFailures = 0;
            this.isRetrying = false;
            this.retryOperationId = null;

            // Notifica cambio foto
            if (window.toastSystem) {
                window.toastSystem.showInfo(`Caricamento nuova foto: ${photo.filename || 'sconosciuta'}`, {
                    timeout: 2000
                });
            }

            // Check if we should use deep zoom or simple image
            const tilesAvailable = await this.checkTilesAvailability(photo);
            
            if (tilesAvailable && !this.usingSimpleImage) {
                // Try to update with deep zoom
                if (this.viewer) {
                    try {
                        this.isLoading = true;
                        const tileSource = this.getTileSource(photo);
                        
                        // Usa sistema di retry per aggiornamento
                        if (window.retryWithBackoff) {
                            await window.retryWithBackoff.executeWithRetry(
                                async () => {
                                    // Replace current image
                                    this.viewer.world.removeAll();
                                    
                                    return new Promise((resolve, reject) => {
                                        this.viewer.addTiledImage({
                                            tileSource: tileSource,
                                            success: () => {
                                                this.currentImageInfo = {
                                                    width: this.viewer.world.getItemAt(0).getContentSize().x,
                                                    height: this.viewer.world.getItemAt(0).getContentSize().y
                                                };
                                                this.isLoading = false;
                                                this.usingSimpleImage = false;
                                                this.clearErrorState();
                                                resolve();
                                            },
                                            error: (error) => {
                                                console.error('Failed to update viewer:', error);
                                                reject(error);
                                            }
                                        });
                                    });
                                },
                                {
                                    maxRetries: 2,
                                    baseDelay: 500,
                                    backoffFactor: 1.5,
                                    maxDelay: 3000,
                                    operationId: 'update_viewer_' + photo.id,
                                    onRetry: (error, attempt) => {
                                        console.log(`Viewer update retry ${attempt}:`, error);
                                        this.loadingMessage = `Aggiornamento viewer (tentativo ${attempt})...`;
                                    },
                                    onFinalError: (error) => {
                                        this.handleError('VIEWER_UPDATE_FAILED', error.message, {
                                            recoverable: true,
                                            userAction: 'Ricarica la pagina',
                                            photoId: photo.id
                                        });
                                    }
                                }
                            );
                        } else {
                            // Fallback senza retry system
                            this.viewer.world.removeAll();
                            
                            return new Promise((resolve, reject) => {
                                this.viewer.addTiledImage({
                                    tileSource: tileSource,
                                    success: () => {
                                        this.currentImageInfo = {
                                            width: this.viewer.world.getItemAt(0).getContentSize().x,
                                            height: this.viewer.world.getItemAt(0).getContentSize().y
                                        };
                                        this.isLoading = false;
                                        this.usingSimpleImage = false;
                                        this.clearErrorState();
                                        resolve();
                                    },
                                    error: (error) => {
                                        console.error('Failed to update viewer:', error);
                                        this.handleError('VIEWER_UPDATE_FAILED', error.message, {
                                            recoverable: true,
                                            userAction: 'Ricarica la pagina',
                                            photoId: photo.id
                                        });
                                        reject(error);
                                    }
                                });
                            })
                        }
                    } catch (error) {
                        console.error('Errore nell\'aggiornamento del viewer:', error);
                        this.handleError('VIEWER_UPDATE_ERROR', error.message, {
                            recoverable: true,
                            userAction: 'Ricarica la pagina',
                            photoId: photo.id
                        });
                    }
                } else {
                    // Viewer not initialized, try to initialize
                    await this.initViewer();
                }
            } else {
                // Use simple image
                await this.useSimpleImage();
            }
        },
        
        // Advanced Error Handling Methods
        classifyError(error) {
            if (!error) return 'UNKNOWN';
            
            // Network errors
            if (error.name === 'AbortError') return 'TIMEOUT';
            if (error.message?.includes('timeout')) return 'TIMEOUT';
            if (error.message?.includes('network')) return 'NETWORK';
            if (error.status === 0) return 'NETWORK';
            
            // HTTP errors
            if (error.status) {
                if (error.status === 401) return 'AUTH';
                if (error.status === 403) return 'PERMISSION';
                if (error.status === 404) return 'NOT_FOUND';
                if (error.status === 422) return 'VALIDATION';
                if (error.status >= 500) return 'SERVER';
            }
            
            // Library errors
            if (error.message?.includes('OpenSeadragon')) return 'VIEWER_LIBRARY';
            if (error.message?.includes('tile')) return 'TILE_LOAD';
            
            return 'UNKNOWN';
        },
        
        recordError(errorType, error, context = {}) {
            const errorRecord = {
                timestamp: Date.now(),
                type: errorType,
                message: error.message || 'Unknown error',
                context: {
                    photoId: this.currentPhotoData?.id,
                    viewerState: {
                        isInitialized: this.isInitialized,
                        usingSimpleImage: this.usingSimpleImage,
                        retryCount: this.retryCount,
                        tileLoadFailures: this.tileLoadFailures
                    },
                    ...context
                },
                userAgent: navigator.userAgent,
                url: window.location.href
            };
            
            this.errorHistory.unshift(errorRecord);
            
            // Keep only last 50 errors
            if (this.errorHistory.length > 50) {
                this.errorHistory = this.errorHistory.slice(0, 50);
            }
            
            // Log to console and error handling system
            if (window.logError) {
                window.logError(`Viewer Error [${errorType}]`, error.message, errorRecord.context);
            }
            
            // Update current error type
            this.currentErrorType = errorType;
        },
        
        clearErrorState() {
            this.hasError = false;
            this.errorMessage = '';
            this.simpleImageError = false;
            this.simpleImageErrorMessage = '';
            this.currentErrorType = null;
            this.recoveryAttempts = 0;
        },
        
        handleError(errorType, message, options = {}) {
            this.hasError = true;
            this.errorMessage = message;
            this.currentErrorType = errorType;
            
            // Record error for analysis
            this.recordError(errorType, new Error(message), options.context || {});
            
            // Get recovery suggestions
            const suggestions = this.getRecoverySuggestions(errorType, options);
            
            // Show appropriate toast notification
            if (window.toastSystem) {
                const toastMethod = options.severity === 'warning' ? 'showWarning' :
                                   options.severity === 'info' ? 'showInfo' : 'showError';
                
                window.toastSystem[toastMethod](message, {
                    title: suggestions.title,
                    details: options.details || null,
                    actions: suggestions.actions,
                    timeout: options.timeout || (errorType === 'NETWORK' ? 0 : 5000)
                });
            }
            
            // Log recovery attempt
            this.recoveryAttempts++;
            console.log(`Recovery attempt ${this.recoveryAttempts} for error ${errorType}`);
        },

                            id: 'reload-page',
                            label: 'Ricarica Pagina',
                            handler: () => {
                                window.location.reload();
                            }
                        }
                    ]
                },
                'VIEWER_UPDATE_ERROR': {
                    title: 'Errore Aggiornamento Visualizzatore',
                    actions: [
                        {
                            id: 'reload-page',
                            label: 'Ricarica Pagina',
                            handler: () => {
                                window.location.reload();
                            }
                        }
                    ]
                },
                'SIMPLE_IMAGE_LOAD_FAILED': {
                    title: 'Fallito Caricamento Immagine',
                    actions: [
                        {
                            id: 'retry-simple',
                            label: 'Riprova Caricamento',
                            handler: () => this.retrySimpleImageLoad()
                        },
                        {
                            id: 'reload-page',
                            label: 'Ricarica Pagina',
                            handler: () => {
                                window.location.reload();
                            }
                        }
                    ]
                }
            };
            
            return suggestions[errorType] || {
                title: 'Errore Sconosciuto',
                actions: [
                    {
                        id: 'retry',
                        label: 'Riprova',
                        handler: () => this.retryLoad()
                    },
                    {
                        id: 'reload-page',
                        label: 'Ricarica Pagina',
                        handler: () => {
                            window.location.reload();
                        }
                    }
                ]
            };
        },
    };
}

// Initialize when Alpine is ready
document.addEventListener('alpine:init', () => {
    Alpine.data('openSeadragonViewer', openSeadragonViewer);
});
</script>
