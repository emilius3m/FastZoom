<!-- Voice Assistant Compact Navbar Component -->
<!-- Integrated in navbar, non-intrusive, expandable dropdown -->

<div x-data="voiceAssistant()" x-cloak class="relative" x-init="init()">

    <!-- Compact Navbar Widget -->
    <div class="flex items-center gap-2">

        <!-- Mic Button with Status -->
        <button @click="toggleListening(); if(!isConnected) connect()" :class="{
                    'bg-red-500 hover:bg-red-600 text-white': isListening,
                    'bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300': !isListening && isConnected,
                    'bg-gray-50 hover:bg-gray-100 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-400': !isListening && !isConnected
                }" class="relative flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-medium transition-all"
            title="Assistente Vocale (Ctrl+Shift+V)">

            <!-- Mic Icon -->
            <svg class="w-4 h-4" :class="{ 'animate-pulse': isListening }" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd"
                    d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z"
                    clip-rule="evenodd"></path>
            </svg>

            <!-- Status Text (compact) -->
            <span x-show="isListening || transcript" class="max-w-32 truncate text-xs"
                x-text="isListening ? (transcript || 'Ascoltando...') : ''"></span>

            <!-- Recording indicator -->
            <span x-show="isListening" class="absolute -top-0.5 -right-0.5 flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
            </span>
        </button>

        <!-- Expand/Collapse Button -->
        <button @click="isOpen = !isOpen" x-show="messages.length > 0 || response"
            class="p-1.5 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 rounded transition-colors"
            title="Mostra cronologia">
            <svg class="w-4 h-4 transition-transform" :class="{ 'rotate-180': isOpen }" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
        </button>
    </div>

    <!-- Last Response Preview (inline, non-blocking) -->
    <div x-show="response && !isOpen" x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
        class="absolute top-full right-0 mt-2 p-2 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 max-w-xs z-50">
        <p class="text-xs text-gray-600 dark:text-gray-300 truncate" x-text="response"></p>
    </div>

    <!-- Expandable Dropdown Panel -->
    <div x-show="isOpen" x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95 -translate-y-2"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 scale-100 translate-y-0"
        x-transition:leave-end="opacity-0 scale-95 -translate-y-2" @click.outside="isOpen = false"
        @keydown.escape.window="isOpen = false"
        class="absolute top-full right-0 mt-2 w-80 max-h-96 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 z-50 flex flex-col overflow-hidden">

        <!-- Header -->
        <div
            class="flex items-center justify-between px-3 py-2 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900">
            <div class="flex items-center gap-2">
                <span class="text-lg" x-text="statusIcon"></span>
                <span class="text-xs text-gray-500 dark:text-gray-400" x-text="statusMessage"></span>
            </div>
            <div class="flex items-center gap-1">
                <!-- Download -->
                <button @click="downloadRecording()" x-show="hasRecording"
                    class="p-1 text-green-600 hover:text-green-700 dark:text-green-400 rounded"
                    title="Scarica registrazione">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                </button>
                <!-- Clear -->
                <button @click="clearMessages(); clearRecording()" :disabled="messages.length === 0"
                    class="p-1 text-gray-500 hover:text-gray-700 dark:text-gray-400 disabled:opacity-50 rounded"
                    title="Cancella">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div x-ref="messagesContainer" class="flex-1 overflow-y-auto p-3 space-y-2 max-h-60">
            <!-- Empty State -->
            <template x-if="messages.length === 0">
                <div class="text-center text-gray-400 dark:text-gray-500 py-4">
                    <p class="text-xs">Premi il microfono e parla</p>
                    <p class="text-xs mt-1">Es: "Vai alle foto", "Nuovo giornale"</p>
                </div>
            </template>

            <!-- Message list -->
            <template x-for="msg in messages" :key="msg.id">
                <div :class="{ 'text-right': msg.role === 'user' }">
                    <div :class="{
                            'bg-blue-600 text-white': msg.role === 'user',
                            'bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white': msg.role === 'assistant'
                        }" class="inline-block px-3 py-1.5 rounded-xl text-xs max-w-[85%]">
                        <span x-text="msg.text"></span>
                    </div>
                </div>
            </template>

            <!-- Processing -->
            <div x-show="isProcessing" class="flex gap-1 px-2">
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="border-t border-gray-200 dark:border-gray-700 p-2 bg-gray-50 dark:bg-gray-900">
            <div class="flex items-center gap-2">
                <input type="text" x-model="transcript" @keydown.enter="sendText(transcript); transcript = ''"
                    placeholder="Scrivi un comando..."
                    class="flex-1 px-2 py-1 text-xs bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded focus:ring-1 focus:ring-blue-500 dark:text-white">
                <button @click="sendText(transcript); transcript = ''" :disabled="!isConnected || !transcript.trim()"
                    class="p-1.5 text-white bg-blue-600 rounded hover:bg-blue-700 disabled:opacity-50 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
