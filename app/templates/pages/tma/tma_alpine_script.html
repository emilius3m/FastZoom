    // Callback per upload successo
    initPhotoUploadCallback() {
      // Definiamo una funzione globale che il componente di upload chiamerà al successo
      window.onTMAPhotoUploadSuccess = (result) => {
        console.log("onTMAPhotoUploadSuccess called with result:", result);
        this.handlePhotoUploadSuccess(result);
      };
    },

    openPhotoUploadModal() {
      // Ensure the callback is registered
      this.initPhotoUploadCallback();

      // Find the alpine component instance for the upload modal and open it
      const modalEl = document.querySelector('[x-data="photoUploadComponent"]');
      if (modalEl) {
        // Update the component's success callback binding to point to our newly registered global function
        const alpineInstance = Alpine.$data(modalEl);
        if (alpineInstance) {
          alpineInstance.config.successCallback = 'onTMAPhotoUploadSuccess';
          // Pre-fill metadata se vogliamo (es. NCTR + NCTN)
          alpineInstance.metadata.inventory_number = this.nct;
          // Open the modal
          alpineInstance.openModal();
        }
      } else {
        console.error("Photo upload modal component not found");
      }
    },
    
    handlePhotoUploadSuccess(result) {
        console.log("Handling photo upload success inside Alpine component", result);
        
        let uploadedFiles = [];
        // Verifica la struttura della risposta per gestire vari formati possibili dal backend
        if (result && Array.isArray(result.successful)) {
            uploadedFiles = result.successful;
        } else if (result && Array.isArray(result.uploaded_photos)) {
            uploadedFiles = result.uploaded_photos;
        } else if (Array.isArray(result)) {
            uploadedFiles = result;
        }
        
        if (uploadedFiles.length === 0) {
             console.warn("No successful files array found in upload response", result);
             // Potrebbe essere un upload "finto" da mock per TUS
             // Prova a scansionare i file temporanei locali se usati?
             // Nella versione attuale, se non ci sono dettagli dal backend lato TUS, 
             // il bridge potrebbe non funzionare perfettamente senza un endpoint che 
             // ritorni l'URL esatto dei file completati. 
             // Per via della flessibilità del componente, lo mettiamo un Toast informativo.
             // Se TUS ha avuto successo, `result` potrebbe avere `successful` ma essere un array vuoto
             // (visto il mock nella versione originale).
             // Fallback temporaneo
        }

        uploadedFiles.forEach(fileInfo => {
            // fileInfo potrebbe essere dict con url, filename, o solo un oggetto fittizio
            // Idealmente il backend dovrebbe restituire { url: "...", filename: "..." }
            
            // Per ora supportiamo un URL base
            const filePath = typeof fileInfo === 'string' ? fileInfo : 
                            (fileInfo.url || fileInfo.file_path || fileInfo.file_url || '');

            const photoId = (fileInfo && typeof fileInfo === 'object')
              ? (fileInfo.photo_id || fileInfo.id || null)
              : null;

            const previewUrl = (fileInfo && typeof fileInfo === 'object')
              ? (fileInfo.thumbnail_url || fileInfo.file_url || fileInfo.url || '')
              : '';

            const filename = fileInfo.filename || fileInfo.name || '';
            const description = fileInfo.description || '';
            
            this.form.fotografie.push({
               ftax: 'documentazione allegata',
               ftap: 'fotografia digitale (file)', 
               ftan: description || filename, 
               file_path: filePath,
               photo_id: photoId,
               preview_url: previewUrl,
               preview_mode: 'thumbnail',
               preview_error: false
             });
        });
        
        this.sections.do_section = true;
        
        // Forza alpine a ricaricare l'UI
        setTimeout(() => { this.$apply || this.$refs?.form?.click(); }, 100);
    },

    async init() {
      if (!this.form.cdgg) {
        this.form.cdgg = 'proprietà Stato'
      }
      this.initPhotoUploadCallback();
      await this.fetchRecords()
    },

    get filteredRecords() {
      const q = (this.listSearch || '').trim().toLowerCase()
      let results = this.records
      if (q) {
        results = results.filter((r) => {
          const nct = this.recordNct(r).toLowerCase()
          return (
            nct.includes(q) ||
            String(r?.ogtd || '').toLowerCase().includes(q) ||
            String(r?.pvcc || '').toLowerCase().includes(q) ||
            String(r?.dtzg || '').toLowerCase().includes(q)
          )
        })
      }
      // Sort
      const sorted = [...results]
      switch (this.listSort) {
        case 'newest':
          sorted.sort((a, b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0))
          break
        case 'oldest':
          sorted.sort((a, b) => new Date(a.updated_at || 0) - new Date(b.updated_at || 0))
          break
        case 'nct_asc':
          sorted.sort((a, b) => this.recordNct(a).localeCompare(this.recordNct(b)))
          break
        case 'nct_desc':
          sorted.sort((a, b) => this.recordNct(b).localeCompare(this.recordNct(a)))
          break
      }
      return sorted
    },

    async fetchRecords() {
      this.listError = ''
      this.listLoading = true
      try {
        const response = await fetch(`/api/v1/tma/sites/${this.siteId}/records?limit=200`)
        if (!response.ok) {
          const err = await response.json().catch(() => ({}))
          throw new Error(err.detail || 'Errore caricamento elenco TMA')
        }
        this.records = await response.json()
      } catch (e) {
        this.listError = e.message || 'Errore caricamento elenco TMA'
      } finally {
        this.listLoading = false
      }
    },

    openTMAModal() {
      this.beginNewRecord()
      this.showTMAModal = true
      document.body.style.overflow = 'hidden'
    },

    closeTMAModal() {
      this.showTMAModal = false
      document.body.style.overflow = ''
    },

    beginNewRecord() {
      this.formMode = 'create'
      this.editingRecordId = null
      this.successMessage = ''
      this.errorMessage = ''
      this.warningMessage = ''
      this.form = JSON.parse(JSON.stringify(this.defaultForm))
    },

    editRecord(record) {
      if (!record) return
      this.formMode = 'edit'
      this.editingRecordId = record.id
      this.successMessage = ''
      this.errorMessage = ''
      this.warningMessage = ''
      this.form = this.buildFormFromRecord(record)
      this.showTMAModal = true
      document.body.style.overflow = 'hidden'
    },

    isEditingRecord(recordId) {
      return this.formMode === 'edit' && this.editingRecordId === recordId
    },

    buildFormFromRecord(record) {
      const safeStrings = (arr) => (Array.isArray(arr) && arr.length ? arr.map((v) => String(v || '')) : [''])
      return {
        ...JSON.parse(JSON.stringify(this.defaultForm)),
        tsk: record?.tsk || 'TMA',
        lir: record?.lir || 'I',
        nctr: record?.nctr || '',
        nctn: record?.nctn || '',
        esc: record?.esc || '',
        ecp: record?.ecp || '',
        ogtd: record?.ogtd || '',
        ogtm: record?.ogtm || '',
        pvcs: record?.pvcs || 'ITALIA',
        pvcr: record?.pvcr || '',
        pvcp: String(record?.pvcp || '').toUpperCase(),
        pvcc: record?.pvcc || '',
        ldct: record?.ldct || '',
        ldcn: record?.ldcn || '',
        ldcu: record?.ldcu || '',
        ldcs: record?.ldcs || '',
        scan: record?.scan || '',
        dscf: record?.dscf || '',
        dsca: record?.dsca || '',
        dsct: record?.dsct || '',
        dscm: record?.dscm || '',
        dscd: record?.dscd || '',
        dscu: record?.dscu || '',
        dscn: record?.dscn || '',
        dtzg: record?.dtzg || '',
        nsc: record?.nsc || '',
        cdgg: record?.cdgg || '',
        adsp: record?.adsp || 2,
        adsm: record?.adsm || '',
        cmpd: record?.cmpd || '',
        dtm: Array.isArray(record?.dtm) ? [...record.dtm] : [],
        altre_localizzazioni: Array.isArray(record?.altre_localizzazioni)
          ? record.altre_localizzazioni.map((a) => ({
              tcl: a?.tcl || '',
              prvs: a?.prvs || '',
              prvr: a?.prvr || '',
              prvp: String(a?.prvp || '').toUpperCase(),
              prvc: a?.prvc || '',
              prcu: a?.prcu || ''
            }))
          : [],
        materiali: Array.isArray(record?.materiali) && record.materiali.length
          ? record.materiali.map((m) => ({
              macc: m?.macc || '',
              macl: m?.macl || '',
              macd: m?.macd || '',
              macp: m?.macp || '',
              macq: m?.macq ?? null,
              mas: m?.mas || ''
            }))
          : [{ macc: '', macl: '', macd: '', macp: '', macq: null, mas: '' }],
        fotografie: Array.isArray(record?.fotografie)
          ? record.fotografie.map((f) => ({
              ftax: f?.ftax || '',
              ftap: f?.ftap || '',
              ftan: f?.ftan || '',
              file_path: f?.file_path || '',
              photo_id: null,
              preview_url: '',
              preview_mode: 'thumbnail',
              preview_error: false
            }))
          : [],
        cmpn: safeStrings(record?.cmpn),
        fur: safeStrings(record?.fur)
      }
    },

    recordNct(record) {
      const nctr = (record?.nctr || '').trim()
      const nctn = String(record?.nctn || '').padStart(8, '0')
      return `${nctr}${nctn}` || '-'
    },

    formatDate(value) {
      if (!value) return '-'
      const d = new Date(value)
      if (Number.isNaN(d.getTime())) return '-'
      return d.toLocaleString('it-IT')
    },

    toggleSection(name) {
      this.sections[name] = !this.sections[name]
    },

    get nct() {
      const nctr = (this.form.nctr || '').trim()
      const nctnRaw = (this.form.nctn || '').replace(/\D/g, '')
      const nctnPadded = nctnRaw.padStart(8, '0').slice(0, 8)
      return `${nctr}${nctnPadded}`
    },

    normalizeNctn() {
      const digits = (this.form.nctn || '').replace(/\D/g, '')
      this.form.nctn = digits.padStart(8, '0').slice(0, 8)
    },

    getProvinceOptions(regionName) {
      const key = (regionName || '').trim()
      const sigle = this.provincePerRegione[key] || []
      return sigle.map((code) => ({
        code,
        name: this.sigleProvince[code] || code
      }))
    },

    onPvcrChange() {
      const allowed = this.getProvinceOptions(this.form.pvcr).map((p) => p.code)
      this.form.pvcp = String(this.form.pvcp || '').toUpperCase()
      if (!allowed.includes(this.form.pvcp)) {
        this.form.pvcp = ''
      }
    },

    onPrvrChange(la) {
      if (!la) return
      const allowed = this.getProvinceOptions(la.prvr).map((p) => p.code)
      la.prvp = String(la.prvp || '').toUpperCase()
      if (!allowed.includes(la.prvp)) {
        la.prvp = ''
      }
    },

    addMateriale() {
      this.form.materiali.push({ macc: '', macl: '', macd: '', macp: '', macq: null, mas: '' })
    },
    removeMateriale(index) {
      if (this.form.materiali.length <= 1) return
      this.form.materiali.splice(index, 1)
    },

    addAltraLocalizzazione() {
      this.form.altre_localizzazioni.push({ tcl: '', prvs: '', prvr: '', prvp: '', prvc: '', prcu: '' })
    },
    removeAltraLocalizzazione(index) {
      this.form.altre_localizzazioni.splice(index, 1)
    },

    addFoto() {
      this.form.fotografie.push({
        ftax: 'documentazione allegata',
        ftap: 'fotografia digitale (file)',
        ftan: '',
        file_path: '',
        photo_id: null,
        preview_url: '',
        preview_mode: 'thumbnail',
        preview_error: false
      })
    },
    removeFoto(index) {
      this.form.fotografie.splice(index, 1)
    },

    getPhotoPreviewUrl(foto) {
      if (!foto || foto.preview_error) return ''

      const explicitPreview = String(foto.preview_url || '').trim()
      if (explicitPreview && (explicitPreview.startsWith('/') || explicitPreview.startsWith('http://') || explicitPreview.startsWith('https://'))) {
        return explicitPreview
      }

      const photoId = String(foto.photo_id || '').trim()
      if (photoId) {
        if (foto.preview_mode === 'full') return `/api/v1/photos/${photoId}/full`
        return `/api/v1/photos/${photoId}/thumbnail`
      }

      const path = String(foto.file_path || '').trim()
      if (path) {
        if (path.startsWith('/') || path.startsWith('http://') || path.startsWith('https://')) {
          return path
        }

        return `/api/v1/tma/sites/${this.siteId}/foto-preview?file_path=${encodeURIComponent(path)}`
      }

      return ''
    },

    onPhotoPreviewError(index) {
      const foto = this.form.fotografie?.[index]
      if (!foto) return

      const photoId = String(foto.photo_id || '').trim()
      if (photoId && foto.preview_mode !== 'full') {
        foto.preview_mode = 'full'
        return
      }

      foto.preview_error = true
    },

    addCompilatore() { this.form.cmpn.push('') },
    removeCompilatore(i) {
      if (this.form.cmpn.length <= 1) return
      this.form.cmpn.splice(i, 1)
    },

    addFunzionario() { this.form.fur.push('') },
    removeFunzionario(i) {
      if (this.form.fur.length <= 1) return
      this.form.fur.splice(i, 1)
    },

    toggleDtm(value) {
      const idx = this.form.dtm.indexOf(value)
      if (idx >= 0) this.form.dtm.splice(idx, 1)
      else this.form.dtm.push(value)
    },
    hasDtm(value) {
      return this.form.dtm.includes(value)
    },

    detectOgtmWarning() {
      const ogtm = (this.form.ogtm || '').toLowerCase()
      const missing = []
      for (const m of this.form.materiali) {
        const c = (m.macc || '').trim()
        if (!c) continue
        if (!ogtm.includes(c.toLowerCase())) missing.push(c)
      }
      if (missing.length) {
        this.warningMessage = `OGTM non include alcune categorie materiali: ${missing.join(', ')}`
      } else {
        this.warningMessage = ''
      }
    },

    cleanStringArray(values) {
      return (values || []).map(v => (v || '').trim()).filter(Boolean)
    },

    validatePayload(payload) {
      const errors = []

      const requiredScalar = [
        ['nctr', 'NCTR'],
        ['nctn', 'NCTN'],
        ['esc', 'ESC'],
        ['ecp', 'ECP'],
        ['ogtd', 'OGTD'],
        ['ogtm', 'OGTM'],
        ['pvcs', 'PVCS'],
        ['pvcr', 'PVCR'],
        ['pvcp', 'PVCP'],
        ['pvcc', 'PVCC'],
        ['dtzg', 'DTZG'],
        ['cdgg', 'CDGG'],
        ['cmpd', 'CMPD']
      ]

      for (const [key, label] of requiredScalar) {
        if (!String(payload[key] || '').trim()) errors.push(label)
      }

      if (!/^\d{8}$/.test(String(payload.nctn || ''))) errors.push('NCTN(8 cifre)')
      if (!Array.isArray(payload.dtm) || payload.dtm.length === 0) errors.push('DTM')
      if (!Array.isArray(payload.cmpn) || payload.cmpn.length === 0) errors.push('CMPN')
      if (!Array.isArray(payload.fur) || payload.fur.length === 0) errors.push('FUR')

      if (!Array.isArray(payload.materiali) || payload.materiali.length === 0) {
        errors.push('MA')
      } else {
        const invalidMateriale = payload.materiali.some(m => !String(m.macc || '').trim() || Number(m.macq || 0) < 1)
        if (invalidMateriale) errors.push('MACC/MACQ')
      }

      return [...new Set(errors)]
    },

    formatApiError(err) {
      const detail = err?.detail
      if (Array.isArray(detail)) {
        return detail
          .map((d) => {
            const loc = Array.isArray(d?.loc) ? d.loc.join('.') : ''
            const msg = d?.msg || 'errore di validazione'
            return loc ? `${loc}: ${msg}` : msg
          })
          .join(' | ')
      }
      if (typeof detail === 'object' && detail !== null) return JSON.stringify(detail)
      if (typeof detail === 'string' && detail.trim()) return detail
      return ''
    },

    scrollToFeedback() {
      const el = document.getElementById('tma-feedback-anchor')
      if (el?.scrollIntoView) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' })
      }
    },

    scrollToForm() {
      const el = document.getElementById('tma-form-anchor')
      if (el?.scrollIntoView) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' })
      }
    },

    buildPayload() {
      const materiali = (this.form.materiali || []).map(m => ({
        macc: (m.macc || '').trim(),
        macl: (m.macl || '').trim() || null,
        macd: (m.macd || '').trim() || null,
        macp: (m.macp || '').trim() || null,
        macq: Number(m.macq || 0),
        mas: (m.mas || '').trim() || null
      })).filter(m => m.macc || m.macq > 0)

      const fotografie = (this.form.fotografie || []).map(f => ({
        ftax: (f.ftax || '').trim() || null,
        ftap: (f.ftap || '').trim() || null,
        ftan: (f.ftan || '').trim() || null,
        file_path: (f.file_path || '').trim() || null
      })).filter(f => f.ftax || f.ftap || f.ftan || f.file_path)

      const altre_localizzazioni = (this.form.altre_localizzazioni || []).map(a => ({
        tcl: (a.tcl || '').trim() || null,
        prvs: (a.prvs || '').trim() || null,
        prvr: (a.prvr || '').trim() || null,
        prvp: (a.prvp || '').trim().toUpperCase() || null,
        prvc: (a.prvc || '').trim() || null,
        prcu: (a.prcu || '').trim() || null
      })).filter(a => a.tcl || a.prvs || a.prvr || a.prvp || a.prvc || a.prcu)

      return {
        tsk: 'TMA',
        lir: 'I',
        nctr: (this.form.nctr || '').trim(),
        nctn: (this.form.nctn || '').trim(),
        esc: (this.form.esc || '').trim(),
        ecp: (this.form.ecp || '').trim(),

        ogtd: (this.form.ogtd || '').trim(),
        ogtm: (this.form.ogtm || '').trim(),

        pvcs: (this.form.pvcs || 'ITALIA').trim(),
        pvcr: (this.form.pvcr || '').trim(),
        pvcp: (this.form.pvcp || '').trim().toUpperCase(),
        pvcc: (this.form.pvcc || '').trim(),

        ldct: (this.form.ldct || '').trim() || null,
        ldcn: (this.form.ldcn || '').trim() || null,
        ldcu: (this.form.ldcu || '').trim() || null,
        ldcs: (this.form.ldcs || '').trim() || null,

        altre_localizzazioni,

        scan: (this.form.scan || '').trim() || null,
        dscf: (this.form.dscf || '').trim() || null,
        dsca: (this.form.dsca || '').trim() || null,
        dsct: (this.form.dsct || '').trim() || null,
        dscm: (this.form.dscm || '').trim() || null,
        dscd: (this.form.dscd || '').trim() || null,
        dscu: (this.form.dscu || '').trim() || null,
        dscn: (this.form.dscn || '').trim() || null,

        dtzg: (this.form.dtzg || '').trim(),
        dtm: this.cleanStringArray(this.form.dtm),

        nsc: (this.form.nsc || '').trim() || null,

        materiali,

        cdgg: (this.form.cdgg || '').trim(),

        fotografie,

        adsp: this.form.adsp ? Number(this.form.adsp) : 2,
        adsm: (this.form.adsm || '').trim() || null,

        cmpd: (this.form.cmpd || '').trim(),
        cmpn: this.cleanStringArray(this.form.cmpn),
        fur: this.cleanStringArray(this.form.fur)
      }
    },

    getCSRFToken() {
      return document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''
    },

    async submitForm() {
      this.errorMessage = ''
      this.successMessage = ''
      this.warningMessage = ''
      this.normalizeNctn()
      this.detectOgtmWarning()

      const payload = this.buildPayload()
      const validationErrors = this.validatePayload(payload)
      if (validationErrors.length) {
        this.errorMessage = `Compilare i campi obbligatori: ${validationErrors.join(', ')}`
        return
      }

      this.saving = true
      try {
        const isEdit = this.formMode === 'edit' && !!this.editingRecordId
        const endpoint = isEdit
          ? `/api/v1/tma/sites/${this.siteId}/records/${this.editingRecordId}`
          : `/api/v1/tma/sites/${this.siteId}/records`

        const response = await fetch(endpoint, {
          method: isEdit ? 'PUT' : 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': this.getCSRFToken()
          },
          body: JSON.stringify(payload)
        })

        if (!response.ok) {
          const raw = await response.text().catch(() => '')
          let err = {}
          try {
            err = raw ? JSON.parse(raw) : {}
          } catch (_) {
            err = {}
          }
          const backendMessage = this.formatApiError(err) || raw
          throw new Error((backendMessage || 'Errore salvataggio scheda TMA').trim())
        }

        const saved = await response.json().catch(() => null)
        if (saved?.id) {
          this.formMode = 'edit'
          this.editingRecordId = saved.id
          this.form = this.buildFormFromRecord(saved)
        }

        this.successMessage = isEdit
          ? 'Scheda TMA aggiornata correttamente.'
          : 'Scheda TMA salvata correttamente.'

        await this.fetchRecords()
        this.closeTMAModal()
      } catch (e) {
        this.errorMessage = e.message || 'Errore salvataggio scheda TMA'
      } finally {
        this.saving = false
      }
    }
  }
}
</script>
