<!-- app/templates/pages/us/harris_matrix_tab_component.html -->
<!-- Componente Harris Matrix per embedding nel tab US/USM -->

<!-- ===== STYLES ===== -->
<style>
    #harris-matrix-cy {
        width: 100%;
        height: 650px;
        min-height: 500px;
        background-color: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
    }

    .dark #harris-matrix-cy {
        background-color: #1f2937;
        border-color: #374151;
    }

    .matrix-loading {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        border-radius: 0.5rem;
    }

    .dark .matrix-loading {
        background: rgba(31, 41, 55, 0.9);
    }

    .matrix-legend-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.25rem 0;
    }
</style>

<!-- ===== TEMPLATE ===== -->
<div x-data="harrisMatrixTabComponent()" x-init="init()">
    <!-- Toolbar -->
    <div

            <div class="flex items-center justify-center h-8 w-8 rounded-full bg-green-100 dark:bg-green-900">
                <svg class="h-4 w-4 text-green-600 dark:text-green-300" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                    </path>
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Harris Matrix</h3>
            <!-- Stats badges -->
            <div class="hidden sm:flex items-center space-x-2">
                <span
                    class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200">
                    <span x-text="getUSPositiveCount()"></span> US+
                </span>
                <span
                    class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200">
                    <span x-text="getUSNegativeCount()"></span> US-
                </span>

                </span>
                <span

                    <span x-text="matrixData.metadata?.total_edges || 0"></span> Relazioni

            </div>
        </div>

            <select x-model="settings.layout" @change="updateLayout()"

                <option value="elk">Layout ELK</option>
                <option value="dagre">Layout Dagre</option>
                <option value="breadthfirst">Breadth First</option>
            </select>
            <!-- Controls -->
            <button @click="fitToScreen()"
                class="p-1.5 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded"
                title="Adatta">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4">
                    </path>
                </svg>
            </button>
            <button @click="loadMatrix()" :disabled="loading"
                class="p-1.5 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded"
                title="Ricarica">
                <svg class="w-4 h-4" :class="{ 'animate-spin': loading }" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                    </path>
                </svg>
            </button>
            <button @click="exportImage()"
                class="p-1.5 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded"
                title="Esporta PNG">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
            </button>
            <!-- Edit button -->
            <a href="{{ url_for('harris_matrix_editor', site_id=(current_site_id if current_site_id is defined and current_site_id else site.id)) }}"
                class="inline-flex items-center px-3 py-1.5 bg-blue-600 border border-transparent rounded-md text-xs font-medium text-white hover:bg-blue-700 transition-colors">
                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                    </path>
                </svg>
                Modifica Matrix
            </a>
        </div>
    </div>

    <!-- Main Matrix Container -->
    <div class="relative">
        <!-- Loading Overlay -->
        <div x-show="loading" class="matrix-loading">
            <div class="text-center">
                <svg class="animate-spin h-10 w-10 text-green-600 mx-auto mb-3" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <p class="text-gray-600 dark:text-gray-300">Caricamento Harris Matrix...</p>
            </div>
        </div>

        <!-- Cytoscape Container -->
        <div id="harris-matrix-cy"></div>

        <!-- Empty State -->
        <div x-show="!loading && (!matrixData.nodes || matrixData.nodes.length === 0)"
            class="absolute inset-0 flex items-center justify-center bg-gray-50 dark:bg-gray-800 rounded-lg">
            <div class="text-center max-w-md p-6">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                    </path>
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">Nessun dato</h3>
                <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                    Non ci sono unità stratigrafiche con relazioni per questo sito.
                </p>
                <p class="mt-3">
                    <button @click="$dispatch('open-us-modal')"
                        class="text-green-600 hover:text-green-500 font-medium text-sm">
                        Crea una nuova US →
                    </button>
                </p>
            </div>
        </div>
    </div>

    <!-- Legend (collapsed by default) -->
    <div class="px-4 py-2 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/30">
        <details class="group">
            <summary class="cursor-pointer text-xs font-medium text-gray-600 dark:text-gray-400 flex items-center">
                <svg class="w-4 h-4 mr-1 transform group-open:rotate-90 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
                Legenda
            </summary>
            <div class="mt-2 grid grid-cols-2 sm:grid-cols-4 gap-3 text-xs">
                <!-- Nodes -->
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-4 rounded bg-blue-500 border border-blue-700"></div>
                    <span class="text-gray-600 dark:text-gray-400">US Positiva</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-4 bg-red-500 border border-red-700 border-dashed"></div>
                    <span class="text-gray-600 dark:text-gray-400">US Negativa</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-4 rounded bg-purple-500 border border-purple-700"></div>
                    <span class="text-gray-600 dark:text-gray-400">USM</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-4 rounded border-2 border-dashed border-gray-400 bg-gray-100"></div>
                    <span class="text-gray-600 dark:text-gray-400">Periodo</span>
                </div>
                <!-- Edges -->
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-0.5 bg-gray-600"></div>
                    <span class="text-gray-600 dark:text-gray-400">copre/appoggia</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-0.5 bg-red-500" style="border-top: 2px dashed #ef4444;"></div>
                    <span class="text-gray-600 dark:text-gray-400">taglia</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-0.5 bg-blue-500"></div>
                    <span class="text-gray-600 dark:text-gray-400">riempie</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-0.5 bg-green-500" style="border-top: 2px dotted #10b981;"></div>
                    <span class="text-gray-600 dark:text-gray-400">uguale/lega</span>
                </div>
            </div>
        </details>
    </div>

    <!-- Selected Node Info -->
    <div x-show="selectedNode" x-cloak
        class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 bg-blue-50 dark:bg-blue-900/20">
        <div class="flex justify-between items-start">
            <div>
                <h4 class="font-medium text-blue-900 dark:text-blue-100">
                    <span x-text="selectedNode?.label"></span>
                    <span class="text-sm text-blue-600 dark:text-blue-300 ml-2"
                        x-text="'(' + (selectedNode?.type || '').toUpperCase() + ')'"></span>
                </h4>
                <div class="text-sm text-blue-700 dark:text-blue-200 mt-1 space-y-0.5">
                    <p x-show="selectedNode?.data?.definition" x-text="selectedNode?.data?.definition"></p>
                    <p x-show="selectedNode?.data?.periodo"><strong>Periodo:</strong> <span
                            x-text="selectedNode?.data?.periodo"></span></p>
                    <p x-show="selectedNode?.data?.fase"><strong>Fase:</strong> <span
                            x-text="selectedNode?.data?.fase"></span></p>
                </div>
            </div>
            <button @click="selectedNode = null" class="text-blue-600 dark:text-blue-400 hover:text-blue-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
    </div>
</div>

<!-- ===== SCRIPT ===== -->
<script>
    function harrisMatrixTabComponent() {
        return {
            cy: null,
            matrixData: { nodes: [], edges: [], levels: {}, metadata: {} },
            selectedNode: null,
            loading: false,
            error: null,
            settings: {
                layout: 'elk',
                showLabels: true,
                showEdgeLabels: true,
                animateLayout: true
            },
            siteId: '{{ current_site_id if current_site_id is defined and current_site_id else site.id }}',

            async init() {
                // Load only when tab becomes active (lazy loading)
                await this.loadMatrix();
            },

            async loadMatrix() {
                if (this.loading) return;
                this.loading = true;
                this.error = null;

                try {
                    const response = await fetch(`/api/v1/harris-matrix/sites/${this.siteId}`);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    this.matrixData = await response.json();
                    console.log('📊 Harris Matrix data loaded:', this.matrixData.nodes?.length || 0, 'nodes');

                    this.initializeCytoscape();
                } catch (error) {
                    console.error('Error loading Harris Matrix:', error);
                    this.error = error.message;
                } finally {
                    this.loading = false;
                }
            },

            initializeCytoscape() {
                if (!this.matrixData.nodes || this.matrixData.nodes.length === 0) return;

                // Register ELK extension
                if (typeof cytoscapeElk !== 'undefined' && !cytoscape._elkRegistered) {
                    cytoscape.use(cytoscapeElk);
                    cytoscape._elkRegistered = true;
                }

                const elements = this.convertToCytoscapeElements();

                this.cy = cytoscape({
                    container: document.getElementById('harris-matrix-cy'),
                    elements: elements,
                    style: this.getCytoscapeStyles(),
                    layout: { name: 'preset' },
                    minZoom: 0.1,
                    maxZoom: 5,
                    wheelSensitivity: 0.2
                });

                this.updateLayout();
                this.setupEventHandlers();
            },

            convertToCytoscapeElements() {
                const elements = [];
                const periodGroups = {};

                // Group nodes by period
                this.matrixData.nodes.forEach(node => {
                    const period = node.data?.periodo || 'Non datato';
                    const phase = node.data?.fase || '';
                    const key = phase ? `${period} - ${phase}` : period;

                    if (!periodGroups[key]) {
                        periodGroups[key] = {
                            period, phase,
                            dating: node.data?.datazione || '',
                            nodes: []
                        };
                    }
                    periodGroups[key].nodes.push(node);
                });

                // Create period boxes and child nodes
                let periodIndex = 0;
                Object.entries(periodGroups).forEach(([key, group]) => {
                    const parentId = `period-${periodIndex}`;
                    const label = group.dating ? `${key} (${group.dating})` : key;

                    // Period box (parent node)
                    elements.push({
                        group: 'nodes',
                        data: { id: parentId, label, type: 'period-box' },
                        classes: 'period-box'
                    });

                    // Child nodes
                    group.nodes.forEach(node => {
                        elements.push({
                            group: 'nodes',
                            data: {
                                id: node.id,
                                label: node.label,
                                type: node.type,
                                tipo: node.tipo || 'positiva',
                                parent: parentId,
                                data: node.data,
                                level: this.matrixData.levels[node.id] || 0
                            },
                            classes: node.type === 'usm' ? 'usm' : 'us'
                        });
                    });
                    periodIndex++;
                });

                // Add edges
                this.matrixData.edges.forEach(edge => {
                    elements.push({
                        group: 'edges',
                        data: {
                            id: edge.id || `edge-${edge.source || edge.from}-${edge.target || edge.to}`,
                            source: edge.source || edge.from,
                            target: edge.target || edge.to,
                            label: edge.label || '',
                            relationship: edge.type,
                            bidirectional: edge.bidirectional
                        },
                        classes: this.getEdgeClass(edge.type)
                    });
                });

                return elements;
            },

            getEdgeClass(type) {
                const classes = {
                    'copre': 'edge-copre', 'si_appoggia_a': 'edge-copre',
                    'taglia': 'edge-taglia', 'tagliato_da': 'edge-taglia',
                    'riempie': 'edge-riempie', 'riempito_da': 'edge-riempie',
                    'uguale_a': 'edge-uguale', 'si_lega_a': 'edge-uguale'
                };
                return classes[type] || 'edge-default';
            },

            getCytoscapeStyles() {
                return [
                    // Period boxes
                    {
                        selector: 'node.period-box',
                        style: {
                            'shape': 'rectangle',
                            'background-color': '#f9fafb',
                            'background-opacity': 0.08,
                            'border-width': 2,
                            'border-color': '#9ca3af',
                            'border-style': 'dashed',
                            'label': 'data(label)',
                            'font-size': '12px',
                            'font-weight': 'bold',
                            'color': '#6b7280',
                            'text-valign': 'top',
                            'text-halign': 'center',
                            'text-margin-y': -10,
                            'padding': '30px',
                            'z-index': 0,
                            'events': 'no'
                        }
                    },
                    // US Positive
                    {
                        selector: 'node.us[tipo = "positiva"]',
                        style: {
                            'label': 'data(label)',
                            'background-color': '#3b82f6',
                            'border-color': '#1e40af',
                            'border-width': 2,
                            'width': '80px', 'height': '50px',
                            'shape': 'roundrectangle',
                            'text-valign': 'center', 'text-halign': 'center',
                            'font-size': '12px', 'font-weight': 'bold',
                            'color': '#ffffff', 'z-index': 10
                        }
                    },
                    // US Negative  
                    {
                        selector: 'node.us[tipo = "negativa"]',
                        style: {
                            'label': ele => '⊖ ' + ele.data('label'),
                            'background-color': '#ef4444',
                            'border-color': '#991b1b',
                            'border-width': 2,
                            'border-style': 'dashed',
                            'width': '80px', 'height': '50px',
                            'shape': 'rectangle',
                            'text-valign': 'center', 'text-halign': 'center',
                            'font-size': '12px', 'font-weight': 'bold',
                            'color': '#ffffff', 'z-index': 10
                        }
                    },
                    // USM
                    {
                        selector: 'node.usm',
                        style: {
                            'label': 'data(label)',
                            'background-color': '#8b5cf6',
                            'border-color': '#6d28d9',
                            'border-width': 2,
                            'width': '80px', 'height': '50px',
                            'shape': 'roundrectangle',
                            'text-valign': 'center', 'text-halign': 'center',
                            'font-size': '12px', 'font-weight': 'bold',
                            'color': '#ffffff', 'z-index': 10
                        }
                    },
                    // Fallback US
                    {
                        selector: 'node.us:not([tipo])',
                        style: {
                            'label': 'data(label)',
                            'background-color': '#3b82f6',
                            'border-color': '#1e40af',
                            'border-width': 2,
                            'width': '80px', 'height': '50px',
                            'shape': 'roundrectangle',
                            'text-valign': 'center', 'text-halign': 'center',
                            'font-size': '12px', 'font-weight': 'bold',
                            'color': '#ffffff', 'z-index': 10
                        }
                    },
                    // Edges
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#6b7280',
                            'target-arrow-color': '#6b7280',
                            'target-arrow-shape': ele => ele.data('bidirectional') ? 'none' : 'triangle',
                            'curve-style': 'taxi',
                            'taxi-direction': 'downward'
                        }
                    },
                    { selector: 'edge.edge-taglia', style: { 'line-color': '#ef4444', 'target-arrow-color': '#ef4444', 'line-style': 'dashed' } },
                    { selector: 'edge.edge-riempie', style: { 'line-color': '#3b82f6', 'target-arrow-color': '#3b82f6' } },
                    { selector: 'edge.edge-uguale', style: { 'line-color': '#10b981', 'target-arrow-shape': 'none', 'line-style': 'dotted' } },
                    // Selection
                    { selector: 'node:selected', style: { 'border-width': 4, 'border-color': '#f59e0b' } }
                ];
            },

            setupEventHandlers() {
                this.cy.on('tap', 'node:childless', event => {
                    this.selectedNode = event.target.data();
                });
                this.cy.on('tap', event => {
                    if (event.target === this.cy) this.selectedNode = null;
                });
            },

            updateLayout() {
                if (!this.cy) return;

                const layouts = {
                    elk: {
                        name: 'elk',
                        elk: {
                            algorithm: 'layered',
                            'elk.direction': 'DOWN',
                            'elk.hierarchyHandling': 'INCLUDE_CHILDREN',
                            'elk.edgeRouting': 'ORTHOGONAL',
                            'elk.spacing.nodeNode': 60,
                            'elk.layered.spacing.nodeNodeBetweenLayers': 80,
                            'elk.padding': '[top=45,left=25,bottom=25,right=25]'
                        },
                        fit: true,
                        padding: 40,
                        animate: true,
                        animationDuration: 400
                    },
                    dagre: {
                        name: 'dagre',
                        rankDir: 'TB',
                        rankSep: 80,
                        nodeSep: 40,
                        fit: true,
                        padding: 40,
                        animate: true
                    },
                    breadthfirst: {
                        name: 'breadthfirst',
                        directed: true,
                        spacingFactor: 1.3,
                        fit: true,
                        padding: 40,
                        animate: true
                    }
                };

                this.cy.layout(layouts[this.settings.layout] || layouts.elk).run();
            },

            fitToScreen() {
                if (this.cy) this.cy.fit(undefined, 40);
            },

            async exportImage() {
                if (!this.cy) return;
                try {
                    const png = this.cy.png({ output: 'blob', bg: 'white', full: true, scale: 2 });
                    const url = URL.createObjectURL(png);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `harris-matrix-${this.siteId}-${Date.now()}.png`;
                    a.click();
                    URL.revokeObjectURL(url);
                } catch (e) {
                    console.error('Export error:', e);
                }
            },

            getUSPositiveCount() {
                if (!this.matrixData.nodes) return 0;
                return this.matrixData.nodes.filter(n =>
                    n.type === 'us' && (n.tipo === 'positiva' || (!n.tipo && !n.data?.tipo) || n.data?.tipo === 'positiva')
                ).length;
            },

            getUSNegativeCount() {
                if (!this.matrixData.nodes) return 0;
                return this.matrixData.nodes.filter(n =>
                    n.type === 'us' && (n.tipo === 'negativa' || n.data?.tipo === 'negativa')
                ).length;
            }
        };
    }
</script>
