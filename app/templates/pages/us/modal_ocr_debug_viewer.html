<!-- PDF Import Results Modal with Debug View -->
<div x-show="showPdfImportModal" x-cloak
    x-init="$watch('showPdfImportModal', value => document.body.classList.toggle('overflow-hidden', value))"
    class="fixed inset-0 bg-black bg-opacity-50 z-50" @click.self="showPdfImportModal = false">

    <div x-data="{ocrDebugTab: 'result'}"
        class="bg-white dark:bg-gray-800 absolute inset-0 flex flex-col overflow-hidden shadow-2xl">

        <!-- Modal Header -->
        <div
            class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gradient-to-r from-purple-600 to-indigo-600">
            <h3 class="text-lg font-semibold text-white flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                    </path>
                </svg>
                Risultati OCR - Debug Viewer
            </h3>
            <button @click="showPdfImportModal = false" class="text-white hover:text-gray-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Tab Navigation -->
        <div class="px-6 pt-4 border-b border-gray-200 dark:border-gray-700">
            <div class="flex space-x-4">
                <button @click="ocrDebugTab = 'result'"
                    :class="ocrDebugTab === 'result' ? 'border-purple-500 text-purple-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="pb-3 px-1 border-b-2 font-medium text-sm flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Risultato US
                </button>

                <button @click="ocrDebugTab = 'revision'"
                    :class="ocrDebugTab === 'revision' ? 'border-purple-500 text-purple-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="pb-3 px-1 border-b-2 font-medium text-sm flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                        </path>
                    </svg>
                    ✏️ Revisione OCR
                    <span x-show="pdfImportResults?.results && pdfImportResults.results.length > 0"
                        class="ml-1 px-2 py-0.5 text-xs bg-orange-100 text-orange-700 rounded-full"
                        x-text="pdfImportResults?.results?.length || 0"></span>
                </button>
                <button @click="ocrDebugTab = 'pp_cells'"
                    :class="ocrDebugTab === 'pp_cells' ? 'border-purple-500 text-purple-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="pb-3 px-1 border-b-2 font-medium text-sm flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                        </path>
                    </svg>
                    🔲 PP-Structure Celle
                    <span x-show="pdfImportResults?.debug?.pp_structure_cells"
                        class="ml-1 px-2 py-0.5 text-xs bg-blue-100 text-blue-700 rounded-full"
                        x-text="pdfImportResults?.debug?.pp_structure_cells?.length || 0"></span>
                </button>
            </div>
        </div>


        <!-- Modal Body -->
        <div class="flex-1 overflow-y-auto p-6 dark:bg-gray-800">
            <!-- Error State -->
            <template x-if="pdfImportError">
                <div class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-700 rounded-lg p-4">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-red-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="text-red-700 dark:text-red-300" x-text="pdfImportError"></span>
                    </div>
                </div>
            </template>

            <!-- TAB: Risultato US -->
            <div x-show="ocrDebugTab === 'result'" x-transition>
                <template x-if="pdfImportResults && pdfImportResults.results && pdfImportResults.results.length > 0">
                    <div>
                        <!-- Stats -->
                        <div class="grid grid-cols-4 gap-4 mb-6">
                            <div class="bg-blue-50 dark:bg-blue-900/30 rounded-lg p-4 text-center">
                                <div class="text-2xl font-bold text-blue-600 dark:text-blue-400"
                                    x-text="pdfImportResults.total_pages"></div>
                                <div class="text-sm text-blue-700 dark:text-blue-300">Pagine</div>
                            </div>
                            <div class="bg-green-50 dark:bg-green-900/30 rounded-lg p-4 text-center">
                                <div class="text-2xl font-bold text-green-600 dark:text-green-400"
                                    x-text="pdfImportResults.successful_extractions"></div>
                                <div class="text-sm text-green-700 dark:text-green-300">US Estratte</div>
                            </div>
                            <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 text-center">
                                <div class="text-2xl font-bold text-gray-600 dark:text-gray-300"
                                    x-text="pdfImportResults.processing_time_seconds + 's'"></div>
                                <div class="text-sm text-gray-500 dark:text-gray-400">Tempo</div>
                            </div>
                            <div class="bg-purple-50 dark:bg-purple-900/30 rounded-lg p-4 text-center">
                                <div class="text-2xl font-bold text-purple-600 dark:text-purple-400"
                                    x-text="pdfImportResults.debug_pages?.reduce((sum, p) => sum + p.word_count, 0) || 0">
                                </div>
                                <div class="text-sm text-purple-700 dark:text-purple-300">Parole</div>
                            </div>
                        </div>

                        <!-- US Result Card -->
                        <template x-for="(result, index) in pdfImportResults.results" :key="index">
                            <div class="border-2 border-gray-200 dark:border-gray-600 rounded-xl p-5"
                                :class="result.is_valid ? ' dark:bg-green-900/20 border-green-300' : 'bg-yellow-50 dark:bg-yellow-900/20 border-yellow-300'">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="flex items-center">
                                        <span class="text-2xl font-bold text-gray-900 dark:text-white"
                                            x-text="result.us_code"></span>
                                        <span class="ml-3 px-3 py-1 text-sm rounded-full font-medium"
                                            :class="result.is_valid ? 'bg-green-200 text-green-800' : 'bg-yellow-200 text-yellow-800'"
                                            x-text="result.is_valid ? '✓ Valido' : '⚠ Incompleto'"></span>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-sm text-gray-500">Confidence</div>
                                        <div class="text-xl font-bold"
                                            :class="result.confidence > 0.8 ? 'text-green-600' : 'text-yellow-600'"
                                            x-text="(result.confidence * 100).toFixed(0) + '%'"></div>
                                    </div>
                                </div>

                                <!-- Extracted Fields Grid -->
                                <div class="grid grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-2 text-sm mb-4">
                                    <template x-for="(value, key) in result.data" :key="key">
                                        <div x-show="value && key !== 'us_code' && key !== '_field_bboxes'"
                                            class="break-words">
                                            <strong class="capitalize" x-text="key.replace(/_/g, ' ') + ':'"></strong>
                                            <span x-text="typeof value === 'object' ? JSON.stringify(value) : value"
                                                </div>
                                    </template>
                                </div>

                                <!-- Warnings -->
                                <template x-if="result.warnings && result.warnings.length > 0">
                                    <div class="mt-3 p-3 bg-yellow-100 dark:bg-yellow-900/30 rounded-lg">
                                        <div class="text-sm font-medium text-yellow-800 dark:text-yellow-300 mb-1">
                                            Avvisi:</div>
                                        <template x-for="warn in result.warnings" :key="warn">
                                            <div class="text-xs text-yellow-700 dark:text-yellow-400 flex items-center">
                                                <span class="mr-1">⚠️</span><span x-text="warn"></span>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Action Button -->
                                <div class="mt-4 flex justify-end">
                                    <button @click="createUSFromOCR(result.data)" :disabled="!result.is_valid"
                                        class="px-6 py-3 bg-orange-600 text-white font-medium rounded-lg hover:bg-orange-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
                                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                        </svg>
                                        Crea US nel Database
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- No Results -->
                <template
                    x-if="pdfImportResults && (!pdfImportResults.results || pdfImportResults.results.length === 0) && !pdfImportError">
                    <div class="text-center py-12 text-gray-500 dark:text-gray-400">
                        <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                            </path>
                        </svg>
                        <p class="text-lg font-medium">Nessuna scheda US trovata nel PDF</p>
                        <p class="text-sm mt-2">Verifica il file PDF originale.</p>

                    </div>
                </template>
            </div>

            <!-- TAB: Revisione OCR -->
            <div x-show="ocrDebugTab === 'revision'" x-transition>
                <template x-if="pdfImportResults?.results && pdfImportResults.results.length > 0">
                    <div x-init="selectResultForEdit()">
                        <!-- Result Selector -->
                        <div
                            class="mb-4 flex items-center justify-between bg-purple-50 dark:bg-purple-900/20 p-3 rounded-lg">
                            <div class="flex items-center space-x-3">
                                <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Seleziona
                                    US da revisionare:</label>
                                <select x-model="selectedResultIndex" @change="selectResultForEdit()"
                                    class="px-3 py-1.5 border border-gray-300 dark:border-gray-600 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white">
                                    <template x-for="(result, idx) in pdfImportResults.results" :key="idx">
                                        <option :value="idx"
                                            x-text="`${result.us_code} - ${result.is_valid ? '✓ Valido' : '⚠ Incompleto'}`">
                                        </option>
                                    </template>
                                </select>
                            </div>
                            <div class="text-sm text-gray-600 dark:text-gray-400">
                                <span class="font-medium" x-text="(selectedResultIndex + 1)"></span> di
                                <span x-text="pdfImportResults.results.length"></span>
                            </div>
                        </div>

                        <!-- Split Layout: Preview + Form -->
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <!-- Left Panel: PDF Preview with Canvas Overlay -->
                            <div
                                class="sticky top-0 self-start bg-gray-50 dark:bg-gray-900 rounded-lg p-4 border border-gray-200 dark:border-gray-700 max-h-[calc(100vh-200px)] overflow-y-auto">
                                <div class="flex items-center justify-between mb-3">
                                    <h4
                                        class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center">
                                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                                            </path>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                            </path>
                                        </svg>
                                        Anteprima Pagina PDF
                                    </h4>
                                    <!-- Page Navigator -->
                                    <div x-show="pdfImportResults?.debug_pages?.length > 1"
                                        class="flex items-center space-x-2">
                                        <button
                                            @click="editPageIdx = Math.max(0, editPageIdx - 1); initRevisionCanvas(document.getElementById('revision_ocr_img'), pdfImportResults.debug_pages[editPageIdx])"
                                            :disabled="editPageIdx === 0"
                                            class="px-2 py-1 text-xs bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M15 19l-7-7 7-7"></path>
                                            </svg>
                                        </button>
                                        <span class="text-xs text-gray-600 dark:text-gray-400">
                                            Pagina <span x-text="editPageIdx + 1"></span> / <span
                                                x-text="pdfImportResults?.debug_pages?.length || 0"></span>
                                        </span>
                                        <button
                                            @click="editPageIdx = Math.min(pdfImportResults.debug_pages.length - 1, editPageIdx + 1); initRevisionCanvas(document.getElementById('revision_ocr_img'), pdfImportResults.debug_pages[editPageIdx])"
                                            :disabled="editPageIdx >= (pdfImportResults?.debug_pages?.length || 0) - 1"
                                            class="px-2 py-1 text-xs bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M9 5l7 7-7 7"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="relative bg-white dark:bg-gray-800 rounded p-2">
                                    <template
                                        x-if="pdfImportResults?.debug_pages && pdfImportResults.debug_pages.length > 0">
                                        <div class="relative inline-block">
                                            <!-- Base PDF Image -->
                                            <img :src="pdfImportResults.debug_pages[editPageIdx || 0].image_base64"
                                                class="max-w-full h-auto rounded shadow-lg block" alt="Pagina PDF"
                                                id="revision_ocr_img"
                                                @load="initRevisionCanvas($el, pdfImportResults.debug_pages[editPageIdx || 0])">

                                            <!-- Canvas Overlay for Field Highlighting -->
                                            <canvas id="revision_ocr_canvas"
                                                class="absolute inset-0 w-full h-full pointer-events-none"></canvas>
                                        </div>
                                    </template>
                                    <div x-show="!pdfImportResults?.debug_pages || pdfImportResults.debug_pages.length === 0"
                                        class="text-center py-12 text-gray-400">
                                        <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z">
                                            </path>
                                        </svg>
                                        <p class="text-sm">Immagine non disponibile</p>
                                    </div>
                                </div>

                                <!-- Legend -->
                                <div class="mt-3 p-3 bg-gray-100 dark:bg-gray-900 rounded text-xs space-y-1">
                                    <div class="flex items-center space-x-2">
                                        <div class="w-4 h-4 border-2 border-blue-500" style="border-style: dashed;">
                                        </div>
                                        <span class="text-gray-700 dark:text-gray-300">Celle rilevate da
                                            PPStructure
                                            (C0, C1, ...)</span>
                                    </div>
                                    <div class="flex items-center space-x-2">
                                        <div class="w-4 h-4 border-2 border-purple-500"></div>
                                        <span class="text-gray-700 dark:text-gray-300">Bounding box testo
                                            OCR</span>
                                    </div>
                                    <div class="flex items-center space-x-2">
                                        <div class="w-4 h-4 bg-green-400 border-2 border-green-600"></div>
                                        <span class="text-gray-700 dark:text-gray-300">Campo selezionato</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Right Panel: Editable Form Fields -->
                            <div
                                class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
                                <h4
                                    class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3 flex items-center">
                                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                        </path>
                                    </svg>
                                    Modifica Valori OCR
                                </h4>

                                <!-- Schema-driven dynamic form -->
                                <div class="space-y-6 pr-2">
                                    <template x-for="section in formFieldsSchema?.form_sections || []"
                                        :key="section.section_id">
                                        <div class="border-b border-gray-200 dark:border-gray-700 pb-4 last:border-b-0">
                                            <!-- Section Header -->
                                            <h5
                                                class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3 flex items-center">
                                                <i
                                                    :class="`fas ${section.section_icon} mr-2 text-purple-600 dark:text-purple-400`"></i>
                                                <span x-text="section.section_label"></span>
                                            </h5>

                                            <!-- Fields Grid (3 columns) -->
                                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                                <template x-for="field in section.fields" :key="field.model_key">
                                                    <div>
                                                        <!-- TEXT INPUT -->
                                                        <template x-if="field.type === 'text'">
                                                            <div :class="field.width || 'col-span-1'">
                                                                <label
                                                                    class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">
                                                                    <span x-text="field.pdf_label"></span>
                                                                    <span x-show="field.required"
                                                                        class="text-red-500 ml-1">*</span>
                                                                </label>
                                                                <input type="text"
                                                                    x-model="editedOCRData[field.model_key]"
                                                                    :placeholder="field.placeholder || ''"
                                                                    @focus="onFieldFocus(field.model_key)"
                                                                    @blur="onFieldBlur()"
                                                                    class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white" />
                                                            </div>
                                                        </template>

                                                        <!-- NUMBER INPUT -->
                                                        <template x-if="field.type === 'number'">
                                                            <div :class="field.width || 'col-span-1'">
                                                                <label
                                                                    class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">
                                                                    <span x-text="field.pdf_label"></span>
                                                                    <span x-show="field.required"
                                                                        class="text-red-500 ml-1">*</span>
                                                                </label>
                                                                <input type="number"
                                                                    x-model="editedOCRData[field.model_key]"
                                                                    :placeholder="field.placeholder || ''"
                                                                    @focus="onFieldFocus(field.model_key)"
                                                                    @blur="onFieldBlur()"
                                                                    class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white" />
                                                            </div>
                                                        </template>

                                                        <!-- DATE INPUT -->
                                                        <template x-if="field.type === 'date'">
                                                            <div :class="field.width || 'col-span-1'">
                                                                <label
                                                                    class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">
                                                                    <span x-text="field.pdf_label"></span>
                                                                    <span x-show="field.required"
                                                                        class="text-red-500 ml-1">*</span>
                                                                </label>
                                                                <input type="date"
                                                                    x-model="editedOCRData[field.model_key]"
                                                                    @focus="onFieldFocus(field.model_key)"
                                                                    @blur="onFieldBlur()"
                                                                    class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white" />
                                                            </div>
                                                        </template>

                                                        <!-- TEXTAREA -->
                                                        <template x-if="field.type === 'textarea'">
                                                            <div :class="field.width || 'col-span-1'">
                                                                <label
                                                                    class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">
                                                                    <span x-text="field.pdf_label"></span>
                                                                    <span x-show="field.required"
                                                                        class="text-red-500 ml-1">*</span>
                                                                </label>
                                                                <textarea x-model="editedOCRData[field.model_key]"
                                                                    :rows="field.rows || 2"
                                                                    :placeholder="field.placeholder || ''"
                                                                    @focus="onFieldFocus(field.model_key)"
                                                                    @blur="onFieldBlur()"
                                                                    class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white"></textarea>
                                                            </div>
                                                        </template>

                                                        <!-- SELECT DROPDOWN -->
                                                        <template x-if="field.type === 'select'">
                                                            <div :class="field.width || 'col-span-1'">
                                                                <label
                                                                    class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">
                                                                    <span x-text="field.pdf_label"></span>
                                                                    <span x-show="field.required"
                                                                        class="text-red-500 ml-1">*</span>
                                                                </label>
                                                                <select x-model="editedOCRData[field.model_key]"
                                                                    @focus="onFieldFocus(field.model_key)"
                                                                    @blur="onFieldBlur()"
                                                                    class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white">
                                                                    <template x-for="option in field.options"
                                                                        :key="option.value">
                                                                        <option :value="option.value"
                                                                            x-text="option.label"></option>
                                                                    </template>
                                                                </select>
                                                            </div>
                                                        </template>

                                                        <!-- CHECKBOX -->
                                                        <template x-if="field.type === 'checkbox'">
                                                            <div :class="field.width || 'col-span-1'">
                                                                <label class="flex items-center cursor-pointer mt-5">
                                                                    <input type="checkbox"
                                                                        x-model="editedOCRData[field.model_key]"
                                                                        @focus="onFieldFocus(field.model_key)"
                                                                        @blur="onFieldBlur()"
                                                                        class="w-4 h-4 text-purple-600 rounded focus:ring-2 focus:ring-purple-500" />
                                                                    <span
                                                                        class="ml-2 text-xs font-medium text-gray-600 dark:text-gray-400"
                                                                        x-text="field.pdf_label"></span>
                                                                </label>
                                                            </div>
                                                        </template>

                                                        <!-- RADIO GROUP -->
                                                        <template x-if="field.type === 'radio_group'">
                                                            <div :class="field.width || 'col-span-1'">
                                                                <label
                                                                    class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-2">
                                                                    <span x-text="field.pdf_label"></span>
                                                                    <span x-show="field.required"
                                                                        class="text-red-500 ml-1">*</span>
                                                                </label>
                                                                <div class="flex flex-wrap gap-3">
                                                                    <template x-for="option in field.options"
                                                                        :key="option.value">
                                                                        <label class="flex items-center cursor-pointer">
                                                                            <input type="radio"
                                                                                :name="`radio_${field.model_key}`"
                                                                                :value="option.value"
                                                                                x-model="editedOCRData[field.model_key]"
                                                                                @focus="onFieldFocus(field.model_key)"
                                                                                @blur="onFieldBlur()"
                                                                                class="w-4 h-4 text-purple-600 focus:ring-2 focus:ring-purple-500" />
                                                                            <span
                                                                                class="ml-2 text-xs text-gray-700 dark:text-gray-300"
                                                                                x-text="option.label"></span>
                                                                        </label>
                                                                    </template>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>

                                    <!-- Action Buttons -->
                                    <div class="pt-4 border-t border-gray-200 dark:border-gray-700 space-y-3">
                                        <!-- Save Button -->
                                        <button @click="saveOCRCorrections()"
                                            class="w-full px-4 py-3 bg-purple-600 text-white font-medium rounded-lg hover:bg-purple-700 flex items-center justify-center transition-colors">
                                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor"
                                                viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M5 13l4 4L19 7"></path>
                                            </svg>
                                            Salva Correzioni
                                        </button>

                                        <!-- Create US Button -->
                                        <button @click="createUSFromEditedOCR()"
                                            class="w-full px-4 py-3 bg-orange-600 text-white font-medium rounded-lg hover:bg-orange-700 flex items-center justify-center transition-colors">
                                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor"
                                                viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                            </svg>
                                            Crea US nel Database
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                </template>

                <!-- No Results State -->
                <template x-if="!pdfImportResults?.results || pdfImportResults.results.length === 0">
                    <div class="text-center py-12 text-gray-500 dark:text-gray-400">
                        <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                            </path>
                        </svg>
                        <p class="text-lg font-medium">Nessun risultato da revisionare</p>
                        <p class="text-sm mt-2">Importa un PDF per iniziare la revisione OCR</p>
                    </div>
                </template>
            </div>



            <!-- TAB: PP-Structure Celle -->
            <div x-show="ocrDebugTab === 'pp_cells'" x-transition>
                <template
                    x-if="pdfImportResults?.debug?.pp_structure_cells && pdfImportResults.debug.pp_structure_cells.length > 0">
                    <div class="space-y-6">
                        <!-- Stats -->
                        <div class="grid grid-cols-3 gap-4">
                            <div class="bg-blue-50 dark:bg-blue-900/30 rounded-lg p-4 text-center">
                                <div class="text-2xl font-bold text-blue-600 dark:text-blue-400"
                                    x-text="pdfImportResults.debug.pp_structure_cells?.length || 0"></div>
                                <div class="text-sm text-blue-700 dark:text-blue-300">Celle Rilevate</div>
                            </div>
                            <div class="bg-green-50 dark:bg-green-900/30 rounded-lg p-4 text-center">
                                <div class="text-2xl font-bold text-green-600 dark:text-green-400"
                                    x-text="pdfImportResults.debug.table_detection_method || 'ppstructure'">
                                </div>
                                <div class="text-sm text-green-700 dark:text-green-300">Metodo</div>
                            </div>
                            <div class="bg-purple-50 dark:bg-purple-900/30 rounded-lg p-4 text-center">
                                <div class="text-2xl font-bold text-purple-600 dark:text-purple-400"
                                    x-text="pdfImportResults.debug_pages?.length || 0"></div>
                                <div class="text-sm text-purple-700 dark:text-purple-300">Pagine</div>
                            </div>
                        </div>

                        <!-- Cells Table -->
                        <div
                            class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
                            <div
                                class="px-4 py-3 bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600">
                                <h3 class="font-semibold text-gray-800 dark:text-gray-200 flex items-center">
                                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z">
                                        </path>
                                    </svg>
                                    Celle PP-Structure (Coordinate Locali per Pagina)
                                </h3>
                            </div>
                            <div class="max-h-96 overflow-y-auto">
                                <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                                    <thead class="bg-gray-100 dark:bg-gray-700 sticky top-0">
                                        <tr>
                                            <th
                                                class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">
                                                #</th>
                                            <th
                                                class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">
                                                X1</th>
                                            <th
                                                class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">
                                                Y1</th>
                                            <th
                                                class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">
                                                X2</th>
                                            <th
                                                class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">
                                                Y2</th>
                                            <th
                                                class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">
                                                Larghezza</th>
                                            <th
                                                class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">
                                                Altezza</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                                        <template x-for="(cell, idx) in pdfImportResults.debug.pp_structure_cells"
                                            :key="idx">
                                            <tr class="hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors">
                                                <td class="px-3 py-2 text-sm font-mono text-gray-600 dark:text-gray-400"
                                                    x-text="'C' + idx"></td>
                                                <td class="px-3 py-2 text-sm font-mono text-gray-800 dark:text-gray-200"
                                                    x-text="Math.round(cell.x1)"></td>
                                                <td class="px-3 py-2 text-sm font-mono text-gray-800 dark:text-gray-200"
                                                    x-text="Math.round(cell.y1)"></td>
                                                <td class="px-3 py-2 text-sm font-mono text-gray-800 dark:text-gray-200"
                                                    x-text="Math.round(cell.x2)"></td>
                                                <td class="px-3 py-2 text-sm font-mono text-gray-800 dark:text-gray-200"
                                                    x-text="Math.round(cell.y2)"></td>
                                                <td class="px-3 py-2 text-sm font-mono text-blue-600 dark:text-blue-400"
                                                    x-text="Math.round(cell.x2 - cell.x1) + 'px'"></td>
                                                <td class="px-3 py-2 text-sm font-mono text-blue-600 dark:text-blue-400"
                                                    x-text="Math.round(cell.y2 - cell.y1) + 'px'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Legend -->
                        <div
                            class="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-4 text-sm text-blue-800 dark:text-blue-200">
                            <div class="flex items-start">
                                <svg class="w-5 h-5 mr-2 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <div>
                                    <p class="font-medium">Come interpretare le celle:</p>
                                    <ul class="mt-1 text-xs space-y-1 text-blue-700 dark:text-blue-300">
                                        <li>• Le coordinate sono in pixel relativi all'immagine della pagina
                                        </li>
                                        <li>• Ogni cella rappresenta un'area della tabella rilevata da
                                            PPStructure</li>
                                        <li>• Vai alla tab "Revisione OCR" per vedere le celle disegnate
                                            sull'anteprima
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- No cells state -->
                <template
                    x-if="!pdfImportResults?.debug?.pp_structure_cells || pdfImportResults.debug.pp_structure_cells.length === 0">
                    <div class="text-center py-12">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-300 dark:text-gray-600" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                            </path>
                        </svg>
                        <p class="text-lg font-medium text-gray-500 dark:text-gray-400">Nessuna cella
                            PP-Structure
                            rilevata</p>
                        <p class="text-sm text-gray-400 dark:text-gray-500 mt-2">
                            PPStructure non ha rilevato tabelle strutturate nel PDF.<br>
                            Questo può accadere se il documento non contiene tabelle o se le tabelle sono in
                            formato non
                            standard.
                        </p>
                    </div>
                </template>
            </div>


        </div>

        <!-- Modal Footer -->
        <div
            class="sticky bottom-0 bg-gray-50 dark:bg-gray-800 px-6 py-4 border-t border-gray-200 dark:border-gray-700 flex justify-end">
            <button @click="showPdfImportModal = false"
                class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 font-medium">
                Chiudi
            </button>
        </div>
    </div>
</div>
