                    const usId = urlParams.get('us_id');
                    const usmId = urlParams.get('usm_id');

                    } else if (usmId) {

            async loadUSList() {
                try {
                    const queryParams = new URLSearchParams({
                        skip: (this.pagination.currentPage - 1) * this.pagination.itemsPerPage,
                        limit: this.pagination.itemsPerPage
                    });

                    if (this.filters.search) queryParams.append('search', this.filters.search);
                    if (this.filters.dateFrom) queryParams.append('da', this.filters.dateFrom);
                    if (this.filters.dateTo) queryParams.append('a', this.filters.dateTo);

                    const response = await fetch(`/api/v1/us/sites/${this.currentSiteId}/us?${queryParams}`, {
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': this.getCSRFToken()
                        }
                    });

                    if (response.ok) {
                        this.usList = await response.json();
                        console.log('Lista US caricata:', this.usList.length, 'elementi');
                    } else {
                        throw new Error('Errore caricamento US');
                    }
                } catch (error) {
                    console.error('Errore caricamento US:', error);
                    this.showNotification('Errore nel caricamento delle US', 'error');
                }

            async saveUS() {
                this.usSaving = true;
                this.usErrorMessage = '';

                try {
                    // Debug log to check form data
                    console.log('Form data before save:', this.usFormData);

                    // Clean up form data - convert empty strings to null for optional fields
                    const cleanFormData = { ...this.usFormData };

                    // Convert empty strings to null for numeric fields
                    if (cleanFormData.anno === '' || cleanFormData.anno === null) {
                        cleanFormData.anno = null;
                    }

                    // Convert empty strings to null for date fields
                    if (!cleanFormData.data_rilevamento || cleanFormData.data_rilevamento === '') {
                        cleanFormData.data_rilevamento = null;
                    }
                    if (!cleanFormData.data_rielaborazione || cleanFormData.data_rielaborazione === '') {
                        cleanFormData.data_rielaborazione = null;
                    }

                    // Prepara payload con sequenza fisica
                    const payload = {
                        ...cleanFormData,
                        sequenza_fisica: {
                            uguale_a: this.stringToSequenza(this.usFormData.seq_uguale_a),
                            si_lega_a: this.stringToSequenza(this.usFormData.seq_si_lega_a),
                            gli_si_appoggia: this.stringToSequenza(this.usFormData.seq_gli_si_appoggia),
                            si_appoggia_a: this.stringToSequenza(this.usFormData.seq_si_appoggia_a),
                            coperto_da: this.stringToSequenza(this.usFormData.seq_coperto_da),
                            copre: this.stringToSequenza(this.usFormData.seq_copre),
                            tagliato_da: this.stringToSequenza(this.usFormData.seq_tagliato_da),
                            taglia: this.stringToSequenza(this.usFormData.seq_taglia),
                            riempito_da: this.stringToSequenza(this.usFormData.seq_riempito_da),
                            riempie: this.stringToSequenza(this.usFormData.seq_riempie),
                            // Sequenza stratigrafica (ICCD)
                            posteriore_a: this.stringToSequenza(this.usFormData.seq_posteriore_a),
                            anteriore_a: this.stringToSequenza(this.usFormData.seq_anteriore_a)
                        },
                        campionature: {
                            flottazione: this.usFormData.camp_flottazione,
                            setacciatura: this.usFormData.camp_setacciatura
                        }
                    };

                    // Debug log to check payload
                    console.log('Payload being sent:', payload);

                    // Rimuovi campi sequenza temporanei
                    delete payload.seq_uguale_a;
                    delete payload.seq_si_lega_a;
                    delete payload.seq_gli_si_appoggia;
                    delete payload.seq_si_appoggia_a;
                    delete payload.seq_coperto_da;
                    delete payload.seq_copre;
                    delete payload.seq_tagliato_da;
                    delete payload.seq_taglia;
                    delete payload.seq_riempito_da;
                    delete payload.seq_riempie;
                    delete payload.seq_posteriore_a;
                    delete payload.seq_anteriore_a;
                    delete payload.camp_flottazione;
                    delete payload.camp_setacciatura;

                    const url = this.editingUS
                        ? `/api/v1/us/sites/${this.currentSiteId}/us/${this.editingUS.id}`
                        : `/api/v1/us/sites/${this.currentSiteId}/us`;
                    const method = this.editingUS ? 'PUT' : 'POST';

                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': this.getCSRFToken()
                        },
                        body: JSON.stringify(payload)
                    });

                    console.log('Response status:', response.status);
                    console.log('Response headers:', response.headers);

                    if (response.ok) {
                        const savedUS = await response.json();
                        console.log('US salvata:', savedUS);

                        this.showNotification(
                            this.editingUS ? 'US aggiornata con successo' : 'US creata con successo',
                            'success'
                        );

                        await this.loadUSList();
                        this.closeUSModal();
                    } else {
                        const error = await response.json();
                        console.error('API Error:', error);
                        let errorMessage = 'Errore nel salvataggio';

                        if (error.detail) {
                            if (typeof error.detail === 'string') {
                                errorMessage = error.detail;

                                // Highlight specific field if error mentions it
                                if (errorMessage.includes("Campo '")) {
                                    const fieldNameMatch = errorMessage.match(/Campo '([^']+)'/);
                                    if (fieldNameMatch) {
                                        const fieldName = fieldNameMatch[1];
                                        // Try to find and highlight the field
                                        setTimeout(() => {
                                            const fieldElement = document.querySelector(`[x-model*="${fieldName}"]`);
                                            if (fieldElement) {
                                                fieldElement.classList.add('border-red-500', 'ring-2', 'ring-red-200');
                                                setTimeout(() => {
                                                    fieldElement.classList.remove('border-red-500', 'ring-2', 'ring-red-200');
                                                }, 5000);
                                            }
                                        }, 100);
                                    }
                                }
                            } else if (Array.isArray(error.detail)) {
                                // Handle validation errors array
                                errorMessage = error.detail.map(err =>
                                    typeof err === 'object' ? err.msg || JSON.stringify(err) : err
                                ).join(', ');
                            } else if (typeof error.detail === 'object') {
                                errorMessage = JSON.stringify(error.detail);
                            }
                        }

                        throw new Error(errorMessage);
                    }
                } catch (error) {
                    console.error('Errore salvataggio US:', error);
                    this.usErrorMessage = error.message || 'Errore nel salvataggio della US';
                } finally {
                    this.usSaving = false;
                }
            },

            async deleteUS(usId) {
                if (!confirm('Sei sicuro di voler eliminare questa US? L\'operazione non può essere annullata.')) {
                    return;
                }

                try {
                    const response = await fetch(`/api/v1/us/sites/${this.currentSiteId}/us/${usId}`, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': this.getCSRFToken()
                        }
                    });

                    if (response.ok) {
                        this.showNotification('US eliminata con successo', 'success');
                        await this.loadUSList();
                    } else {
                        throw new Error('Errore nell\'eliminazione');
                    }
                } catch (error) {
                    console.error('Errore eliminazione US:', error);
                    this.showNotification('Errore nell\'eliminazione della US', 'error');
                }
            },

            // ===== MODERN DRAG & DROP UPLOAD METHODS =====

            handleFiles(evt) {
                evt.preventDefault();
                const newFiles = evt.target.files || evt.dataTransfer.files;

                for (const file of newFiles) {
                    if (!this.validateFile(file)) continue;

                    // Generate preview for the file
                    this.generatePreview(file).then(preview => {
                        this.filePreviews.push({
                            ...preview,
                            file: file
                        });
                    }).catch(error => {
                        console.warn('Failed to generate preview for file:', file.name, error);
                        // Still add file without preview
                        this.filePreviews.push({
                            name: file.name,
                            size: file.size,
                            type: file.type,
                            isImage: false,
                            src: null,
                            file: file
                        });
                    });
                }

                // Clear the input
                if (evt.target.files) {
                    evt.target.value = '';
                }
            },

            handleDrop(evt) {
                evt.preventDefault();
                evt.stopPropagation();
                this.handleFiles(evt);
                this.dragOver = false;
            },

            handleDragOver(evt) {
                evt.preventDefault();
                this.dragOver = true;
            },

            handleDragLeave(evt) {
                evt.preventDefault();
                this.dragOver = false;
            },

            async generatePreview(file) {
                const preview = {
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    isImage: file.type.startsWith('image/'),
                    src: null
                };

                // Generate image preview if it's an image
                if (preview.isImage) {
                    try {
                        preview.src = await this.createImagePreview(file);
                    } catch (error) {
                        console.warn('Failed to generate image preview:', error);
                    }
                }

                return preview;
            },

            createImagePreview(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            },

            removeFile(index) {
                this.filePreviews.splice(index, 1);
            },

            validateFile(file) {
                // File size validation
                const maxSizeMB = 50;
                const maxSizeBytes = maxSizeMB * 1024 * 1024;

                if (file.size > maxSizeBytes) {
                    this.notify(`File "${file.name}" troppo grande (max ${maxSizeMB}MB)`, 'error');
                    return false;
                }

                // File type validation
                const allowedTypes = [
                    'image/jpeg', 'image/png', 'image/tiff', 'image/webp',
                    'application/pdf', 'application/msword',
                    'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
                ];

                if (!allowedTypes.includes(file.type)) {
                    this.notify(`Formato non supportato: ${file.type}`, 'error');
                    return false;
                }

                return true;
            },

            async uploadAllFiles() {
                if (this.filePreviews.length === 0) {
                    this.notify('Nessun file selezionato', 'warning');
                    return;
                }

                // Check if US/USM is saved first
                const entityId = this.editingUS?.id || this.editingUSM?.id;
                if (!entityId) {
                    this.notify('Devi prima salvare la US/USM prima di poter caricare file', 'error');
                    return;
                }

                this.uploadingFile = true;
                this.uploadProgress = 0;
                this.filesCompleted = 0;

                try {
                    // Upload files sequentially for better progress tracking
                    for (let i = 0; i < this.filePreviews.length; i++) {
                        const preview = this.filePreviews[i];
                        await this.uploadSingleFile(preview.file, preview.name);

                        this.filesCompleted++;
                        this.uploadProgress = Math.round((this.filesCompleted / this.filePreviews.length) * 100);
                    }

                    this.notify('Upload completato con successo!', 'success');

                    // Reset and close modal
                    setTimeout(() => {
                        this.closeUploadModal();
                        // Refresh file list
                        if (this.editingUS) {
                            this.loadUSFiles(this.editingUS.id);
                        } else {
                            this.loadUSMFiles(this.editingUSM.id);
                        }
                    }, 1500);

                } catch (error) {
                    console.error('Upload error:', error);
                    this.notify(`Errore upload: ${error.message}`, 'error');
                } finally {
                    this.uploadingFile = false;
                    this.uploadProgress = 0;
                }
            },

            async uploadSingleFile(file, fileName) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('file_type', this.currentFileType);

                // Add metadata
                if (this.fileUploadMetadata.title) {
                    formData.append('title', this.fileUploadMetadata.title);
                }
                if (this.fileUploadMetadata.description) {
                    formData.append('description', this.fileUploadMetadata.description);
                }
                if (this.fileUploadMetadata.scale_ratio) {
                    formData.append('scale_ratio', this.fileUploadMetadata.scale_ratio);
                }
                if (this.fileUploadMetadata.tavola_number) {
                    formData.append('tavola_number', this.fileUploadMetadata.tavola_number);
                }
                if (this.fileUploadMetadata.photographer) {
                    formData.append('photographer', this.fileUploadMetadata.photographer);
                }
                if (this.fileUploadMetadata.photo_date) {
                    formData.append('photo_date', this.fileUploadMetadata.photo_date);
                }

                const entityId = this.editingUS?.id || this.editingUSM?.id;
                const endpoint = this.editingUS ? 'us' : 'usm';

                let uploadUrl, response;

                // Handle photo uploads with new API endpoint
                if (this.currentFileType === 'fotografia') {
                    // Use new photo upload API
                    uploadUrl = `/api/v1/sites/${this.currentSiteId}/photos/upload`;

                    // Prepare form data for new endpoint
                    formData = new FormData();

                    // New endpoint expects photos as an array
                    formData.append('photos', file);

                    // Map existing metadata to new archaeological metadata format
                    const usCode = this.editingUS?.us_code || this.editingUSM?.usm_code || '';
                    formData.append('inventory_number', usCode);
                    formData.append('excavation_area', this.editingUS?.area_struttura || this.editingUSM?.area_struttura || '');
                    // 🔧 CRITICAL FIX: Pass UUID instead of us_code for stratigraphic_unit
                    formData.append('stratigraphic_unit', entityId); // entityId contains actual UUID
                    // For USM, also set usm_reference for compatibility
                    if (this.editingUSM) {
                        formData.append('usm_reference', entityId);
                    }
                    formData.append('material', 'misc'); // Default material
                    formData.append('photo_type', 'fotografia');
                    formData.append('photo_date', this.fileUploadMetadata.photo_date || new Date().toISOString().split('T')[0]);
                    formData.append('description', this.fileUploadMetadata.description || '');
                    // Create keywords array from metadata
                    const keywordsArray = [];
                    if (this.fileUploadMetadata.photographer) {
                        keywordsArray.push(`photographer:${this.fileUploadMetadata.photographer}`);
                    }
                    if (this.fileUploadMetadata.title) {
                        keywordsArray.push(`title:${this.fileUploadMetadata.title}`);
                    }
                    keywordsArray.push(`us_id:${entityId}`);
                    keywordsArray.push(this.editingUS ? 'us_type:us' : 'us_type:usm');

                    formData.append('tags', JSON.stringify(keywordsArray));
                } else {
                    // Use existing endpoint for non-photo files
                    uploadUrl = `/api/v1/us-files/${endpoint}/${entityId}/upload/${this.currentFileType}`;
                }

                response = await fetch(uploadUrl, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': this.getCSRFToken(),
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Upload failed: ${response.status} ${errorText}`);
                }

                const result = await response.json();
                if (!result.valid && result.errors) {
                    throw new Error(result.errors.join(', '));
                }

                return result;
            },

            closeUploadModal() {
                this.showFileUploadModal = false;
                this.filePreviews = [];
                this.uploadProgress = 0;
                this.filesCompleted = 0;
                this.dragOver = false;
                this.notification.message = '';
            },

            notify(message, type = 'info') {
                this.notification = { message, type };

                // Auto-hide success messages
                if (type === 'success') {
                    setTimeout(() => {
                        this.notification.message = '';
                    }, 5000);
                }
            },

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },

            async uploadFile() {
                console.log('🚀 uploadFile called');
                console.log('currentFileType:', this.currentFileType);
                console.log('editingUS:', this.editingUS);
                console.log('editingUSM:', this.editingUSM);

                // Check if US/USM is saved first
                const entityId = this.editingUS?.id || this.editingUSM?.id;
                if (!entityId) {
                    alert('Devi prima salvare la US/USM prima di poter caricare file');
                    this.showFileUploadModal = false;
                    return;
                }

                // Wait for DOM to be ready before accessing file input
                await this.$nextTick();

                // Get the file input element using multiple approaches
                let fileInputElement = this.$refs.fileInput;

                if (!fileInputElement) {
                    fileInputElement = document.querySelector('[x-ref="fileInput"]');
                }

                if (!fileInputElement) {
                    fileInputElement = document.querySelector('#fileInput');
                }

                if (!fileInputElement) {
                    fileInputElement = document.querySelector('input[type="file"]');
                }

                console.log('🔍 File input search results:', {
                    foundElement: !!fileInputElement,
                    elementId: fileInputElement?.id,
                    elementName: fileInputElement?.name,
                    hasFiles: !!fileInputElement?.files,
                    filesLength: fileInputElement?.files?.length,
                    files: fileInputElement?.files
                });

                if (!fileInputElement) {
                    console.error('❌ File input element not found');
                    alert('Impossibile trovare l\'elemento file input');
                    return;
                }

                if (!fileInputElement.files || fileInputElement.files.length === 0) {
                    console.log('❌ No files selected in input');
                    alert('Seleziona un file');
                    return;
                }

                const file = fileInputElement.files[0];
                console.log('Selected file details:', {
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    lastModified: file.lastModified
                });
                console.log('File selezionato:', file.name, file.size);

                this.uploadingFile = true;

                try {
                    let uploadUrl, formData, response;

                    // Handle photo uploads with new API endpoint
                    if (this.currentFileType === 'fotografia') {
                        // Use new photo upload API
                        uploadUrl = `/api/v1/sites/${this.currentSiteId}/photos/upload`;
                        console.log('Photo Upload URL:', uploadUrl);

                        // Prepare form data for new endpoint
                        formData = new FormData();

                        // New endpoint expects photos as an array
                        formData.append('photos', file);

                        // Map existing metadata to new archaeological metadata format
                        const usCode = this.editingUS?.us_code || this.editingUSM?.usm_code || '';
                        formData.append('inventory_number', usCode);
                        formData.append('excavation_area', this.editingUS?.area_struttura || this.editingUSM?.area_struttura || '');
                        // 🔧 CRITICAL FIX: Pass UUID instead of us_code for stratigraphic_unit
                        formData.append('stratigraphic_unit', entityId); // entityId contains the actual UUID
                        // For USM, also set usm_reference for compatibility
                        if (this.editingUSM) {
                            formData.append('usm_reference', entityId);
                        }
                        formData.append('material', 'misc'); // Default material
                        formData.append('photo_type', 'fotografia');
                        formData.append('photo_date', this.fileUploadMetadata.photo_date || new Date().toISOString().split('T')[0]);
                        formData.append('description', this.fileUploadMetadata.description || '');
                        // Create keywords array from metadata
                        const keywordsArray = [];
                        if (this.fileUploadMetadata.photographer) {
                            keywordsArray.push(`photographer:${this.fileUploadMetadata.photographer}`);
                        }
                        if (this.fileUploadMetadata.title) {
                            keywordsArray.push(`title:${this.fileUploadMetadata.title}`);
                        }
                        keywordsArray.push(`us_id:${entityId}`);
                        keywordsArray.push(this.editingUS ? 'us_type:us' : 'us_type:usm');

                        formData.append('tags', JSON.stringify(keywordsArray));

                        console.log('New API form data prepared');
                    } else {
                        // Use existing endpoint for non-photo files
                        const endpoint = this.editingUS ? 'us' : 'usm';
                        uploadUrl = `/api/v1/us-files/${endpoint}/${entityId}/upload/${this.currentFileType}`;
                        console.log('File Upload URL:', uploadUrl);

                        formData = new FormData();
                        formData.append('file', file);

                        // Aggiungi metadati
                        Object.keys(this.fileUploadMetadata).forEach(key => {
                            if (this.fileUploadMetadata[key]) {
                                formData.append(key, this.fileUploadMetadata[key]);
                                console.log(`Metadata ${key}:`, this.fileUploadMetadata[key]);
                            }
                        });
                    }

                    response = await fetch(uploadUrl, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': this.getCSRFToken()
                        },
                        body: formData
                    });

                    console.log('Response status:', response.status);
                    console.log('Response ok:', response.ok);

                    if (response.ok) {
                        const result = await response.json();
                        console.log('Upload successful:', result);

                        this.showNotification('File caricato con successo', 'success');
                        this.showFileUploadModal = false;

                        // For photo uploads, we need to reload the files differently
                        if (this.currentFileType === 'fotografia') {
                            // The new API doesn't update the same file structure
                            // We'll need to reload the files using the existing method
                            if (this.editingUS) {
                                await this.loadUSFiles(entityId);
                            } else {
                                await this.loadUSMFiles(entityId);
                            }
                        } else {
                            // Ricarica file for other types
                            if (this.editingUS) {
                                await this.loadUSFiles(entityId);
                            } else {
                                await this.loadUSMFiles(entityId);
                            }
                        }
                    } else {
                        const errorText = await response.text();
                        console.error('Upload error response:', errorText);
                        let errorDetail = 'Errore upload';
                        try {
                            const error = JSON.parse(errorText);
                            errorDetail = error.detail || error.message || errorDetail;
                        } catch (e) {
                            errorDetail = errorText;
                        }
                        throw new Error(errorDetail);
                    }
                } catch (error) {
                    console.error('Errore upload file:', error);
                    this.showNotification('Errore caricamento file: ' + error.message, 'error');
                } finally {
                    this.uploadingFile = false;
                }
            },

            async deleteFile(file, fileType) {
                if (!confirm('Eliminare questo file?')) {
                    return;
                }

                try {
                    const entityId = this.editingUS?.id || this.editingUSM?.id;
                    const endpoint = this.editingUS ? 'us' : 'usm';

                    console.log('🗑️ Tentativo eliminazione file:', file.id, 'tipo:', fileType, 'entity:', entityId);

                    const response = await fetch(`/api/v1/us-files/${endpoint}/${entityId}/files/${file.id}`, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': this.getCSRFToken()
                        }
                    });

                    if (response.ok) {
                        console.log('✅ File eliminato con successo dal server');

                        // Ricarica tutti i file dal server per assicurare coerenza
                        if (this.editingUS) {
                            await this.loadUSFiles(entityId);
                        } else {
                            await this.loadUSMFiles(entityId);
                        }

                        this.showNotification('File eliminato', 'success');
                    } else {
                        throw new Error('Errore eliminazione');
                    }
                } catch (error) {
                    console.error('❌ Errore eliminazione file:', error);
                    this.showNotification('Errore eliminazione file', 'error');
                }
            },

            previewFile(file) {
                // Apri anteprima in modal o nuova tab
                console.log('Preview file:', file);

                if (file.mimetype && file.mimetype.includes('pdf')) {
                    // Per PDF, apri in nuova tab
                    const viewUrl = `/api/v1/us-files/${file.id}/view`;
                    window.open(viewUrl, '_blank');
                } else if (file.mimetype && file.mimetype.includes('image/')) {
                    // Per immagini, usa thumbnail o view
                    if (file.thumbnail_url) {
                        window.open(file.thumbnail_url, '_blank');
                    } else {
                        const viewUrl = `/api/v1/us-files/${file.id}/view`;
                        window.open(viewUrl, '_blank');
                    }
                } else if (file.mimetype && (file.mimetype.includes('word') || file.mimetype.includes('document'))) {
                    // Per documenti Word, prova ad aprire in nuova tab
                    const viewUrl = `/api/v1/us-files/${file.id}/view`;
                    window.open(viewUrl, '_blank');
                } else {
                    // Per altri tipi, prova il download
                    this.downloadFile(file);
                }
            },

            async downloadFile(file) {
                window.location.href = `/api/v1/us-files/${file.id}/download`;
            },

            async editFileMetadata(file) {
                // Implementa modal per editing metadati
                const newTitle = prompt('Titolo:', file.title || '');
                if (newTitle !== null) {
                    try {
                        const response = await fetch(`/api/v1/us-files/${file.id}/metadata`, {
                            method: 'PATCH',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': this.getCSRFToken()
                            },
                            body: JSON.stringify({ title: newTitle })
                        });

                        if (response.ok) {
                            file.title = newTitle;
                            this.showNotification('Metadati aggiornati', 'success');
                        }
                    } catch (error) {
                        console.error('Errore aggiornamento metadati:', error);
                    }
                }
            },

            getTotalFilesCount() {
                return Object.values(this.filesData).reduce((sum, arr) => sum + arr.length, 0);
            },

            getFilesSummaryText() {
                const counts = [];
                if (this.filesData.piante.length > 0) counts.push(`${this.filesData.piante.length} piante`);
                if (this.filesData.sezioni.length > 0) counts.push(`${this.filesData.sezioni.length} sezioni`);
                if (this.filesData.prospetti.length > 0) counts.push(`${this.filesData.prospetti.length} prospetti`);
                if (this.filesData.fotografie.length > 0) counts.push(`${this.filesData.fotografie.length} foto`);
                if (this.filesData.documenti.length > 0) counts.push(`${this.filesData.documenti.length} doc`);
                return counts.join(', ');
            },

            getDocumentIcon(mimetype) {
                if (!mimetype) return 'fas fa-file';
                if (mimetype.includes('pdf')) return 'fas fa-file-pdf';
                if (mimetype.includes('word')) return 'fas fa-file-word';
                return 'fas fa-file';
            },

            formatFileSize(bytes) {
                if (!bytes) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
            },

            // ===== EXPORT WORD METHODS =====

            async exportUSWord() {
                if (!this.editingUS && !this.usFormData.us_code) {
                    this.showExportStatus('error', 'Salva prima la US per esportarla');
                    return;
                }

                this.exportingWord = true;
                this.exportStatus = null;

                try {
                    const usId = this.editingUS?.id;
                    const response = await fetch(`/api/us-export/us/${usId}/word`, {
                        method: 'GET',
                        headers: {
                            'X-CSRFToken': this.getCSRFToken()
                        }
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        this.downloadBlob(blob, response.headers.get('Content-Disposition'));
                        this.showExportStatus('success', 'Documento Word generato');
                    } else {
                        const error = await response.json();
                        throw new Error(error.detail || 'Errore export');
                    }
                } catch (error) {
                    console.error('Errore export US Word:', error);
                    this.showExportStatus('error', 'Errore: ' + error.message);
                } finally {
                    this.exportingWord = false;
                }
            },

            async exportUSMWord() {
                if (!this.editingUSM && !this.usmFormData.usm_code) {
                    this.showExportStatus('error', 'Salva prima la USM per esportarla');
                    return;
                }

                this.exportingWord = true;
                this.exportStatus = null;

                try {
                    const usmId = this.editingUSM?.id;
                    const response = await fetch(`/api/us-export/usm/${usmId}/word`, {
                        method: 'GET',
                        headers: {
                            'X-CSRFToken': this.getCSRFToken()
                        }
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        this.downloadBlob(blob, response.headers.get('Content-Disposition'));
                        this.showExportStatus('success', 'Documento USM Word scaricato');
                    } else {
                        const error = await response.json();
                        throw new Error(error.detail || 'Errore export USM');
                    }
                } catch (error) {
                    console.error('Errore export USM:', error);
                    this.showExportStatus('error', 'Errore: ' + error.message);
                } finally {
                    this.exportingWord = false;
                }
            },

            downloadBlob(blob, contentDispositionHeader) {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;

                let filename = 'SchediArcheologiche.docx';
                if (contentDispositionHeader) {
                    const match = contentDispositionHeader.match(/filename=(.+)/);
                    if (match) filename = match[1].replace(/"/g, '');
                }

                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            },

            showExportStatus(type, message) {
                this.exportStatus = { type, message };

                setTimeout(() => {
                    if (this.exportStatus && this.exportStatus.message === message) {
                        this.exportStatus = null;
                    }
                }, 5000);
            },

            previewWordStructure() {
                alert('Funzione anteprima in sviluppo');
            },

            // ===== EXPORT DATA METHODS =====

            exportUSData() {
                const allData = [
                    ...this.usList.map(us => ({
                        tipo: 'US',
                        codice: us.us_code,
                        tipo_us: us.tipo || 'positiva',
                        definizione: us.definizione || '',
                        localita: us.localita || '',
                        data_rilevamento: this.formatDate(us.data_rilevamento),
                        responsabile: us.responsabile_compilazione || '',
                        affidabilita: us.affidabilita_stratigrafica || '',
                        aggiornato_il: this.formatDate(us.updated_at)
                    })),
                    ...this.usmList.map(usm => ({
                        tipo: 'USM',
                        codice: usm.usm_code,
                        definizione: usm.definizione || '',
                        localita: usm.localita || '',
                        data_rilevamento: this.formatDate(usm.data_rilevamento),
                        responsabile: usm.responsabile_compilazione || '',
                        affidabilita: usm.affidabilita_stratigrafica || '',
                        aggiornato_il: this.formatDate(usm.updated_at)
                    }))
                ];

                const headers = ['Tipo', 'Codice', 'Tipo US', 'Definizione', 'Località', 'Data Rilevamento', 'Responsabile', 'Affidabilità', 'Aggiornato il'];
                const csvContent = [
                    headers.join(','),
                    ...allData.map(item => [
                        item.tipo,
                        item.codice,
                        item.tipo_us,
                        item.definizione,
                        item.localita,
                        item.data_rilevamento,
                        item.responsabile,
                        item.affidabilita,
                        item.aggiornato_il
                    ].map(field => `"${field}"`).join(','))
                ].join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `us_usm_export_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();

                this.showNotification('Dati US/USM esportati con successo', 'success');
            }
        }
    }
