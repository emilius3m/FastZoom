                if (this.filters.dateTo) queryParams.append('a', this.filters.dateTo);

                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': this.getCSRFToken()
                    }
                });

                if (response.ok) {
                    this.usList = await response.json();

        async saveUS() {
            this.usSaving = true;
            this.usErrorMessage = '';

            try {
                // Debug log to check form data
                console.log('Form data before save:', this.usFormData);
                
                // Clean up form data - convert empty strings to null for optional fields
                const cleanFormData = { ...this.usFormData };
                
                // Convert empty strings to null for numeric fields
                if (cleanFormData.anno === '' || cleanFormData.anno === null) {
                    cleanFormData.anno = null;
                }
                
                // Convert empty strings to null for date fields
                if (!cleanFormData.data_rilevamento || cleanFormData.data_rilevamento === '') {
                    cleanFormData.data_rilevamento = null;
                }
                if (!cleanFormData.data_rielaborazione || cleanFormData.data_rielaborazione === '') {
                    cleanFormData.data_rielaborazione = null;
                }
                
                // Prepara payload con sequenza fisica
                const payload = {
                    ...cleanFormData,
                    sequenza_fisica: {
                        uguale_a: this.stringToSequenza(this.usFormData.seq_uguale_a),
                        si_lega_a: this.stringToSequenza(this.usFormData.seq_si_lega_a),
                        gli_si_appoggia: this.stringToSequenza(this.usFormData.seq_gli_si_appoggia),
                        si_appoggia_a: this.stringToSequenza(this.usFormData.seq_si_appoggia_a),
                        coperto_da: this.stringToSequenza(this.usFormData.seq_coperto_da),
                        copre: this.stringToSequenza(this.usFormData.seq_copre),
                        tagliato_da: this.stringToSequenza(this.usFormData.seq_tagliato_da),
                        taglia: this.stringToSequenza(this.usFormData.seq_taglia),
                        riempito_da: this.stringToSequenza(this.usFormData.seq_riempito_da),
                        riempie: this.stringToSequenza(this.usFormData.seq_riempie)
                    },
                    campionature: {
                        flottazione: this.usFormData.camp_flottazione,
                        setacciatura: this.usFormData.camp_setacciatura
                    }
                };
                
                // Debug log to check payload
                console.log('Payload being sent:', payload);

                // Rimuovi campi sequenza temporanei
                delete payload.seq_uguale_a;
                delete payload.seq_si_lega_a;
                delete payload.seq_gli_si_appoggia;
                delete payload.seq_si_appoggia_a;
                delete payload.seq_coperto_da;
                delete payload.seq_copre;
                delete payload.seq_tagliato_da;
                delete payload.seq_taglia;
                delete payload.seq_riempito_da;
                delete payload.seq_riempie;
                delete payload.camp_flottazione;
                delete payload.camp_setacciatura;

                const url = this.editingUS
                    ? `/api/us/${this.editingUS.id}`
                    : '/api/us';
                const method = this.editingUS ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': this.getCSRFToken()
                    },
                    body: JSON.stringify(payload)
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                if (response.ok) {
                    const savedUS = await response.json();
                    console.log('US salvata:', savedUS);

                    this.showNotification(
                        this.editingUS ? 'US aggiornata con successo' : 'US creata con successo',
                        'success'
                    );

                    await this.loadUSList();
                    this.closeUSModal();
                } else {
                    const error = await response.json();
                    console.error('API Error:', error);
                    let errorMessage = 'Errore nel salvataggio';
                    
                    if (error.detail) {
                        if (typeof error.detail === 'string') {
                            errorMessage = error.detail;
                            
                            // Highlight specific field if error mentions it
                            if (errorMessage.includes("Campo '")) {
                                const fieldNameMatch = errorMessage.match(/Campo '([^']+)'/);
                                if (fieldNameMatch) {
                                    const fieldName = fieldNameMatch[1];
                                    // Try to find and highlight the field
                                    setTimeout(() => {
                                        const fieldElement = document.querySelector(`[x-model*="${fieldName}"]`);
                                        if (fieldElement) {
                                            fieldElement.classList.add('border-red-500', 'ring-2', 'ring-red-200');
                                            setTimeout(() => {
                                                fieldElement.classList.remove('border-red-500', 'ring-2', 'ring-red-200');
                                            }, 5000);
                                        }
                                    }, 100);
                                }
                            }
                        } else if (Array.isArray(error.detail)) {
                            // Handle validation errors array
                            errorMessage = error.detail.map(err =>
                                typeof err === 'object' ? err.msg || JSON.stringify(err) : err
                            ).join(', ');
                        } else if (typeof error.detail === 'object') {
                            errorMessage = JSON.stringify(error.detail);
                        }
                    }
                    
                    throw new Error(errorMessage);
                }
            } catch (error) {
                console.error('Errore salvataggio US:', error);
                this.usErrorMessage = error.message || 'Errore nel salvataggio della US';
            } finally {
                this.usSaving = false;
            }
        },

            if (!confirm('Sei sicuro di voler eliminare questa US? L\'operazione non può essere annullata.')) {
                return;
            }

            try {
                const response = await fetch(`/api/us/${usId}`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': this.getCSRFToken()
                    }
                });

                if (response.ok) {
                    this.showNotification('US eliminata con successo', 'success');
                    await this.loadUSList();
                } else {
                    throw new Error('Errore nell\'eliminazione');
                }
            } catch (error) {
                console.error('Errore eliminazione US:', error);
                this.showNotification('Errore nell\'eliminazione della US', 'error');
            }
        },

                            lit_spianati: usmData.materiali_elementi_litici?.lavorazione?.includes('spianati') || false,
                            lit_bugnati: usmData.materiali_elementi_litici?.lavorazione?.includes('bugnati') || false,
                            materiali_altro: usmData.materiali_altro || '',
                            legante_tipo: usmData.legante?.tipo || '',
                            legante_consistenza: usmData.legante?.consistenza || '',
                            legante_altro: usmData.legante_altro || '',
                            finiture_elementi_particolari: usmData.finiture_elementi_particolari || '',
                            seq_uguale_a: this.sequenzaToString(usmData.sequenza_fisica?.uguale_a),
                            seq_si_lega_a: this.sequenzaToString(usmData.sequenza_fisica?.si_lega_a),
                            seq_gli_si_appoggia: this.sequenzaToString(usmData.sequenza_fisica?.gli_si_appoggia),
                            seq_si_appoggia_a: this.sequenzaToString(usmData.sequenza_fisica?.si_appoggia_a),
                            seq_coperto_da: this.sequenzaToString(usmData.sequenza_fisica?.coperto_da),
                            seq_copre: this.sequenzaToString(usmData.sequenza_fisica?.copre),
                            seq_tagliato_da: this.sequenzaToString(usmData.sequenza_fisica?.tagliato_da),
                            seq_taglia: this.sequenzaToString(usmData.sequenza_fisica?.taglia),
                            seq_riempito_da: this.sequenzaToString(usmData.sequenza_fisica?.riempito_da),
                            seq_riempie: this.sequenzaToString(usmData.sequenza_fisica?.riempie),
                            descrizione: usmData.descrizione || '',
                            osservazioni: usmData.osservazioni || '',
                            interpretazione: usmData.interpretazione || '',
                            datazione: usmData.datazione || '',
                            periodo: usmData.periodo || '',
                            fase: usmData.fase || '',
                            elementi_datanti: usmData.elementi_datanti || '',
                            camp_elementi_litici: usmData.campionature?.elementi_litici || false,
                            camp_laterizi: usmData.campionature?.laterizi || false,
                            camp_malta: usmData.campionature?.malta || false,
                            affidabilita_stratigrafica: usmData.affidabilita_stratigrafica || '',
                            responsabile_scientifico: usmData.responsabile_scientifico || '',
                            data_rilevamento: usmData.data_rilevamento || '',
                            responsabile_compilazione: usmData.responsabile_compilazione || '',
                            data_rielaborazione: usmData.data_rielaborazione || '',
                            responsabile_rielaborazione: usmData.responsabile_rielaborazione || ''
                        };
                    } else {
                        throw new Error('Errore nel caricamento dei dati USM');
                    }
                } catch (error) {
                    console.error('Error fetching USM data:', error);
                    this.showNotification('Errore nel caricamento dei dati USM', 'error');
                    return;
                }
            } else {
                // Modalità creazione
                this.resetUSMForm();
                this.usmFormData.site_id = this.currentSiteId;
            }

            // Load files if editing existing USM
            if (usm) {
                await this.loadUSMFiles(usm.id);
            } else {
                // Reset files for new USM
                this.filesData = {
                    piante: [],
                    sezioni: [],
                    prospetti: [],
                    fotografie: [],
                    documenti: []
                };
            }

            this.showUSMModal = true;
        },

        closeUSMModal() {
            this.showUSMModal = false;
            this.editingUSM = null;
            this.viewingUSM = false;
            this.usmErrorMessage = '';
            this.resetUSMForm();
        },

        async saveUSM() {
            this.usmSaving = true;
            this.usmErrorMessage = '';

            try {
                // Debug log to check form data
                console.log('USM Form data before save:', this.usmFormData);
                
                // Clean up form data - convert empty strings to null for optional fields
                const cleanFormData = { ...this.usmFormData };
                
                // Convert empty strings to null for numeric fields
                if (cleanFormData.anno === '' || cleanFormData.anno === null) {
                    cleanFormData.anno = null;
                }
                if (cleanFormData.superficie_analizzata === '' || cleanFormData.superficie_analizzata === null) {
                    cleanFormData.superficie_analizzata = null;
                }
                
                // Convert empty strings to null for date fields
                if (!cleanFormData.data_rilevamento || cleanFormData.data_rilevamento === '') {
                    cleanFormData.data_rilevamento = null;
                }
                if (!cleanFormData.data_rielaborazione || cleanFormData.data_rielaborazione === '') {
                    cleanFormData.data_rielaborazione = null;
                }
                
                // Prepara payload completo
                const payload = {
                    ...cleanFormData,
                    materiali_laterizi: {
                        tipo: [
                            this.usmFormData.lat_mattoni ? 'mattoni' : null,
                            this.usmFormData.lat_tegole ? 'tegole' : null,
                            this.usmFormData.lat_embrici ? 'embrici' : null,
                            this.usmFormData.lat_altro ? 'altro' : null
                        ].filter(Boolean),
                        consistenza: [
                            this.usmFormData.lat_crudi ? 'crudi' : null,
                            this.usmFormData.lat_cotti ? 'cotti' : null,
                            this.usmFormData.lat_cotti_sole ? 'cotti_sole' : null,
                            this.usmFormData.lat_semifusi ? 'semifusi' : null
                        ].filter(Boolean)
                    },
                    materiali_elementi_litici: {
                        litotipi: [
                            this.usmFormData.lit_tufo ? 'tufo' : null,
                            this.usmFormData.lit_calcare ? 'calcare' : null,
                            this.usmFormData.lit_arenaria ? 'arenaria' : null,
                            this.usmFormData.lit_altro ? 'altro' : null
                        ].filter(Boolean),
                        lavorazione: [
                            this.usmFormData.lit_sfaldati ? 'sfaldati' : null,
                            this.usmFormData.lit_spaccati ? 'spaccati' : null,
                            this.usmFormData.lit_sbozzati ? 'sbozzati' : null,
                            this.usmFormData.lit_squadrati ? 'squadrati' : null,
                            this.usmFormData.lit_spianati ? 'spianati' : null,
                            this.usmFormData.lit_bugnati ? 'bugnati' : null
                        ].filter(Boolean)
                    },
                    legante: {
                        tipo: this.usmFormData.legante_tipo,
                        consistenza: this.usmFormData.legante_consistenza
                    },
                    sequenza_fisica: {
                        uguale_a: this.stringToSequenza(this.usmFormData.seq_uguale_a),
                        si_lega_a: this.stringToSequenza(this.usmFormData.seq_si_lega_a),
                        gli_si_appoggia: this.stringToSequenza(this.usmFormData.seq_gli_si_appoggia),
                        si_appoggia_a: this.stringToSequenza(this.usmFormData.seq_si_appoggia_a),
                        coperto_da: this.stringToSequenza(this.usmFormData.seq_coperto_da),
                        copre: this.stringToSequenza(this.usmFormData.seq_copre),
                        tagliato_da: this.stringToSequenza(this.usmFormData.seq_tagliato_da),
                        taglia: this.stringToSequenza(this.usmFormData.seq_taglia),
                        riempito_da: this.stringToSequenza(this.usmFormData.seq_riempito_da),
                        riempie: this.stringToSequenza(this.usmFormData.seq_riempie)
                    },
                    campionature: {
                        elementi_litici: this.usmFormData.camp_elementi_litici,
                        laterizi: this.usmFormData.camp_laterizi,
                        malta: this.usmFormData.camp_malta
                    }
                };
                
                // Debug log to check payload BEFORE cleanup
                console.log('USM Payload BEFORE cleanup:', JSON.parse(JSON.stringify(payload)));
                console.log('data_rilevamento in payload BEFORE cleanup:', payload.data_rilevamento);
                console.log('data_rielaborazione in payload BEFORE cleanup:', payload.data_rielaborazione);

                // Rimuovi campi temporanei
                const tempFields = [
                    'lat_mattoni', 'lat_tegole', 'lat_embrici', 'lat_altro',
                    'lat_crudi', 'lat_cotti', 'lat_cotti_sole', 'lat_semifusi',
                    'lit_tufo', 'lit_calcare', 'lit_arenaria', 'lit_altro',
                    'lit_sfaldati', 'lit_spaccati', 'lit_sbozzati', 'lit_squadrati', 'lit_spianati', 'lit_bugnati',
                    'legante_tipo', 'legante_consistenza',
                    'seq_uguale_a', 'seq_si_lega_a', 'seq_gli_si_appoggia', 'seq_si_appoggia_a',
                    'seq_coperto_da', 'seq_copre', 'seq_tagliato_da', 'seq_taglia',
                    'seq_riempito_da', 'seq_riempie',
                    'camp_elementi_litici', 'camp_laterizi', 'camp_malta'
                ];

                tempFields.forEach(field => delete payload[field]);
                
                // Debug log to check payload AFTER cleanup
                console.log('USM Payload AFTER cleanup:', JSON.parse(JSON.stringify(payload)));
                console.log('data_rilevamento in payload AFTER cleanup:', payload.data_rilevamento);
                console.log('data_rielaborazione in payload AFTER cleanup:', payload.data_rielaborazione);

                const url = this.editingUSM
                    ? `/api/usm/${this.editingUSM.id}`
                    : '/api/usm';
                const method = this.editingUSM ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': this.getCSRFToken()
                    },
                    body: JSON.stringify(payload)
                });
                
                console.log('USM Response status:', response.status);
                console.log('USM Response headers:', response.headers);

                if (response.ok) {
                    const savedUSM = await response.json();
                    console.log('USM salvata con successo:', savedUSM);
                    console.log('data_rilevamento salvata:', savedUSM.data_rilevamento);
                    console.log('data_rielaborazione salvata:', savedUSM.data_rielaborazione);

                    this.showNotification(
                        this.editingUSM ? 'USM aggiornata con successo' : 'USM creata con successo',
                        'success'
                    );

                    await this.loadUSMList();
                    console.log('Lista USM ricaricata dopo salvataggio');
                    this.closeUSMModal();
                } else {
                    const error = await response.json();
                    console.error('API Error:', error);
                    let errorMessage = 'Errore nel salvataggio';
                    
                    if (error.detail) {
                        if (typeof error.detail === 'string') {
                            errorMessage = error.detail;
                            
                            // Highlight specific field if error mentions it
                            if (errorMessage.includes("Campo '")) {
                                const fieldNameMatch = errorMessage.match(/Campo '([^']+)'/);
                                if (fieldNameMatch) {
                                    const fieldName = fieldNameMatch[1];
                                    // Try to find and highlight the field
                                    setTimeout(() => {
                                        const fieldElement = document.querySelector(`[x-model*="${fieldName}"]`);
                                        if (fieldElement) {
                                            fieldElement.classList.add('border-red-500', 'ring-2', 'ring-red-200');
                                            setTimeout(() => {
                                                fieldElement.classList.remove('border-red-500', 'ring-2', 'ring-red-200');
                                            }, 5000);
                                        }
                                    }, 100);
                                }
                            }
                        } else if (Array.isArray(error.detail)) {
                            // Handle validation errors array
                            errorMessage = error.detail.map(err =>
                                typeof err === 'object' ? err.msg || JSON.stringify(err) : err
                            ).join(', ');
                        } else if (typeof error.detail === 'object') {
                            errorMessage = JSON.stringify(error.detail);
                        }
                    }
                    
                    throw new Error(errorMessage);
                }
            } catch (error) {
                console.error('Errore salvataggio USM:', error);
                this.usmErrorMessage = error.message || 'Errore nel salvataggio della USM';
            } finally {
                this.usmSaving = false;
            }
        },

        async deleteUSM(usmId) {
            if (!confirm('Sei sicuro di voler eliminare questa USM? L\'operazione non può essere annullata.')) {
                return;
            }

            try {
                const response = await fetch(`/api/usm/${usmId}`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': this.getCSRFToken()
                    }
                });

                if (response.ok) {
                    this.showNotification('USM eliminata con successo', 'success');
                    await this.loadUSMList();
                } else {
                    throw new Error('Errore nell\'eliminazione');
                }
            } catch (error) {
                console.error('Errore eliminazione USM:', error);
                this.showNotification('Errore nell\'eliminazione della USM', 'error');
            }
        },

        resetUSMForm() {
            Object.keys(this.usmFormData).forEach(key => {
                if (typeof this.usmFormData[key] === 'boolean') {
                    this.usmFormData[key] = false;
                } else if (typeof this.usmFormData[key] === 'number') {
                    this.usmFormData[key] = null;
                } else {
                    this.usmFormData[key] = '';
                }
            });
            this.usmFormData.site_id = this.currentSiteId;
        },

        // ===== UTILITY FUNCTIONS =====

        sequenzaToString(arr) {
            return Array.isArray(arr) ? arr.join(', ') : '';
        },

        stringToSequenza(str) {
            if (!str) return [];
            return str.split(',').map(s => s.trim()).filter(Boolean);
        },

        getCSRFToken() {
            return document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
        },

        showNotification(message, type = 'info') {
            // Implementa sistema notifiche (toast)
            console.log(`[${type.toUpperCase()}] ${message}`);

            // Esempio con alert temporaneo
            if (type === 'error') {
                alert('❌ ' + message);
            } else if (type === 'success') {
                alert('✅ ' + message);
            }
        },

        formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('it-IT');
        },

        // ===== FILE MANAGEMENT METHODS =====

        async loadUSFiles(usId) {
            try {
                const response = await fetch(`/api/us/${usId}/files`);
                if (response.ok) {
                    const filesSummary = await response.json();
                    this.filesData = {
                        piante: filesSummary.piante || [],
                        sezioni: filesSummary.sezioni || [],
                        prospetti: filesSummary.prospetti || [],
                        fotografie: filesSummary.fotografie || [],
                        documenti: filesSummary.documenti || []
                    };
                }
            } catch (error) {
                console.error('Errore caricamento file US:', error);
            }
        },

        async loadUSMFiles(usmId) {
            try {
                const response = await fetch(`/api/usm/${usmId}/files`);
                if (response.ok) {
                    const filesSummary = await response.json();
                    this.filesData = {
                        piante: filesSummary.piante || [],
                        sezioni: filesSummary.sezioni || [],
                        prospetti: filesSummary.prospetti || [],
                        fotografie: filesSummary.fotografie || [],
                        documenti: filesSummary.documenti || []
                    };
                }
            } catch (error) {
                console.error('Errore caricamento file USM:', error);
            }
        },

        showUploadModal(fileType) {
            this.currentFileType = fileType;
            this.showFileUploadModal = true;
            this.fileUploadMetadata = {
                title: '',
                description: '',
                tavola_number: '',
                scale_ratio: '',
                photographer: '',
                photo_date: ''
            };
        },

        async uploadFile(fileInput) {
            if (!fileInput.files || fileInput.files.length === 0) {
                alert('Seleziona un file');
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('file_type', this.currentFileType);
            
            // Aggiungi metadati
            Object.keys(this.fileUploadMetadata).forEach(key => {
                if (this.fileUploadMetadata[key]) {
                    formData.append(key, this.fileUploadMetadata[key]);
                }
            });

            this.uploadingFile = true;

            try {
                const entityId = this.editingUS?.id || this.editingUSM?.id;
                const endpoint = this.editingUS ? 'us' : 'usm';
                
                const response = await fetch(`/api/${endpoint}/${entityId}/files`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': this.getCSRFToken()
                    },
                    body: formData
                });

                if (response.ok) {
                    const uploadedFile = await response.json();
                    
                    // Aggiungi file alla lista corretta
                    if (!this.filesData[this.currentFileType + 's']) {
                        this.filesData[this.currentFileType + 's'] = [];
                    }
                    this.filesData[this.currentFileType + 's'].push(uploadedFile);
                    
                    this.showNotification('File caricato con successo', 'success');
                    this.showFileUploadModal = false;
                    
                    // Ricarica file
                    if (this.editingUS) {
                        await this.loadUSFiles(entityId);
                    } else {
                        await this.loadUSMFiles(entityId);
                    }
                } else {
                    const error = await response.json();
                    throw new Error(error.detail || 'Errore upload');
                }
            } catch (error) {
                console.error('Errore upload file:', error);
                this.showNotification('Errore caricamento file: ' + error.message, 'error');
            } finally {
                this.uploadingFile = false;
            }
        },

        async deleteFile(file, fileType) {
            if (!confirm('Eliminare questo file?')) {
                return;
            }

            try {
                const entityId = this.editingUS?.id || this.editingUSM?.id;
                const endpoint = this.editingUS ? 'us' : 'usm';
                
                const response = await fetch(`/api/${endpoint}/${entityId}/files/${file.id}`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': this.getCSRFToken()
                    }
                });

                if (response.ok) {
                    // Rimuovi dalla lista
                    const listKey = fileType + 's';
                    this.filesData[listKey] = this.filesData[listKey].filter(f => f.id !== file.id);
                    this.showNotification('File eliminato', 'success');
                } else {
                    throw new Error('Errore eliminazione');
                }
            } catch (error) {
                console.error('Errore eliminazione file:', error);
                this.showNotification('Errore eliminazione file', 'error');
            }
        },

        previewFile(file) {
            // Apri anteprima in modal o nuova tab
            if (file.thumbnail_url) {
                window.open(file.thumbnail_url, '_blank');
            } else {
                alert('Anteprima non disponibile');
            }
        },

        async downloadFile(file) {
            window.location.href = `/api/files/${file.id}/download`;
        },

        async editFileMetadata(file) {
            // Implementa modal per editing metadati
            const newTitle = prompt('Titolo:', file.title || '');
            if (newTitle !== null) {
                try {
                    const response = await fetch(`/api/files/${file.id}/metadata`, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': this.getCSRFToken()
                        },
                        body: JSON.stringify({ title: newTitle })
                    });

                    if (response.ok) {
                        file.title = newTitle;
                        this.showNotification('Metadati aggiornati', 'success');
                    }
                } catch (error) {
                    console.error('Errore aggiornamento metadati:', error);
                }
            }
        },

        getTotalFilesCount() {
            return Object.values(this.filesData).reduce((sum, arr) => sum + arr.length, 0);
        },

        getFilesSummaryText() {
            const counts = [];
            if (this.filesData.piante.length > 0) counts.push(`${this.filesData.piante.length} piante`);
            if (this.filesData.sezioni.length > 0) counts.push(`${this.filesData.sezioni.length} sezioni`);
            if (this.filesData.prospetti.length > 0) counts.push(`${this.filesData.prospetti.length} prospetti`);
            if (this.filesData.fotografie.length > 0) counts.push(`${this.filesData.fotografie.length} foto`);
            if (this.filesData.documenti.length > 0) counts.push(`${this.filesData.documenti.length} doc`);
            return counts.join(', ');
        },

        getDocumentIcon(mimetype) {
            if (!mimetype) return 'fas fa-file';
            if (mimetype.includes('pdf')) return 'fas fa-file-pdf';
            if (mimetype.includes('word')) return 'fas fa-file-word';
            return 'fas fa-file';
        },

        formatFileSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        },

        // ===== EXPORT WORD METHODS =====

        async exportUSWord() {
            if (!this.editingUS && !this.usFormData.us_code) {
                this.showExportStatus('error', 'Salva prima la US per esportarla');
                return;
            }

            this.exportingWord = true;
            this.exportStatus = null;

            try {
                const usId = this.editingUS?.id;
                const response = await fetch(`/api/us-export/us/${usId}/word`, {
                    method: 'GET',
                    headers: {
                        'X-CSRFToken': this.getCSRFToken()
                    }
                });

                if (response.ok) {
                    const blob = await response.blob();
                    this.downloadBlob(blob, response.headers.get('Content-Disposition'));
                    this.showExportStatus('success', 'Documento Word generato');
                } else {
                    const error = await response.json();
                    throw new Error(error.detail || 'Errore export');
                }
            } catch (error) {
                console.error('Errore export US Word:', error);
                this.showExportStatus('error', 'Errore: ' + error.message);
            } finally {
                this.exportingWord = false;
            }
        },

        async exportUSMWord() {
            if (!this.editingUSM && !this.usmFormData.usm_code) {
                this.showExportStatus('error', 'Salva prima la USM per esportarla');
                return;
            }

            this.exportingWord = true;
            this.exportStatus = null;

            try {
                const usmId = this.editingUSM?.id;
                const response = await fetch(`/api/us-export/usm/${usmId}/word`, {
                    method: 'GET',
                    headers: {
                        'X-CSRFToken': this.getCSRFToken()
                    }
                });

                if (response.ok) {
                    const blob = await response.blob();
                    this.downloadBlob(blob, response.headers.get('Content-Disposition'));
                    this.showExportStatus('success', 'Documento USM Word scaricato');
                } else {
                    const error = await response.json();
                    throw new Error(error.detail || 'Errore export USM');
                }
            } catch (error) {
                console.error('Errore export USM:', error);
                this.showExportStatus('error', 'Errore: ' + error.message);
            } finally {
                this.exportingWord = false;
            }
        },

        downloadBlob(blob, contentDispositionHeader) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;

            let filename = 'SchediArcheologiche.docx';
            if (contentDispositionHeader) {
                const match = contentDispositionHeader.match(/filename=(.+)/);
                if (match) filename = match[1].replace(/"/g, '');
            }

            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        },

        showExportStatus(type, message) {
            this.exportStatus = { type, message };

            setTimeout(() => {
                if (this.exportStatus && this.exportStatus.message === message) {
                    this.exportStatus = null;
                }
            }, 5000);
        },

        previewWordStructure() {
            alert('Funzione anteprima in sviluppo');
        }
    }
}
</script>
