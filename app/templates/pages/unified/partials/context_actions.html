<!-- Context Actions Partial -->
<div x-data="contextActions()" x-init="init()" class="space-y-4">
    
    <!-- Context Actions Bar -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow border border-gray-200 dark:border-gray-700 p-4">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between space-y-4 lg:space-y-0">
            
            <!-- Left Section - Context Info -->
            <div class="flex items-center space-x-4">
                <div class="p-2 bg-blue-100 dark:bg-blue-900 rounded-lg">
                    <i class="fas fa-layer-group text-blue-600 dark:text-blue-300"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white" x-text="getContextTitle()"></h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400" x-text="getContextDescription()"></p>
                </div>
            </div>
            
            <!-- Right Section - Action Buttons -->
            <div class="flex flex-wrap gap-2">
                <template x-for="action in getContextActions()" :key="action.id">
                    <button @click="executeContextAction(action)"
                            :disabled="action.disabled"
                            class="context-action-btn inline-flex items-center px-4 py-2 text-sm font-medium rounded-lg transition"
                            :class="getActionButtonClass(action)">
                        <i class="fas mr-2" :class="action.icon"></i>
                        <span x-text="action.label"></span>
                        <span x-show="action.badge" class="ml-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                              :class="action.badgeClass || 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300'"
                              x-text="action.badge"></span>
                    </button>
                </template>
            </div>
        </div>
    </div>

    <!-- Quick Actions Panel (for Overview tab) -->
    <div x-show="activeTab === 'overview'" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Sites Quick Actions -->
        <div class="bg-gradient-to-br from-blue-50 to-blue-100 dark:from-blue-900 dark:to-blue-800 rounded-lg p-4 border border-blue-200 dark:border-blue-700">
            <div class="flex items-center justify-between mb-3">
                <h4 class="text-sm font-semibold text-blue-900 dark:text-blue-100">Siti Archeologici</h4>
                <i class="fas fa-map-marker-alt text-blue-600 dark:text-blue-400"></i>
            </div>
            <div class="space-y-2">
                <button @click="navigateToNewSite()" 
                        class="w-full text-left px-3 py-2 bg-white dark:bg-gray-800 rounded text-sm text-blue-800 dark:text-blue-200 hover:bg-blue-50 dark:hover:bg-blue-900 transition">
                    <i class="fas fa-plus mr-2"></i>Nuovo Sito
                </button>
                <button @click="navigateToSitesList()" 
                        class="w-full text-left px-3 py-2 bg-white dark:bg-gray-800 rounded text-sm text-blue-800 dark:text-blue-200 hover:bg-blue-50 dark:hover:bg-blue-900 transition">
                    <i class="fas fa-list mr-2"></i>Elenco Siti
                </button>
            </div>
        </div>

        <!-- Giornale Quick Actions -->
        <div class="bg-gradient-to-br from-orange-50 to-orange-100 dark:from-orange-900 dark:to-orange-800 rounded-lg p-4 border border-orange-200 dark:border-orange-700">
            <div class="flex items-center justify-between mb-3">
                <h4 class="text-sm font-semibold text-orange-900 dark:text-orange-100">Giornale di Cantiere</h4>
                <i class="fas fa-hard-hat text-orange-600 dark:text-orange-400"></i>
            </div>
            <div class="space-y-2">
                <button @click="navigateToNewGiornale()" 
                        class="w-full text-left px-3 py-2 bg-white dark:bg-gray-800 rounded text-sm text-orange-800 dark:text-orange-200 hover:bg-orange-50 dark:hover:bg-orange-900 transition">
                    <i class="fas fa-plus mr-2"></i>Nuovo Giornale
                </button>
                <button @click="navigateToGiornaleReports()" 
                        class="w-full text-left px-3 py-2 bg-white dark:bg-gray-800 rounded text-sm text-orange-800 dark:text-orange-200 hover:bg-orange-50 dark:hover:bg-orange-900 transition">
                    <i class="fas fa-chart-bar mr-2"></i>Report
                </button>
            </div>
        </div>

        <!-- Documents Quick Actions -->
        <div class="bg-gradient-to-br from-green-50 to-green-100 dark:from-green-900 dark:to-green-800 rounded-lg p-4 border border-green-200 dark:border-green-700">
            <div class="flex items-center justify-between mb-3">
                <h4 class="text-sm font-semibold text-green-900 dark:text-green-100">Documenti</h4>
                <i class="fas fa-file-alt text-green-600 dark:text-green-400"></i>
            </div>
            <div class="space-y-2">
                <button @click="navigateToUpload()" 
                        class="w-full text-left px-3 py-2 bg-white dark:bg-gray-800 rounded text-sm text-green-800 dark:text-green-200 hover:bg-green-50 dark:hover:bg-green-900 transition">
                    <i class="fas fa-upload mr-2"></i>Carica Documenti
                </button>
                <button @click="navigateToDocuments()" 
                        class="w-full text-left px-3 py-2 bg-white dark:bg-gray-800 rounded text-sm text-green-800 dark:text-green-200 hover:bg-green-50 dark:hover:bg-green-900 transition">
                    <i class="fas fa-folder mr-2"></i>Documenti
                </button>
            </div>
        </div>
    </div>

    <!-- Giornale Context Actions (for Giornale tab) -->
    <div x-show="activeTab === 'giornale'" class="bg-orange-50 dark:bg-orange-900 rounded-lg p-4 border border-orange-200 dark:border-orange-700">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
            <div class="flex items-center space-x-3">
                <i class="fas fa-hard-hat text-orange-600 dark:text-orange-400 text-xl"></i>
                <div>
                    <h4 class="text-lg font-semibold text-orange-900 dark:text-orange-100">Azioni Giornale di Cantiere</h4>
                    <p class="text-sm text-orange-700 dark:text-orange-300">Gestisci documentazione e report delle attività di scavo</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button @click="navigateToNewGiornale()" 
                        class="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition">
                    <i class="fas fa-plus mr-2"></i>Nuovo Giornale
                </button>
                <button @click="navigateToGiornaleOperators()" 
                        class="px-4 py-2 bg-white dark:bg-gray-800 text-orange-600 dark:text-orange-400 border border-orange-300 dark:border-orange-600 rounded-lg hover:bg-orange-50 dark:hover:bg-orange-900 transition">
                    <i class="fas fa-users mr-2"></i>Operatori
                </button>
                <button @click="navigateToGiornaleReports()" 
                        class="px-4 py-2 bg-white dark:bg-gray-800 text-orange-600 dark:text-orange-400 border border-orange-300 dark:border-orange-600 rounded-lg hover:bg-orange-50 dark:hover:bg-orange-900 transition">
                    <i class="fas fa-chart-bar mr-2"></i>Report
                </button>
            </div>
        </div>
    </div>

    <!-- Analytics Context Actions (for Analytics tab) -->
    <div x-show="activeTab === 'analytics'" class="bg-green-50 dark:bg-green-900 rounded-lg p-4 border border-green-200 dark:border-green-700">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
            <div class="flex items-center space-x-3">
                <i class="fas fa-chart-line text-green-600 dark:text-green-400 text-xl"></i>
                <div>
                    <h4 class="text-lg font-semibold text-green-900 dark:text-green-100">Analisi e Report</h4>
                    <p class="text-sm text-green-700 dark:text-green-300">Visualizza dati statistici e genera report dettagliati</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button @click="generateReport('sites')" 
                        class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                    <i class="fas fa-file-pdf mr-2"></i>Report Siti
                </button>
                <button @click="generateReport('giornale')" 
                        class="px-4 py-2 bg-white dark:bg-gray-800 text-green-600 dark:text-green-400 border border-green-300 dark:border-green-600 rounded-lg hover:bg-green-50 dark:hover:bg-green-900 transition">
                    <i class="fas fa-file-pdf mr-2"></i>Report Giornale
                </button>
                <button @click="exportAnalytics()" 
                        class="px-4 py-2 bg-white dark:bg-gray-800 text-green-600 dark:text-green-400 border border-green-300 dark:border-green-600 rounded-lg hover:bg-green-50 dark:hover:bg-green-900 transition">
                    <i class="fas fa-download mr-2"></i>Esporta Dati
                </button>
            </div>
        </div>
    </div>

    <!-- Action Confirmation Modal -->
    <div x-show="showConfirmModal" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50"
         @click.self="showConfirmModal = false">
        
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-lg bg-white dark:bg-gray-800">
            <div class="mt-3">
                <div class="flex items-center justify-center w-12 h-12 mx-auto bg-yellow-100 dark:bg-yellow-900 rounded-full">
                    <i class="fas fa-exclamation-triangle text-yellow-600 dark:text-yellow-300"></i>
                </div>
                <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-white text-center mt-4">
                    <span x-text="confirmModalTitle"></span>
                </h3>
                <div class="mt-2 px-7 py-3">
                    <p class="text-sm text-gray-500 dark:text-gray-400 text-center" x-text="confirmModalMessage"></p>
                </div>
                <div class="flex justify-center space-x-3 mt-4">
                    <button @click="confirmAction()" 
                            class="px-4 py-2 bg-blue-600 text-white text-base font-medium rounded-md shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        Conferma
                    </button>
                    <button @click="showConfirmModal = false" 
                            class="px-4 py-2 bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-gray-300 text-base font-medium rounded-md shadow-sm hover:bg-gray-400 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-500">
                        Annulla
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
