<!-- Enhanced Site Selector Component -->
<div x-data="siteSelector()" x-init="init()" class="space-y-4">
    
    <!-- Site Selector Header -->
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
            <i class="fas fa-map-marked-alt mr-2 text-blue-600"></i>
            <span x-text="getSelectorTitle()"></span>
        </h3>
        
        <div class="flex items-center space-x-2">
            <!-- Search/Filter -->
            <div class="relative">
                <input type="text" 
                       x-model="searchQuery"
                       @input="filterSites()"
                       placeholder="Cerca siti..."
                       class="pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white text-sm">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            </div>
            
            <!-- View Toggle -->
            <div class="flex bg-gray-100 dark:bg-gray-700 rounded-lg p-1">
                <button @click="viewMode = 'grid'" 
                        :class="viewMode === 'grid' ? 'bg-white dark:bg-gray-600 shadow' : ''"
                        class="p-2 rounded transition">
                    <i class="fas fa-th text-gray-600 dark:text-gray-300"></i>
                </button>
                <button @click="viewMode = 'list'" 
                        :class="viewMode === 'list' ? 'bg-white dark:bg-gray-600 shadow' : ''"
                        class="p-2 rounded transition">
                    <i class="fas fa-list text-gray-600 dark:text-gray-300"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-8">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
    </div>

    <!-- Sites Grid View -->
    <div x-show="!loading && viewMode === 'grid'" 
         class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="site in filteredSites" :key="site.id">
            <div class="group relative bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-600 hover:shadow-lg transition-all duration-200 cursor-pointer"
                 @click.stop="selectSite(site)">
                
                <!-- Site Header -->
                <div class="p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1">
                            <h3 class="text-lg font-semibold text-gray-900 dark:text-white group-hover:text-blue-600 transition" 
                                x-text="site.name"></h3>
                            <p class="text-sm text-gray-600 dark:text-gray-400 mt-1" x-text="site.code"></p>
                        </div>
                        <div class="p-2 bg-blue-100 dark:bg-blue-900 rounded-full">
                            <i class="fas fa-map-marker-alt text-blue-600 dark:text-blue-300"></i>
                        </div>
                    </div>
                    
                    <!-- Site Information -->
                    <div class="space-y-2 text-sm text-gray-600 dark:text-gray-400 mb-4">
                        <div x-show="site.location" class="flex items-center">
                            <i class="fas fa-map-marker-alt mr-2 text-gray-400"></i>
                            <span x-text="site.location"></span>
                        </div>
                        
                        <div x-show="site.description" class="flex items-start">
                            <i class="fas fa-info-circle mr-2 mt-0.5 text-gray-400"></i>
                            <span class="line-clamp-2" x-text="site.description ? (site.description.length > 100 ? site.description.substring(0, 100) + '...' : site.description) : ''"></span>
                        </div>
                    </div>
                    
                    <!-- Site Stats (Context-aware) -->
                    <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
                        <div class="bg-gray-50 dark:bg-gray-700 p-3 rounded border">
                            <div class="text-gray-500" x-text="getStatLabel('primary')"></div>
                            <div class="font-semibold text-gray-900 dark:text-white" x-text="getSiteStat(site, 'primary')"></div>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-700 p-3 rounded border">
                            <div class="text-gray-500" x-text="getStatLabel('secondary')"></div>
                            <div class="font-semibold text-green-600" x-text="getSiteStat(site, 'secondary')"></div>
                        </div>
                    </div>
                    
                    <!-- Permission Badge -->
                    <div class="flex items-center justify-between">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                              :class="getPermissionBadgeClass(site.permission_level)"
                              x-text="site.permission_level"></span>
                        
                        <div class="flex items-center text-blue-600 opacity-0 group-hover:opacity-100 transition">
                            <span class="text-sm font-medium mr-1" x-text="getActionLabel()"></span>
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Sites List View -->
    <div x-show="!loading && viewMode === 'list'" 
         class="space-y-2">
        <template x-for="site in filteredSites" :key="site.id">
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-600 hover:shadow-md transition-all duration-200 cursor-pointer"
                 @click.stop="selectSite(site)">
                
                <div class="p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="p-3 bg-blue-100 dark:bg-blue-900 rounded-full">
                            <i class="fas fa-map-marker-alt text-blue-600 dark:text-blue-300"></i>
                        </div>
                        
                        <div class="flex-1">
                            <div class="flex items-center space-x-3">
                                <h3 class="text-lg font-semibold text-gray-900 dark:text-white" x-text="site.name"></h3>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                                      :class="getPermissionBadgeClass(site.permission_level)"
                                      x-text="site.permission_level"></span>
                            </div>
                            <div class="flex items-center space-x-4 mt-1 text-sm text-gray-600 dark:text-gray-400">
                                <span x-text="site.code"></span>
                                <span x-show="site.location" x-text="'• ' + site.location"></span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center space-x-6">
                        <!-- Stats -->
                        <div class="flex space-x-4 text-sm">
                            <div class="text-center">
                                <div class="font-semibold text-gray-900 dark:text-white" x-text="getSiteStat(site, 'primary')"></div>
                                <div class="text-gray-500" x-text="getStatLabel('primary')"></div>
                            </div>
                            <div class="text-center">
                                <div class="font-semibold text-green-600" x-text="getSiteStat(site, 'secondary')"></div>
                                <div class="text-gray-500" x-text="getStatLabel('secondary')"></div>
                            </div>
                        </div>
                        
                        <!-- Action Arrow -->
                        <div class="flex items-center text-blue-600">
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Empty State -->
    <div x-show="!loading && filteredSites.length === 0" class="text-center py-12">
        <i class="fas fa-map-marker-alt text-6xl text-gray-300 mb-4"></i>
        <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-2">
            <span x-show="searchQuery">Nessun sito trovato per "<span x-text="searchQuery"></span>"</span>
            <span x-show="!searchQuery">Nessun sito disponibile</span>
        </h3>
        <p class="text-gray-500 dark:text-gray-400 mb-4">
            <span x-show="searchQuery">Prova con una diversa parola chiave</span>
            <span x-show="!searchQuery">Non hai accesso a nessun sito archeologico o non ci sono siti configurati.</span>
        </p>
        <div x-show="!searchQuery">
            <a href="/sites" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
                <i class="fas fa-plus mr-2"></i>Gestisci Siti
            </a>
        </div>
    </div>
</div>

<style>
.line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
