<!-- Statistics Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    <!-- Sites Card -->
    <div class="stat-card overview bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-blue-100 dark:bg-blue-900">
                <i class="fas fa-map-marker-alt text-blue-600 dark:text-blue-300"></i>
            </div>
            <div class="ml-4">
                <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Siti Accessibili</p>
                <p class="text-2xl font-semibold text-gray-900 dark:text-white" x-text="overviewStats.sites_count || 0"></p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                    <template x-if="overviewStats.sites_count > 1">
                        <span x-text="overviewStats.sites_count + ' siti attivi'"></span>
                    </template>
                    <template x-if="overviewStats.sites_count === 1">
                        <span>1 sito attivo</span>
                    </template>
                    <template x-if="overviewStats.sites_count === 0">
                        <span>Nessun sito</span>
                    </template>
                </p>
            </div>
        </div>
    </div>

    <!-- Photos Card -->
    <div class="stat-card overview bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-green-100 dark:bg-green-900">
                <i class="fas fa-camera text-green-600 dark:text-green-300"></i>
            </div>
            <div class="ml-4">
                <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Fotografie</p>
                <p class="text-2xl font-semibold text-gray-900 dark:text-white" x-text="overviewStats.photos_count || 0"></p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                    <template x-if="overviewStats.photos_count > 0">
                        <span x-text="formatNumber(overviewStats.photos_count) + ' foto totali'"></span>
                    </template>
                    <template x-if="overviewStats.photos_count === 0">
                        <span>Nessuna foto</span>
                    </template>
                </p>
            </div>
        </div>
    </div>

    <!-- Documents Card -->
    <div class="stat-card overview bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-yellow-100 dark:bg-yellow-900">
                <i class="fas fa-file-alt text-yellow-600 dark:text-yellow-300"></i>
            </div>
            <div class="ml-4">
                <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Documenti</p>
                <p class="text-2xl font-semibold text-gray-900 dark:text-white" x-text="overviewStats.documents_count || 0"></p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                    <template x-if="overviewStats.documents_count > 0">
                        <span x-text="formatNumber(overviewStats.documents_count) + ' documenti'"></span>
                    </template>
                    <template x-if="overviewStats.documents_count === 0">
                        <span>Nessun documento</span>
                    </template>
                </p>
            </div>
        </div>
    </div>

    <!-- Users Card -->
    <div class="stat-card overview bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-purple-100 dark:bg-purple-900">
                <i class="fas fa-users text-purple-600 dark:text-purple-300"></i>
            </div>
            <div class="ml-4">
                <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Utenti Attivi</p>
                <p class="text-2xl font-semibold text-gray-900 dark:text-white" x-text="overviewStats.users_count || 0"></p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                    <template x-if="overviewStats.users_count > 1">
                        <span x-text="overviewStats.users_count + ' utenti'"></span>
                    </template>
                    <template x-if="overviewStats.users_count === 1">
                        <span>1 utente</span>
                    </template>
                    <template x-if="overviewStats.users_count === 0">
                        <span>Nessun utente</span>
                    </template>
                </p>
            </div>
        </div>
    </div>
</div>

<!-- Additional Statistics Row (Context-aware) -->
<div x-show="activeTab === 'overview'" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <!-- Recent Activity Card -->
    <div class="bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-blue-900 dark:to-indigo-900 rounded-lg p-6 border border-blue-200 dark:border-blue-700">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-blue-900 dark:text-blue-100">Attività Recenti</h3>
            <i class="fas fa-clock text-blue-600 dark:text-blue-400"></i>
        </div>
        <div class="space-y-2">
            <template x-for="activity in recentActivities.slice(0, 3)" :key="activity.id">
                <div class="flex items-center text-sm">
                    <div class="w-2 h-2 bg-blue-500 rounded-full mr-2"></div>
                    <span class="text-blue-800 dark:text-blue-200" x-text="activity.description"></span>
                </div>
            </template>
            <div x-show="recentActivities.length === 0" class="text-sm text-blue-600 dark:text-blue-400">
                Nessuna attività recente
            </div>
        </div>
    </div>

    <!-- Quick Actions Card -->
    <div class="bg-gradient-to-r from-green-50 to-emerald-50 dark:from-green-900 dark:to-emerald-900 rounded-lg p-6 border border-green-200 dark:border-green-700">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-green-900 dark:text-green-100">Azioni Rapide</h3>
            <i class="fas fa-bolt text-green-600 dark:text-green-400"></i>
        </div>
        <div class="space-y-2">
            <button @click="navigateToNewSite()" class="w-full text-left px-3 py-2 bg-white dark:bg-gray-800 rounded text-sm text-green-800 dark:text-green-200 hover:bg-green-100 dark:hover:bg-green-800 transition">
                <i class="fas fa-plus mr-2"></i>Nuovo Sito
            </button>
            <button @click="navigateToNewGiornale()" class="w-full text-left px-3 py-2 bg-white dark:bg-gray-800 rounded text-sm text-green-800 dark:text-green-200 hover:bg-green-100 dark:hover:bg-green-800 transition">
                <i class="fas fa-book mr-2"></i>Nuovo Giornale
            </button>
            <button @click="navigateToUpload()" class="w-full text-left px-3 py-2 bg-white dark:bg-gray-800 rounded text-sm text-green-800 dark:text-green-200 hover:bg-green-100 dark:hover:bg-green-800 transition">
                <i class="fas fa-upload mr-2"></i>Carica Documenti
            </button>
        </div>
    </div>

    <!-- System Status Card -->
    <div class="bg-gradient-to-r from-purple-50 to-pink-50 dark:from-purple-900 dark:to-pink-900 rounded-lg p-6 border border-purple-200 dark:border-purple-700">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-purple-900 dark:text-purple-100">Stato Sistema</h3>
            <i class="fas fa-heartbeat text-purple-600 dark:text-purple-400"></i>
        </div>
        <div class="space-y-3">
            <div class="flex items-center justify-between text-sm">
                <span class="text-purple-800 dark:text-purple-200">Database</span>
                <span class="flex items-center text-green-600 dark:text-green-400">
                    <i class="fas fa-check-circle mr-1"></i>Online
                </span>
            </div>
            <div class="flex items-center justify-between text-sm">
                <span class="text-purple-800 dark:text-purple-200">Storage</span>
                <span class="flex items-center text-green-600 dark:text-green-400">
                    <i class="fas fa-check-circle mr-1"></i>Operativo
                </span>
            </div>
            <div class="flex items-center justify-between text-sm">
                <span class="text-purple-800 dark:text-purple-200">Backup</span>
                <span class="flex items-center text-yellow-600 dark:text-yellow-400">
                    <i class="fas fa-clock mr-1"></i>2 ore fa
                </span>
            </div>
        </div>
    </div>
</div>
