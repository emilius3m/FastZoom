{% extends "base/auth_base.html" %} {% block title %} Login | FastZoom {% endblock %} {% block content %}
<div
  id="login-page"
  x-data="login"
  x-init="$watch('showError', (value) => { if (value) { 
    setTimeout(() => { showError = false; }, 3000); 
  }  });"
  class="flex items-center justify-center min-h-screen px-4 py-8 bg-gray-100 dark:bg-gray-900"
>
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-6 sm:p-8">
      <!-- Logo and Title -->
      <div class="flex flex-col items-center mb-6">
        <img
          id="login-logo"
          src="/static/img/logo/undraw_login.png"
          alt="Login Logo"
          class="w-20 h-20 sm:w-24 sm:h-24 rounded-full mb-4 opacity-75 shadow-lg"
        />
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white text-center">
          FastZoom
        </h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Accedi al tuo account</p>
      </div>

      <!-- Login Form -->
      <form @submit.prevent="setCookie()">
        <!-- Email Input -->
        <div class="mb-4">
          <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
            Indirizzo Email
          </label>
          <input
            type="email"
            id="email"
            name="username"
            x-model="username"
            @input="checkLoginUsername(), allocateCSRFToken('{{csrf_token}}')"
            required
            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block w-full p-3 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 transition duration-200"
            placeholder="john.doe@company.com"
            autocomplete="email"
          />
          <p
            id="UsernameError"
            x-show="showUsernameError"
            class="mt-2 text-sm text-red-600 dark:text-red-400"
          >
            <span class="font-medium">Inserisci un indirizzo email valido</span>
          </p>
        </div>

        <!-- Password Input -->
        <div class="mb-6" x-show="showPasswordDiv">
          <label
            for="password"
            id="password-label"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
          >
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            x-model="password"
            @keyup.enter="setCookie()"
            required
            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block w-full p-3 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 transition duration-200"
            placeholder="•••••••••"
            autocomplete="current-password"
          />
        </div>

        <!-- Server Error Alert -->
        <div
          x-show="showError"
          class="mb-4 p-4 text-sm text-red-800 rounded-lg bg-red-50 dark:bg-red-200 dark:text-red-900 border border-red-200 dark:border-red-800"
          role="alert"
        >
          <span class="font-medium" x-text="message"></span>
        </div>

        <!-- Forgot Password Link -->
        <div class="mb-6 text-center">
          <a
            href="#"
            class="text-sm font-medium text-blue-600 hover:text-blue-700 dark:text-blue-500 dark:hover:text-blue-400 hover:underline transition duration-150"
          >
            Password dimenticata?
          </a>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="login-button"
          :disabled="showInputButton"
          :class="{
            'opacity-50 cursor-not-allowed': showInputButton,
            'hover:bg-blue-800 dark:hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 dark:focus:ring-blue-800': !showInputButton
          }"
          class="w-full text-white bg-blue-700 font-medium rounded-lg text-sm px-5 py-3 text-center dark:bg-blue-600 transition duration-200"
        >
          Accedi
        </button>

        <!-- Register Link -->
        <div class="mt-6 pt-4 border-t border-gray-200 dark:border-gray-700">
          <a
            href="{{ url_for('get_register') }}"
            class="w-full block text-center text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:outline-none focus:ring-green-300 font-medium rounded-lg text-sm px-5 py-3 dark:bg-green-600 dark:hover:bg-green-700 dark:focus:ring-green-800 transition duration-200"
          >
            Crea un nuovo account
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
